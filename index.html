<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXTR | SlizZe - Официальный сайт</title>
    <meta name="description" content="Официальный сайт музыкальной коллаборации DXTR и SlizZe. Релизы, треки и социальные сети артистов.">
    <link rel="icon" type="image/png" href="dslogo.png">
    <link rel="apple-touch-icon" href="dslogo.png">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dxtrslizze.xyz/">
    <meta property="og:title" content="DXTR | SlizZe - Официальный сайт">
    <meta property="og:description" content="Слушай новые треки Night City Lights, Carnaval, New Year и другие проекты.">
    <meta property="og:image" content="https://dxtrslizze.xyz/dslogo.png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-purple: #7000ff;
            --neon-cyan: #00c6ff;
            --bg-dark: #050507;
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Анимированный фон (Сферы) */
        .bg-blobs {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #050507;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 20s infinite alternate ease-in-out;
        }
        .blob-1 { width: 400px; height: 400px; background: var(--neon-purple); top: -10%; left: -10%; }
        .blob-2 { width: 500px; height: 500px; background: var(--neon-pink); bottom: -20%; right: -10%; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: var(--neon-cyan); top: 40%; left: 50%; transform: translateX(-50%); opacity: 0.2; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Анимация появления */
        .fade-in {
            animation: fadeIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        /* Шапка */
        header {
            text-align: center;
            padding: 8vh 20px 4vh;
            position: relative;
            z-index: 10;
        }

        header h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan), var(--neon-purple));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 4s linear infinite;
            margin-bottom: 10px;
            text-shadow: 0 0 50px rgba(255, 0, 127, 0.3);
        }

        @keyframes gradient-shift {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        header p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            font-weight: 500;
            letter-spacing: 1px;
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 40px;
            z-index: 10;
        }

        .section-title {
            margin: 60px 0 30px;
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .section-title::before, .section-title::after {
            content: '';
            height: 2px;
            flex: 1;
            background: linear-gradient(90deg, transparent, var(--neon-purple), transparent);
            opacity: 0.5;
        }

        /* ГЛАВНЫЙ РЕЛИЗ: Premium Block */
        .hero-release {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            display: flex;
            gap: 40px;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        .hero-release::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(255,0,127,0.1) 0%, transparent 50%);
            animation: rotate 10s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .hero-cover-wrap {
            position: relative;
            flex-shrink: 0;
            width: 350px;
            z-index: 1;
        }

        .hero-cover {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .hero-cover-wrap:hover .hero-cover {
            transform: scale(1.05) rotate(2deg);
        }

        .hero-info {
            flex: 1;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(255,0,127,0.2);
            color: var(--neon-pink);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid var(--neon-pink);
            align-self: flex-start;
        }

        .hero-info h2 {
            font-size: 3rem;
            font-weight: 900;
            line-height: 1.1;
            background: linear-gradient(to right, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Кастомный Аудиоплеер */
        .audio-player {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .play-pause-btn {
            background: var(--neon-purple);
            color: white;
            border: none;
            width: 45px; height: 45px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(112,0,255,0.5);
        }
        .play-pause-btn:hover { transform: scale(1.1); background: var(--neon-pink); box-shadow: 0 0 20px rgba(255,0,127,0.6); }

        .progress-container {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
            border-radius: 5px;
            position: relative;
        }
        .progress-bar::after {
            content: '';
            position: absolute;
            right: -5px; top: -3px;
            width: 12px; height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }
        .time-display { font-size: 0.85rem; color: var(--text-muted); font-variant-numeric: tabular-nums; }

        /* Кнопка скачивания */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            width: fit-content;
        }
        .download-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        /* Платформы для главного релиза */
        .platform-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .platform-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .platform-link::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; transition: 0.3s; opacity: 0;
        }
        .platform-link:hover::before { opacity: 1; }
        .platform-link:hover { transform: translateY(-3px); border-color: transparent; }

        .yt { border: 1px solid rgba(255,0,0,0.4); }
        .yt::before { background: linear-gradient(45deg, #cc0000, #ff4d4d); }
        
        .yam { border: 1px solid rgba(255,204,0,0.4); }
        .yam::before { background: linear-gradient(45deg, #e6b800, #ffcc00); }
        .yam:hover { color: #000; }
        
        .spot { border: 1px solid rgba(29,185,84,0.4); }
        .spot::before { background: linear-gradient(45deg, #14833b, #1DB954); }
        
        .vkm { border: 1px solid rgba(0,119,255,0.4); }
        .vkm::before { background: linear-gradient(45deg, #005ce6, #0077FF); }

        /* Сетка клипов */
        .tracks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .track-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .track-card:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 15px 35px rgba(0, 198, 255, 0.15);
            transform: translateY(-8px);
        }

        .track-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .track-thumb::after {
            content: '\f144';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3.5rem;
            color: rgba(255,255,255,0.7);
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
            transition: 0.3s;
        }

        .track-card:hover .track-thumb::after {
            color: var(--neon-pink);
            transform: translate(-50%, -50%) scale(1.15);
        }

        .track-info-card {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
        }
        .track-info-card span { font-weight: 700; font-size: 1.1rem; }
        .track-info-card i { color: #ff0000; font-size: 1.3rem; }

        /* Подвал */
        footer {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            border-top: 1px solid rgba(255,255,255,0.05);
            position: relative;
            z-index: 10;
        }

        .footer-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            display: flex; align-items: center; gap: 10px;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            color: white;
            transition: 0.3s;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .action-btn:hover { transform: scale(1.05) translateY(-3px); }
        .contact-btn { background: rgba(0, 136, 204, 0.2); border-color: #0088cc; }
        .contact-btn:hover { background: #0088cc; box-shadow: 0 0 20px rgba(0,136,204,0.5); }

        /* Модалка плеера YouTube */
        .modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-content {
            width: 90%; max-width: 1000px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(112,0,255,0.4);
            position: relative;
        }
        
        .modal-fallback {
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .modal-fallback a { color: var(--neon-pink); font-weight: bold; text-decoration: none; }
        .modal-fallback a:hover { text-decoration: underline; }

        .close-btn {
            position: absolute; top: 25px; right: 40px;
            color: white; font-size: 3rem; cursor: pointer; z-index: 10000; transition: 0.3s; line-height: 1;
        }
        .close-btn:hover { color: var(--neon-pink); transform: rotate(90deg); }

        @media (max-width: 900px) {
            .hero-release { flex-direction: column; text-align: center; padding: 30px 20px; }
            .hero-cover-wrap { width: 100%; max-width: 300px; }
            .hero-badge { align-self: center; }
            .hero-info h2 { font-size: 2.2rem; }
            .platform-grid { grid-template-columns: 1fr 1fr; }
            .download-btn { width: 100%; }
        }
        @media (max-width: 500px) {
            .platform-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <script>
        // ЛОГИКА МОДАЛЬНОГО ОКНА YOUTUBE
        const modal = document.getElementById('videoModal');
        const player = document.getElementById('ytPlayer');
        const closeBtn = document.getElementById('closeBtn');
        const fallbackLink = document.getElementById('ytFallbackLink');
        const localAudio = document.getElementById('localAudio'); // Ссылка на наш аудиоплеер
        const playBtnIcon = document.querySelector('#playBtn i');

        function openVideo(videoId) {
            // Если играет музыка на сайте - ставим на паузу
            if (!localAudio.paused) { togglePlay(); }

            player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            fallbackLink.href = `https://www.youtube.com/watch?v=${videoId}`;
            modal.style.display = 'flex';
            closeBtn.style.display = 'block';
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            modal.style.display = 'none';
            closeBtn.style.display = 'none';
            player.src = ''; 
            document.body.style.overflow = 'auto'; 
        }

        closeBtn.onclick = closeModal;
        modal.onclick = function(e) { if (e.target === modal) { closeModal(); } }

        // ЛОГИКА ВСТРОЕННОГО АУДИОПЛЕЕРА
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const timeDisplay = document.getElementById('timeDisplay');

        function togglePlay() {
            if (localAudio.paused) {
                localAudio.play();
                playBtnIcon.className = 'fa-solid fa-pause';
            } else {
                localAudio.pause();
                playBtnIcon.className = 'fa-solid fa-play';
            }
        }

        // Обновление полосы прокрутки и времени
        localAudio.addEventListener('timeupdate', () => {
            if (localAudio.duration) {
                const progressPercent = (localAudio.currentTime / localAudio.duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
                
                // Форматирование времени
                const currentMinutes = Math.floor(localAudio.currentTime / 60);
                const currentSeconds = Math.floor(localAudio.currentTime % 60);
                timeDisplay.textContent = `${currentMinutes}:${currentSeconds < 10 ? '0' : ''}${currentSeconds}`;
            }
        });

        // Клик по полосе для перемотки
        function seek(e) {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = localAudio.duration;
            localAudio.currentTime = (clickX / width) * duration;
        }

        // Когда трек заканчивается - возвращаем кнопку Play
        localAudio.addEventListener('ended', () => {
            playBtnIcon.className = 'fa-solid fa-play';
            progressBar.style.width = '0%';
            localAudio.currentTime = 0;
        });
    </script>
</body>
