<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документ 1 - Word</title>
    <style>
        /* Общие стили и шрифты MS Office */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: #E6E6E6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Синяя шапка (Title Bar) */
        .title-bar {
            background-color: #2B579A;
            color: white;
            height: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            padding-left: 10px;
        }

        .title-bar-left { display: flex; align-items: center; gap: 15px; }
        .window-controls { display: flex; }
        .win-btn { padding: 5px 15px; cursor: pointer; }
        .win-btn:hover { background-color: rgba(255,255,255,0.1); }
        .win-btn.close:hover { background-color: #E81123; }

        /* Лента инструментов (Ribbon) */
        .ribbon-container {
            background-color: #FFFFFF;
            border-bottom: 1px solid #D2D2D2;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #E1E1E1;
        }

        .tab {
            padding: 5px 15px;
            font-size: 13px;
            color: #444;
            cursor: pointer;
            margin-top: 5px;
        }

        .tab.active {
            color: #2B579A;
            border-bottom: 2px solid #2B579A;
            background-color: #F3F2F1;
        }

        .toolbar {
            display: flex;
            padding: 10px;
            gap: 15px;
            background-color: #F3F2F1;
            height: 70px;
            align-items: center;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid #D2D2D2;
            padding-right: 15px;
            gap: 5px;
            cursor: pointer;
            color: #444;
        }

        .tool-group:hover { color: #2B579A; }
        .tool-icon { font-size: 20px; }
        .tool-text { font-size: 11px; }

        /* Рабочая зона (Лист А4) */
        .workspace {
            flex: 1;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            padding: 30px;
        }

        .document-page {
            background-color: white;
            width: 800px;
            min-height: 1000px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            padding: 60px 80px;
            cursor: text;
            user-select: text;
        }

        /* Стили формы */
        .doc-title {
            font-size: 24px;
            font-weight: normal;
            color: #2B579A;
            border-bottom: 1px solid #2B579A;
            padding-bottom: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label.form-label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        input[type="number"] {
            width: 150px;
            padding: 8px;
            border: 1px solid #A6A6A6;
            font-size: 14px;
            outline: none;
        }

        input[type="number"]:focus { border-color: #2B579A; }

        /* Зона загрузки файлов (Label для нативного открытия) */
        .file-drop-area {
            border: 2px dashed #A6A6A6;
            padding: 40px 20px;
            text-align: center;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #F9F9F9;
            display: block;
        }

        .file-drop-area:hover, .file-drop-area.dragover {
            border-color: #2B579A;
            background-color: #F0F4F9;
            color: #2B579A;
        }

        .file-drop-area p { margin-top: 10px; font-size: 14px; }
        
        /* Карточки файлов */
        #fileList {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .file-card {
            width: 110px;
            height: 130px;
            background-color: #383838;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .file-icon {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60px;
        }

        .file-preview {
            width: 100%;
            height: 75px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .file-name {
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* Кнопка отправки */
        .submit-btn {
            background-color: #2B579A;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
        }

        .submit-btn:hover { background-color: #1A3A68; }
        .submit-btn:disabled { background-color: #A6A6A6; cursor: not-allowed; }

        /* Статус бар внизу */
        .status-bar {
            height: 22px;
            background-color: #2B579A;
            color: white;
            font-size: 11px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="title-bar">
        <div class="title-bar-left">
            <span>💾</span>
            <span>↩</span>
            <span>↪</span>
            <span>Документ 1 - Word</span>
        </div>
        <div class="window-controls">
            <div class="win-btn">─</div>
            <div class="win-btn">▢</div>
            <div class="win-btn close">✕</div>
        </div>
    </div>

    <div class="ribbon-container">
        <div class="tabs">
            <span class="tab">Файл</span>
            <span class="tab active">Главная</span>
            <span class="tab">Вставка</span>
            <span class="tab">Конструктор</span>
            <span class="tab">Макет</span>
        </div>
        <div class="toolbar">
            <div class="tool-group">
                <span class="tool-icon">📋</span>
                <span class="tool-text">Вставить</span>
            </div>
            <div class="tool-group">
                <span class="tool-icon">B <i>I</i> <u>U</u></span>
                <span class="tool-text">Шрифт</span>
            </div>
            <div class="tool-group" style="border:none;">
                <span class="tool-icon" style="color: #2B579A;">☁️</span>
                <span class="tool-text">БД Активна</span>
            </div>
        </div>
    </div>

    <div class="workspace">
        <div class="document-page">
            <h1 class="doc-title">Спецификация и материалы к билету</h1>
            
            <div class="form-group">
                <label class="form-label" for="ticketId">Номер билета (Идентификатор):</label>
                <input type="number" id="ticketId" placeholder="№ билета..." min="1">
            </div>

            <div class="form-group">
                <label class="form-label">Приложения (Фото / Документы):</label>
                <label class="file-drop-area" id="dropArea" for="fileInput">
                    <span style="font-size: 24px;">📁</span>
                    <p>Перетащите файлы сюда или кликните для выбора</p>
                    <input type="file" id="fileInput" multiple style="display: none;">
                </label>
                <div id="fileList"></div>
            </div>

            <button class="submit-btn" id="uploadBtn">Сохранить в реестр (Supabase)</button>
        </div>
    </div>

    <div class="status-bar">
        <span>Страница 1 из 1 | Число слов: 0 | Русский</span>
        <span>100% ◚ ◛</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const uploadBtn = document.getElementById('uploadBtn');
        let selectedFiles = [];

        // Визуальные эффекты Drag & Drop
        fileInput.addEventListener('change', handleFiles);

        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.classList.add('dragover');
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('dragover');
        });

        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFiles({ target: fileInput });
            }
        });

        // Генерация карточек файлов
        function handleFiles(e) {
            selectedFiles = Array.from(e.target.files);
            fileList.innerHTML = '';
            if (!selectedFiles.length) return;
            
            selectedFiles.forEach(file => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.title = file.name;

                // Если картинка — показываем превью, если документ — иконку
                if (file.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.className = 'file-preview';
                    img.src = URL.createObjectURL(file);
                    card.appendChild(img);
                } else {
                    const icon = document.createElement('div');
                    icon.className = 'file-icon';
                    icon.innerHTML = `
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="#1a73e8" xmlns="http://www.w3.org/2000/svg">
                            <path d="M14 2H6C4.895 2 4.01 2.895 4.01 4L4 20C4 21.105 4.895 22 6 22H18C19.105 22 20 21.105 20 20V8L14 2ZM13 9V3.5L18.5 9H13Z"/>
                        </svg>
                    `;
                    card.appendChild(icon);
                }

                const name = document.createElement('div');
                name.className = 'file-name';
                name.textContent = file.name;
                card.appendChild(name);

                fileList.appendChild(card);
            });
        }

        // Логика отгрузки в БД
        uploadBtn.addEventListener('click', async () => {
            
            // Инициализация Supabase перенесена сюда для обхода возможных блокировщиков
            if (typeof supabase === 'undefined') {
                return alert('Ошибка: Не удалось загрузить скрипт БД. Проверьте интернет или блокировщики рекламы.');
            }
            
            const SUPABASE_URL = 'https://lchcayvociobmqpdbonps.supabase.co'; 
            const SUPABASE_KEY = 'sb_publishable_iFmhjG3uVMu76HKSq-jj5g_MOAwpr6h';
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            const ticketId = document.getElementById('ticketId').value;
            
            if (!ticketId) return alert('Укажите номер билета!');
            if (selectedFiles.length === 0) return alert('Прикрепите хотя бы один файл!');

            // Блокируем кнопку на время загрузки
            uploadBtn.textContent = 'Отправка в облако...';
            uploadBtn.disabled = true;

            try {
                for (const file of selectedFiles) {
                    // 1. Генерируем уникальное имя файла
                    const fileExt = file.name.split('.').pop();
                    const uniqueName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                    
                    // Раскладываем по папкам с номерами билетов внутри бакета
                    const filePath = `ticket_${ticketId}/${uniqueName}`; 

                    // 2. Отгружаем файл в Storage (бакет "ticket-files")
                    const { data: uploadData, error: uploadError } = await supabaseClient.storage
                        .from('ticket-files')
                        .upload(filePath, file);

                    if (uploadError) throw uploadError;

                    // 3. Получаем публичную ссылку на загруженный файл
                    const { data: publicUrlData } = supabaseClient.storage
                        .from('ticket-files')
                        .getPublicUrl(filePath);
                    
                    const fileUrl = publicUrlData.publicUrl;

                    // 4. Пишем информацию в таблицу
                    const { error: dbError } = await supabaseClient
                        .from('ticket_attachments')
                        .insert([
                            {
                                ticket_id: parseInt(ticketId),
                                file_name: file.name,
                                file_url: fileUrl,
                                file_type: file.type || 'application/octet-stream'
                            }
                        ]);

                    if (dbError) throw dbError;
                }

                alert('Успех! Файлы привязаны к билету №' + ticketId);
                
                // Очищаем форму для следующей загрузки
                document.getElementById('ticketId').value = '';
                selectedFiles = [];
                fileList.innerHTML = '';
                fileInput.value = '';

            } catch (error) {
                console.error(error);
                alert('Ошибка при загрузке: ' + error.message);
            } finally {
                // Возвращаем кнопку в исходное состояние
                uploadBtn.textContent = 'Сохранить в реестр (Supabase)';
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
