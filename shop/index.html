<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>В РАЗРАБОТКЕ | DXTR | SlizZe</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* БАЗОВЫЕ ПЕРЕМЕННЫЕ И ТЕМЫ */
        :root {
            --bg-dark: #020602; --glass-bg: rgba(5, 15, 5, 0.7); --text-main: #ffffff;
            --theme-color: #00c6ff; --theme-glow: rgba(0, 198, 255, 0.4);
            --theme-glass-border: rgba(0, 198, 255, 0.2); --text-muted: #8a9ba8; --error-red: #cc4444; 
        }
        body.theme-blue { --theme-color: #00c6ff; --theme-glow: rgba(0, 198, 255, 0.4); --theme-glass-border: rgba(0, 198, 255, 0.3); --text-muted: #8a9ba8; }
        body.theme-red { --theme-color: #ff0033; --theme-glow: rgba(255, 0, 51, 0.4); --theme-glass-border: rgba(255, 0, 51, 0.3); --text-muted: #a88a8a; }
        body.theme-green { --theme-color: #00ff66; --theme-glow: rgba(0, 255, 102, 0.4); --theme-glass-border: rgba(0, 255, 102, 0.3); --text-muted: #8aa88a; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; transition: color 0.5s, border-color 0.5s, box-shadow 0.5s, background-color 0.5s; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; position: relative; }

        /* МАТРИЦА ФОН */
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; opacity: 0.6; }
        
        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;
            background: transparent; transition: background 0.3s ease;
        }

        /* МЕНЮ И ПРОФИЛЬ */
        .top-controls { position: fixed; top: 25px; right: 25px; z-index: 10002; display: flex; align-items: center; gap: 15px; }
        .profile-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--theme-color); overflow: hidden; display: flex; justify-content: center; align-items: center; background: var(--bg-dark); transition: 0.3s; box-shadow: 0 0 10px var(--theme-glow); text-decoration: none; }
        .profile-btn img { width: 100%; height: 100%; object-fit: cover; }
        .profile-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--theme-color); border-color: #fff; }

        .burger-btn { position: fixed; top: 25px; left: 25px; z-index: 10001; background: rgba(0,0,0,0.5); border: 1px solid var(--theme-glass-border); width: 45px; height: 45px; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: white; font-size: 1.2rem; cursor: pointer; backdrop-filter: blur(10px); }
        .burger-btn:hover { background: var(--theme-color); color: #000; box-shadow: 0 0 15px var(--theme-color); border-color: var(--theme-color); }
        .sidebar { position: fixed; top: 0; left: -300px; width: 300px; height: 100vh; background: rgba(2, 6, 2, 0.95); backdrop-filter: blur(25px); border-right: 1px solid var(--theme-glass-border); z-index: 10000; display: flex; flex-direction: column; padding: 80px 30px 30px; transition: left 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        .sidebar.active { left: 0; }
        .sidebar-link { color: white; text-decoration: none; font-size: 1.1rem; font-weight: 700; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 15px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .sidebar-link i { color: var(--theme-color); font-size: 1.4rem; }
        .sidebar-link:hover { color: var(--theme-color); padding-left: 10px; border-bottom-color: var(--theme-glow); }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 9999; display: none; opacity: 0; transition: opacity 0.3s; }
        .sidebar-overlay.active { display: block; opacity: 1; }

        /* === ТЕХПОДДЕРЖКА (ЧАТ) === */
        .support-btn { position: fixed; bottom: 25px; right: 25px; z-index: 9000; background: var(--glass-bg); border: 1px solid var(--theme-glass-border); width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--theme-color); font-size: 1.5rem; cursor: pointer; box-shadow: 0 0 20px rgba(0,0,0,0.5); backdrop-filter: blur(10px); transition: 0.3s; }
        .support-btn:hover { background: var(--theme-color); color: #000; transform: scale(1.1); box-shadow: 0 0 25px var(--theme-glow); }
        .unread-badge { position: absolute; top: -5px; right: -5px; background: var(--error-red); color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 0.7rem; font-weight: bold; display: none; justify-content: center; align-items: center; box-shadow: 0 0 10px var(--error-red); }
        
        .chat-window { position: fixed; bottom: 100px; right: 25px; width: 350px; height: 450px; background: rgba(5, 10, 5, 0.95); border: 1px solid var(--theme-glass-border); border-radius: 20px; z-index: 9000; display: none; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.8); backdrop-filter: blur(20px); overflow: hidden; transform: translateY(20px); opacity: 0; transition: all 0.3s ease; }
        .chat-window.active { display: flex; transform: translateY(0); opacity: 1; }
        .chat-header { background: rgba(0,0,0,0.5); padding: 15px 20px; border-bottom: 1px solid var(--theme-glass-border); display: flex; justify-content: space-between; align-items: center; font-weight: 800; color: var(--theme-color); letter-spacing: 1px; text-transform: uppercase; }
        .close-chat { cursor: pointer; font-size: 1.2rem; color: #fff; transition: 0.3s; }
        .close-chat:hover { color: var(--error-red); }
        
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
        .msg-user { align-self: flex-end; background: rgba(0, 198, 255, 0.1); border: 1px solid var(--theme-color); color: #fff; border-bottom-right-radius: 2px; }
        .msg-admin { align-self: flex-start; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-bottom-left-radius: 2px; }
        .msg-warning { align-self: flex-start; background: rgba(204, 68, 68, 0.2); border: 1px solid var(--error-red); color: #fff; }
        .msg-success { align-self: flex-start; background: rgba(0, 255, 102, 0.2); border: 1px solid #00ff66; color: #fff; }
        
        .chat-input { display: flex; padding: 15px; background: rgba(0,0,0,0.5); border-top: 1px solid var(--theme-glass-border); gap: 10px; }
        .chat-input input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px 15px; border-radius: 10px; color: #fff; outline: none; font-family: 'Montserrat'; transition: 0.3s; }
        .chat-input input:focus { border-color: var(--theme-color); }
        .chat-input button { background: var(--theme-color); color: #000; border: none; width: 45px; height: 45px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .chat-input button:hover { box-shadow: 0 0 15px var(--theme-glow); transform: scale(1.05); background: #fff; }
        .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; background: #333; color: #888; }

        /* === БЛОК В РАЗРАБОТКЕ === */
        main { flex: 1; width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px; z-index: 10; }
        
        .dev-container {
            background: var(--glass-bg);
            border: 1px solid var(--theme-glass-border);
            border-radius: 25px;
            padding: 50px 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            animation: floatUp 0.8s ease forwards;
            position: relative;
            overflow: hidden;
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dev-icon {
            font-size: 4rem;
            color: var(--theme-color);
            text-shadow: 0 0 25px var(--theme-glow);
            margin-bottom: 20px;
            animation: pulseIcon 2s infinite alternate;
        }

        @keyframes pulseIcon {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }

        .dev-title {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            margin-bottom: 10px;
        }

        .dev-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .loading-bar-container {
            width: 100%;
            height: 10px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            margin-bottom: 40px;
            position: relative;
        }

        .loading-bar-fill {
            height: 100%;
            width: 65%; /* Визуальный прогресс */
            background: linear-gradient(90deg, transparent, var(--theme-color));
            border-radius: 10px;
            box-shadow: 0 0 15px var(--theme-glow);
            animation: loadingPulse 2s infinite;
        }

        @keyframes loadingPulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: transparent;
            color: #fff;
            border: 2px solid var(--theme-color);
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--theme-color);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--theme-glow);
            transform: translateY(-3px);
        }

        @media (max-width: 600px) {
            .top-controls { top: 15px; right: 15px; gap: 10px; }
            .profile-btn { width: 40px; height: 40px; }
            .chat-window { width: calc(100vw - 40px); right: 20px; bottom: 90px; height: 60vh; }
            .support-btn { width: 50px; height: 50px; right: 20px; bottom: 20px; font-size: 1.2rem; }
            .dev-container { padding: 40px 20px; }
        }
    </style>
</head>
<body class="theme-blue">

    <canvas id="matrixCanvas"></canvas>

    <div class="top-controls">
        <a href="https://dxtrslizze.xyz/profile" class="profile-btn" title="Профиль">
            <img src="../dslogo.png" alt="Profile" id="userAvatar" onerror="this.src='https://via.placeholder.com/100/000000/00c6ff?text=D%26S'">
        </a>
    </div>

    <div class="burger-btn" id="burgerBtn"><i class="fa-solid fa-bars"></i></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="color: var(--text-muted); font-size: 0.9rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
            МЕНЮ <i class="fa-solid fa-xmark" id="closeSidebar" style="font-size: 1.5rem; cursor: pointer; color: white; transition: 0.3s;"></i>
        </div>
        <a href="https://dxtrslizze.xyz/" class="sidebar-link"><i class="fa-solid fa-home"></i> Главная</a>
        <a href="https://dxtrslizze.xyz/muzcatalog/" class="sidebar-link"><i class="fa-solid fa-music"></i> Муз. каталог</a>
        <a href="https://dxtrslizze.xyz/promocode" class="sidebar-link"><i class="fa-solid fa-terminal"></i> Ввод промокода</a>
        <a class="sidebar-link" id="menuSupportBtn"><i class="fa-solid fa-headset"></i> Поддержка</a>
    </div>

    <div class="support-btn" id="supportBtn">
        <i class="fa-solid fa-headset"></i>
        <div class="unread-badge" id="unreadBadge">!</div>
    </div>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <div><i class="fa-solid fa-headset"></i> ТЕХ. ПОДДЕРЖКА</div>
            <i class="fa-solid fa-xmark close-chat" id="closeChat"></i>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Введите сообщение..." autocomplete="off">
            <button id="chatSend"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <main>
        <div class="dev-container">
            <i class="fa-solid fa-screwdriver-wrench dev-icon"></i>
            <h1 class="dev-title">ДОСТУП ЗАКРЫТ</h1>
            <p class="dev-subtitle">Сектор находится в стадии активной разработки и компиляции.</p>
            
            <div class="loading-bar-container">
                <div class="loading-bar-fill"></div>
            </div>

            <a href="https://dxtrslizze.xyz/" class="back-btn">
                <i class="fa-solid fa-chevron-left"></i> ВЕРНУТЬСЯ В ШТАБ
            </a>
        </div>
    </main>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ========== МАТРИЦА ==========
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const FONT_SIZE = 16;
        let columns = Math.floor(canvas.width / FONT_SIZE);
        let drops = [];
        for (let i = 0; i < columns; i++) drops[i] = Math.random() * -60;

        function drawMatrix() {
            const isRed = document.body.classList.contains('theme-red');
            const isGreen = document.body.classList.contains('theme-green');
            ctx.fillStyle = isRed ? 'rgba(5, 1, 1, 0.08)' : (isGreen ? 'rgba(2, 6, 2, 0.08)' : 'rgba(1, 4, 8, 0.08)');
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = FONT_SIZE + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const char = Math.random() > 0.5 ? '1' : '0';
                if (isRed) ctx.fillStyle = Math.floor(drops[i]) % 6 < 2 ? '#ff5555' : '#cc0000';
                else if (isGreen) ctx.fillStyle = Math.floor(drops[i]) % 6 < 2 ? '#afffbf' : '#00ff66';
                else ctx.fillStyle = Math.floor(drops[i]) % 6 < 2 ? '#aadeff' : '#00c6ff';
                ctx.fillText(char, i * FONT_SIZE, drops[i] * FONT_SIZE);
                if (drops[i] * FONT_SIZE > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; columns = Math.floor(canvas.width / FONT_SIZE); drops = []; for (let i = 0; i < columns; i++) drops[i] = Math.random() * -60; });

        // ========== МЕНЮ ==========
        const burgerBtn = document.getElementById('burgerBtn'), sidebar = document.getElementById('sidebar'), sidebarOverlay = document.getElementById('sidebarOverlay'), closeSidebar = document.getElementById('closeSidebar');
        function toggleMenu() { sidebar.classList.toggle('active'); sidebarOverlay.classList.toggle('active'); }
        burgerBtn.onclick = toggleMenu; closeSidebar.onclick = toggleMenu; sidebarOverlay.onclick = toggleMenu;

        // ========== ЧАТ ТЕХПОДДЕРЖКИ ==========
        const supportBtn = document.getElementById('supportBtn');
        const chatWindow = document.getElementById('chatWindow');
        const closeChat = document.getElementById('closeChat');
        const menuSupportBtn = document.getElementById('menuSupportBtn');
        const unreadBadge = document.getElementById('unreadBadge');
        
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSend = document.getElementById('chatSend');
        
        let chatHistory = JSON.parse(localStorage.getItem('chatHistory_dxtr') || '[]');
        let isSupportBanned = false;

        function toggleChat() {
            if (chatWindow.style.display === 'flex') {
                chatWindow.classList.remove('active');
                setTimeout(() => chatWindow.style.display = 'none', 300);
            } else {
                chatWindow.style.display = 'flex';
                setTimeout(() => chatWindow.classList.add('active'), 10);
                unreadBadge.style.display = 'none';
                scrollToBottom();
            }
        }
        
        supportBtn.onclick = toggleChat;
        closeChat.onclick = toggleChat;
        menuSupportBtn.onclick = (e) => { e.preventDefault(); toggleMenu(); toggleChat(); };

        function renderHistory() {
            chatMessages.innerHTML = '';
            chatHistory.forEach(m => addMessageToUI(m.text, m.type));
            scrollToBottom();
        }
        renderHistory();

        function addMessageToUI(text, type) {
            const div = document.createElement('div');
            div.className = `msg msg-${type}`;
            div.innerHTML = text; 
            chatMessages.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() { chatMessages.scrollTop = chatMessages.scrollHeight; }

        function saveMessage(text, type) {
            chatHistory.push({ text, type });
            if (chatHistory.length > 50) chatHistory.shift();
            localStorage.setItem('chatHistory_dxtr', JSON.stringify(chatHistory));
        }

        chatSend.onclick = () => {
            if (isSupportBanned || !chatInput.value.trim()) return;
            const text = chatInput.value.trim();
            addMessageToUI(text, 'user');
            saveMessage(text, 'user');
            if (window.socket) window.socket.emit('send_message', { clientId: window.clientId, text });
            chatInput.value = '';
        };

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') chatSend.click();
        });

        // ========== СИСТЕМА ID И СОКЕТЫ ==========
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                let date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "")  + expires + "; path=/";
        }
        function getCookie(name) {
            let nameEQ = name + "=";
            let ca = document.cookie.split(';');
            for(let i=0;i < ca.length;i++) {
                let c = ca[i].trim();
                if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length,c.length);
            }
            return null;
        }

        let lsId = localStorage.getItem('dxtrNumericId');
        let cookieId = getCookie('dxtrNumericId');
        window.clientId = lsId || cookieId || null;
        window.userNickname = localStorage.getItem('dxtrUserNickname') || null;
        
        if (window.clientId) {
            localStorage.setItem('dxtrNumericId', window.clientId);
            setCookie('dxtrNumericId', window.clientId, 365);
        }

        let fpPromise = import('https://openfpcdn.io/fingerprintjs/v4').then(FP => FP.load());
        let fingerprintHash = '';

        try {
            window.socket = io("https://dxtrslizze.onrender.com/");
            
            window.socket.on('connect', () => {
                fpPromise.then(fp => fp.get()).then(r => {
                    fingerprintHash = r.visitorId;
                    window.socket.emit('register_client', { clientId: window.clientId, fpHash: fingerprintHash });
                }).catch(() => {
                    fingerprintHash = 'blocked';
                    window.socket.emit('register_client', { clientId: window.clientId, fpHash: fingerprintHash });
                });
            });

            window.socket.on('assign_id', (data) => {
                if (data && data.newId) {
                    window.clientId = data.newId;
                    localStorage.setItem('dxtrNumericId', window.clientId);
                    setCookie('dxtrNumericId', window.clientId, 365);
                }
            });
            
            window.socket.on('user_data', d => {
                if (d.nickname) {
                    window.userNickname = d.nickname;
                    localStorage.setItem('dxtrUserNickname', d.nickname);
                }
                if (d.avatarUrl) {
                    const avatarImg = document.getElementById('userAvatar');
                    if (avatarImg) avatarImg.src = d.avatarUrl;
                }
            });

            // Слушаем входящие сообщения
            window.socket.on('receive_message', (data) => {
                const type = data.isWarning ? 'warning' : (data.isSuccess ? 'success' : 'admin');
                addMessageToUI(data.text, type);
                saveMessage(data.text, type);
                if (chatWindow.style.display !== 'flex') {
                    unreadBadge.style.display = 'flex';
                }
            });

            // Слушаем статус бана чата
            window.socket.on('ban_status', (data) => {
                isSupportBanned = data.isBanned;
                if (isSupportBanned) {
                    chatInput.disabled = true;
                    chatSend.disabled = true;
                    chatInput.placeholder = "Доступ к чату ограничен";
                } else {
                    chatInput.disabled = false;
                    chatSend.disabled = false;
                    chatInput.placeholder = "Введите сообщение...";
                }
            });

        } catch(e) {
            console.error("Socket.io connection error", e);
        }
    </script>
</body>
</html>
