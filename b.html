<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экзамен сдан | DXTR x SlizZe</title>
    <style>
        /* Подключаем технологичный шрифт из Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg-dark: #07070a;
            --text-main: #e2e2e2;
            --neon-blue: #00f3ff;
            --neon-purple: #bd00ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            /* Легкое, ненавязчивое неоновое свечение на фоне */
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(189, 0, 255, 0.08), transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(0, 243, 255, 0.08), transparent 40%);
            overflow: hidden;
        }

        .content-box {
            max-width: 650px;
            padding: 50px 30px;
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid rgba(189, 0, 255, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            box-shadow: 
                0 0 30px rgba(189, 0, 255, 0.05), 
                inset 0 0 20px rgba(0, 243, 255, 0.02);
            z-index: 10;
        }

        h1 {
            font-size: 3.5rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
            /* Аккуратный фиолетовый glow-эффект */
            text-shadow: 0 0 15px rgba(189, 0, 255, 0.6);
        }

        .subtitle {
            font-size: 1.4rem;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #b0b0b5;
        }

        .highlight-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--neon-blue);
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
        }

        .btn-glow {
            display: inline-block;
            text-decoration: none;
            color: #fff;
            background: transparent;
            padding: 16px 45px;
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid var(--neon-blue);
            border-radius: 8px;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 15px rgba(0, 243, 255, 0.2), 
                inset 0 0 10px rgba(0, 243, 255, 0.1);
            cursor: pointer;
        }

        /* Анимация заливки и усиления свечения при наведении */
        .btn-glow:hover {
            background: var(--neon-blue);
            color: var(--bg-dark);
            box-shadow: 
                0 0 25px var(--neon-blue), 
                0 0 50px rgba(0, 243, 255, 0.5);
        }

        /* Адаптив для смартфонов */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .subtitle { font-size: 1.1rem; }
            .highlight-text { font-size: 1.3rem; }
            .content-box { margin: 20px; padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="content-box">
        <h1>Поздравляю!</h1>
        <p class="subtitle">Ты успешно справился с экзаменом.<br>Но, тогда почему ты здесь?</p>
        <p class="highlight-text">Ладно, раз уж зашёл не проходи мимо, послушай музыку!</p>
        
        <a href="https://dxtrslizze.xyz" class="btn-glow">Перейти на главную</a>
    </div>
</body>
</html>
