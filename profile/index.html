<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXTR | SlizZe - Профиль и Авторизация</title>
    <link rel="icon" type="image.png" href="../dslogo.png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-purple: #7000ff;
            --neon-cyan: #00c6ff;
            --neon-yellow: #ffcc00;
            --bg-dark: #050507;
            --glass-bg: rgba(20, 20, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --neon-red: #ff0033;
            --neon-green: #00ff66;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* АНИМИРОВАННЫЙ ФОН + ХАЙТЕК СЕТКА (КАК НА ГЛАВНОЙ) */
        .bg-blobs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; overflow: hidden; background: #050507; }
        .blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.5; animation: float 20s infinite alternate ease-in-out; }
        .blob-1 { width: 500px; height: 500px; background: var(--neon-purple); top: -10%; left: -10%; }
        .blob-2 { width: 600px; height: 600px; background: var(--neon-pink); bottom: -20%; right: -10%; animation-delay: -5s; }
        .blob-3 { width: 400px; height: 400px; background: var(--neon-cyan); top: 30%; left: 40%; opacity: 0.3; animation-delay: -10s; }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;
            background: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        /* БОКОВОЕ МЕНЮ И ЧАТ (КАК НА ГЛАВНОЙ) */
        .burger-btn { position: fixed; top: 25px; left: 25px; z-index: 10001; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); width: 45px; height: 45px; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: white; font-size: 1.2rem; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
        .burger-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); border-color: var(--neon-cyan); }
        .sidebar { position: fixed; top: 0; left: -300px; width: 300px; height: 100vh; background: rgba(5, 5, 10, 0.9); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-right: 1px solid rgba(0, 198, 255, 0.2); z-index: 10000; display: flex; flex-direction: column; padding: 80px 30px 30px; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        .sidebar.active { left: 0; }
        .sidebar-link { color: white; text-decoration: none; font-size: 1.1rem; font-weight: 700; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 15px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .sidebar-link i.icon-main { color: var(--neon-cyan); font-size: 1.4rem; transition: 0.3s; }
        .sidebar-link:hover, .sidebar-link.active { color: var(--neon-cyan); padding-left: 10px; border-bottom-color: rgba(0,198,255,0.3); }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 9999; display: none; opacity: 0; transition: 0.3s; }
        .sidebar-overlay.active { display: block; opacity: 1; }

        /* ОКНО ЧАТА */
        #chat-window {
            display: none; position: fixed; bottom: 30px; right: 30px; width: 380px; height: 520px; flex-direction: column; overflow: hidden;
            background: rgba(8, 8, 12, 0.85); border: 1px solid rgba(0, 198, 255, 0.4); border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(0, 198, 255, 0.15), inset 0 0 20px rgba(112,0,255,0.1);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 9999;
        }
        .chat-header { background: linear-gradient(90deg, #0a0a0f, #151520); border-bottom: 2px solid var(--neon-purple); color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .chat-header-title { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(112,0,255,0.8); }
        #chat-close { cursor: pointer; font-size: 1.5rem; transition: 0.3s; color: rgba(255,255,255,0.6); }
        #chat-close:hover { color: var(--neon-pink); }
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; font-size: 0.95rem; }
        .chat-system-msg { color: var(--neon-cyan); text-align: center; font-size: 0.8rem; font-weight: 600; padding: 8px; border: 1px dashed rgba(0,198,255,0.3); border-radius: 8px; }
        .chat-msg-wrapper { display: flex; flex-direction: column; }
        .chat-msg-name { font-size: 0.7rem; font-weight: 900; margin-bottom: 6px; text-transform: uppercase; }
        .chat-msg-bubble { padding: 14px 18px; border-radius: 16px; color: #fff; max-width: 85%; line-height: 1.5; }
        .msg-user { align-items: flex-end; } .msg-user .chat-msg-name { color: var(--neon-cyan); } .msg-user .chat-msg-bubble { background: rgba(0, 198, 255, 0.08); border: 1px solid rgba(0, 198, 255, 0.4); border-bottom-right-radius: 2px; }
        .msg-bot { align-items: flex-start; } .msg-bot .chat-msg-name { color: var(--neon-purple); } .msg-bot .chat-msg-bubble { background: rgba(112, 0, 255, 0.08); border: 1px solid rgba(112, 0, 255, 0.4); border-bottom-left-radius: 2px; }
        .chat-input-area { padding: 15px 20px; display: flex; gap: 12px; border-top: 1px solid rgba(0,198,255,0.2); background: rgba(5,5,8,0.9); }
        #chat-input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 14px 18px; border-radius: 14px; outline: none; }
        #chat-send { background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan)); border: none; color: #fff; width: 52px; height: 52px; border-radius: 14px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }

        /* ================= ДИЗАЙН ПРОФИЛЯ И АВТОРИЗАЦИИ ================= */
        .auth-wrapper {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; z-index: 10; position: relative;
        }

        .auth-container {
            background: linear-gradient(135deg, rgba(20,20,35,0.8) 0%, rgba(5,5,15,0.9) 100%);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 2px solid var(--neon-cyan);
            border-radius: 30px;
            padding: 40px;
            width: 100%; max-width: 450px;
            box-shadow: 0 0 40px rgba(0, 198, 255, 0.2), inset 0 0 20px rgba(0, 198, 255, 0.1);
            text-align: center;
            position: relative; overflow: hidden;
        }

        .auth-container::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(0,198,255,0.1) 0%, transparent 60%);
            animation: rotate 15s linear infinite; pointer-events: none; z-index: 0;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .auth-content { position: relative; z-index: 1; }

        .auth-title {
            font-size: 2.2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 4px;
            background: linear-gradient(90deg, #fff, var(--neon-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 30px; filter: drop-shadow(0 0 15px rgba(0, 198, 255, 0.3));
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group input {
            width: 100%; padding: 16px 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff;
            font-size: 1rem; outline: none; transition: 0.3s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .input-group input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0,198,255,0.2), inset 0 0 10px rgba(0,198,255,0.1);
        }

        .auth-btn {
            width: 100%; padding: 16px; margin-top: 10px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            color: white; border: none; border-radius: 12px;
            font-weight: 800; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s;
        }
        .auth-btn:hover { box-shadow: 0 0 25px rgba(0, 198, 255, 0.6); transform: translateY(-2px); }

        .toggle-text { margin-top: 25px; color: var(--text-muted); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .toggle-text:hover { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255,0,127,0.5); }

        .error-msg { color: var(--neon-red); font-size: 0.9rem; font-weight: 700; margin-bottom: 15px; display: none; text-shadow: 0 0 10px rgba(255,0,51,0.5); }

        /* Внешний вид залогиненного профиля */
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--neon-cyan); box-shadow: 0 0 20px rgba(0,198,255,0.5); margin: 0 auto 20px; object-fit: cover; }
        .profile-name { font-size: 2rem; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .profile-id { color: var(--text-muted); font-size: 0.9rem; font-weight: 700; margin-bottom: 25px; }
        
        .logout-btn {
            width: 100%; padding: 14px; background: rgba(255, 0, 51, 0.1); border: 1px solid var(--neon-red);
            color: var(--neon-red); border-radius: 12px; font-weight: 800; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; letter-spacing: 1px; margin-top: 10px;
        }
        .logout-btn:hover { background: var(--neon-red); color: #fff; box-shadow: 0 0 20px rgba(255,0,51,0.6); }

        /* КНОПКА ВОЗВРАТА */
        .back-to-main {
            display: inline-flex; align-items: center; gap: 10px; margin-top: 30px;
            padding: 12px 25px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px; color: var(--text-muted); text-decoration: none; font-weight: 700;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem;
        }
        .back-to-main:hover { color: #fff; border-color: var(--neon-cyan); background: rgba(0,198,255,0.1); box-shadow: 0 0 15px rgba(0,198,255,0.3); transform: translateY(-3px); }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .auth-container { padding: 30px 20px; }
            .auth-title { font-size: 1.8rem; }
            .burger-btn { width: 40px; height: 40px; }
            #chat-window { width: 100vw !important; height: 75vh !important; bottom: 0 !important; left: 0 !important; right: 0 !important; border-radius: 24px 24px 0 0 !important; }
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="burger-btn fade-in" id="burgerBtn"><i class="fa-solid fa-bars"></i></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="color: var(--text-muted); font-size: 0.9rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
            МЕНЮ <i class="fa-solid fa-xmark" id="closeSidebar" style="font-size: 1.5rem; cursor: pointer; color: white; transition: 0.3s;"></i>
        </div>
        <a href="https://dxtrslizze.xyz/" class="sidebar-link"><i class="fa-solid fa-home icon-main"></i> Главная</a>
        <a href="https://dxtrslizze.xyz/muzcatalog/" class="sidebar-link"><i class="fa-solid fa-music icon-main"></i> Муз. каталог</a>
        <a href="https://dxtrslizze.xyz/about" class="sidebar-link"><i class="fa-solid fa-circle-info icon-main"></i> О нас</a>
        <a href="#" class="sidebar-link" id="sidebarSupportBtn"><i class="fa-solid fa-headset icon-main"></i> Тех. поддержка</a>
    </div>

    <div id="chat-window">
        <div class="chat-header" id="chat-header">
            <div class="chat-header-info">
                <i class="fa-solid fa-grip-vertical drag-handle"></i>
                <span class="chat-header-title">D&S Support</span>
            </div>
            <i class="fa-solid fa-xmark" id="chat-close"></i>
        </div>
        <div id="chat-messages">
            <div class="chat-system-msg" id="chatGreeting">Войдите в аккаунт, чтобы написать нам.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Введите сообщение..." disabled>
            <button id="chat-send" style="background: #333;" disabled><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="auth-wrapper fade-in">
        <div class="auth-container">
            <div class="auth-content">
                <div id="errorMsg" class="error-msg"></div>

                <div id="authSection">
                    <h2 class="auth-title" id="authTitle">Авторизация</h2>
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Никнейм" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Пароль">
                    </div>
                    <button class="auth-btn" id="submitBtn" onclick="handleAuth()">Войти</button>
                    <div class="toggle-text" onclick="toggleMode()">Создать новый аккаунт</div>
                </div>

                <div id="profileSection" class="hidden">
                    <img id="uAvatar" src="../dslogo.png" alt="Avatar" class="profile-avatar">
                    <h2 class="profile-name" id="uName">Никнейм</h2>
                    <p class="profile-id">ID: <span id="uId">...</span></p>
                    <button class="logout-btn" onclick="logout()">Выйти из аккаунта</button>
                </div>
            </div>
        </div>

        <a href="https://dxtrslizze.xyz/" class="back-to-main"><i class="fa-solid fa-arrow-left"></i> На главную страницу</a>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // === ЛОГИКА АВТОРИЗАЦИИ ===
        const API_URL = "https://dxtr-games-api.onrender.com/api/auth";
        let isLoginMode = true;

        window.onload = async () => {
            const token = localStorage.getItem('dxtr_token');
            if (token) {
                await fetchProfile(token);
                initChatSocket(token); // Запускаем сокеты чата только если есть токен
            }
        };

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "Авторизация" : "Регистрация";
            document.getElementById('submitBtn').innerText = isLoginMode ? "Войти" : "Создать";
            document.querySelector('.toggle-text').innerText = isLoginMode ? "Создать новый аккаунт" : "Уже есть аккаунт? Войти";
            hideError();
        }

        function showError(msg) {
            const err = document.getElementById('errorMsg');
            err.innerText = msg; err.style.display = 'block';
        }
        function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

        async function handleAuth() {
            hideError();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();

            if (!u || !p) return showError("Заполни все поля!");

            const endpoint = isLoginMode ? "/login" : "/register";
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Загрузка..."; btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('dxtr_token', data.token);
                    location.reload(); // Перезагружаем страницу, чтобы подхватился профиль и чат
                } else {
                    showError(data.error || "Произошла ошибка");
                }
            } catch (e) {
                showError("Ошибка соединения с сервером");
            } finally {
                btn.innerText = isLoginMode ? "Войти" : "Создать";
                btn.disabled = false;
            }
        }

        async function fetchProfile(token) {
            try {
                const res = await fetch(`${API_URL}/me`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.success) {
                    showProfileUI(data.user);
                } else {
                    localStorage.removeItem('dxtr_token');
                }
            } catch (e) { console.error("Ошибка загрузки профиля", e); }
        }

        function showProfileUI(user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('profileSection').classList.remove('hidden');
            document.getElementById('uName').innerText = user.username;
            document.getElementById('uId').innerText = user.clientId;
            if(user.avatarUrl && user.avatarUrl !== 'dslogo.png') {
                document.getElementById('uAvatar').src = user.avatarUrl;
            }
        }

        function logout() {
            localStorage.removeItem('dxtr_token');
            location.reload();
        }

        // === ИНТЕРФЕЙС МЕНЮ И ЧАТА ===
        const burgerBtn = document.getElementById('burgerBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const closeSidebar = document.getElementById('closeSidebar');
        const sidebarSupportBtn = document.getElementById('sidebarSupportBtn');
        const chatWindow = document.getElementById('chat-window');
        const chatClose = document.getElementById('chat-close');
        
        function toggleMenu() { sidebar.classList.toggle('active'); sidebarOverlay.classList.toggle('active'); }
        burgerBtn.onclick = toggleMenu; closeSidebar.onclick = toggleMenu; sidebarOverlay.onclick = toggleMenu;

        sidebarSupportBtn.onclick = (e) => {
            e.preventDefault(); toggleMenu();
            setTimeout(() => { chatWindow.style.display = 'flex'; }, 300);
        };
        chatClose.onclick = () => chatWindow.style.display = 'none';

        // === ЛОГИКА ЧАТА (ЧЕРЕЗ JWT ТОКЕН) ===
        let socket;
        function initChatSocket(token) {
            socket = io("https://dxtr-games-api.onrender.com/");
            const chatInput = document.getElementById('chat-input');
            const chatSendBtn = document.getElementById('chat-send');
            const chatGreeting = document.getElementById('chatGreeting');
            const chatMessages = document.getElementById('chat-messages');

            socket.on('connect', () => {
                socket.emit('register_client', { token: token });
            });

            socket.on('auth_required', (data) => {
                chatGreeting.innerText = data.message;
            });

            socket.on('user_data', (d) => {
                window.userNickname = d.nickname;
                chatGreeting.innerHTML = `Чат тех. поддержки. Приветствую, <b>${d.nickname}</b>!`;
                chatInput.disabled = false;
                chatInput.placeholder = "Опишите проблему...";
                chatSendBtn.disabled = false;
                chatSendBtn.style.background = 'linear-gradient(135deg, var(--neon-purple), var(--neon-cyan))';
            });

            socket.on('receive_message', (d) => {
                if (chatWindow.style.display === 'none' || chatWindow.style.display === '') chatWindow.style.display = 'flex';
                addChatMessage('Support', d.text, 'flex-start', d.isWarning, d.isSuccess);
            });

            chatSendBtn.onclick = sendMessage;
            chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") { e.preventDefault(); sendMessage(); } });

            function sendMessage() {
                const text = chatInput.value.trim();
                if (!text || chatInput.disabled) return;
                socket.emit('send_message', { text: text, token: token });
                addChatMessage(window.userNickname || 'Вы', text, 'flex-end', false, false);
                chatInput.value = '';
            }

            function addChatMessage(sender, text, align, isWarn = false, isSucc = false) {
                const wrapper = document.createElement('div');
                wrapper.className = `chat-msg-wrapper ${align === 'flex-end' ? 'msg-user' : 'msg-bot'}`;
                
                const nameLab = document.createElement('span');
                nameLab.className = 'chat-msg-name';
                nameLab.textContent = sender;
                
                const bubble = document.createElement('div');
                bubble.className = 'chat-msg-bubble';
                bubble.textContent = text;
                
                if (isWarn) { nameLab.style.color = 'var(--neon-red)'; bubble.style.background = 'rgba(255,0,51,0.1)'; bubble.style.border = '1px solid var(--neon-red)'; } 
                else if (isSucc) { nameLab.style.color = 'var(--neon-green)'; bubble.style.background = 'rgba(0,255,102,0.1)'; bubble.style.border = '1px solid var(--neon-green)'; }
                
                wrapper.appendChild(nameLab); wrapper.appendChild(bubble);
                chatMessages.appendChild(wrapper);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }
    </script>
</body>
</html>
