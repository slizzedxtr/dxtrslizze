<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXTR | SlizZe - Профиль</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-color: #bc13fe;
            --neon-glow: 0 0 10px rgba(188, 19, 254, 0.5), 0 0 20px rgba(188, 19, 254, 0.3);
            --bg-color: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a0b2e 0%, var(--bg-color) 70%);
        }

        /* Кнопка "На главную" */
        .back-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .back-nav:hover { color: var(--neon-color); text-shadow: var(--neon-glow); }

        /* Основной контейнер */
        .profile-container {
            background: var(--panel-bg);
            border: 1px solid rgba(188, 19, 254, 0.2);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(188, 19, 254, 0.05);
            backdrop-filter: blur(10px);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h2 {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #fff;
            text-shadow: var(--neon-glow);
        }

        /* Поля ввода */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: var(--neon-color);
            box-shadow: var(--neon-glow);
        }

        /* Кнопки */
        .cyber-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--neon-color);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .cyber-btn:hover {
            background: var(--neon-color);
            box-shadow: var(--neon-glow);
            color: #000;
        }
        .cyber-btn.logout {
            border-color: #ff3366;
            margin-top: 30px;
        }
        .cyber-btn.logout:hover {
            background: #ff3366;
            box-shadow: 0 0 10px rgba(255, 51, 102, 0.5);
            color: #fff;
        }

        /* Переключатель Логин/Рега */
        .toggle-auth {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
            cursor: pointer;
            transition: 0.3s;
        }
        .toggle-auth:hover { color: var(--neon-color); }

        /* Ошибки */
        #errorMsg { color: #ff3366; font-size: 14px; margin-bottom: 15px; display: none; font-weight: 600; }

        /* Карточка профиля */
        .avatar-box {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--neon-color);
            margin: 0 auto 20px;
            overflow: hidden;
            box-shadow: var(--neon-glow);
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .stat-box {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-box span { font-weight: 800; color: var(--neon-color); font-size: 20px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <a href="../" class="back-nav">◄ Назад</a>

    <div class="profile-container">
        <div id="errorMsg"></div>

        <div id="authSection">
            <h2 id="authTitle">Авторизация</h2>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Никнейм" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Пароль">
            </div>

            <button class="cyber-btn" id="submitBtn" onclick="handleAuth()">Войти</button>
            <div class="toggle-auth" onclick="toggleMode()">Нет аккаунта? Зарегистрироваться</div>
        </div>

        <div id="profileSection" class="hidden">
            <h2>Профиль</h2>
            <div class="avatar-box">
                <img id="uAvatar" src="" alt="Avatar">
            </div>
            <h3 id="uName" style="font-size: 24px; margin-bottom: 5px;"></h3>
            <p style="color: #aaa; font-size: 12px; margin-bottom: 20px;">ID: <span id="uId"></span></p>

            <button class="cyber-btn logout" onclick="logout()">Выйти из системы</button>
        </div>
    </div>

    <script>
        // АДРЕС ТВОЕГО НОВОГО БЭКЕНДА
        const API_URL = "https://dxtr-games-api.onrender.com/api/auth";
        let isLoginMode = true;

        // При загрузке страницы проверяем, есть ли токен
        window.onload = async () => {
            const token = localStorage.getItem('dxtr_token');
            if (token) {
                await fetchProfile(token);
            }
        };

        // Переключатель текста (Вход <-> Регистрация)
        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "Авторизация" : "Регистрация";
            document.getElementById('submitBtn').innerText = isLoginMode ? "Войти" : "Создать аккаунт";
            document.querySelector('.toggle-auth').innerText = isLoginMode ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти";
            hideError();
        }

        function showError(msg) {
            const err = document.getElementById('errorMsg');
            err.innerText = msg;
            err.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }

        // Основная функция Входа/Регистрации
        async function handleAuth() {
            hideError();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();

            if (!u || !p) return showError("Заполни все поля!");

            const endpoint = isLoginMode ? "/login" : "/register";
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Загрузка...";
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();

                if (data.success) {
                    // Сохраняем токен!
                    localStorage.setItem('dxtr_token', data.token);
                    await fetchProfile(data.token);
                } else {
                    showError(data.error || "Произошла ошибка");
                }
            } catch (e) {
                showError("Ошибка соединения с сервером");
            } finally {
                btn.innerText = isLoginMode ? "Войти" : "Создать аккаунт";
                btn.disabled = false;
            }
        }

        // Запрос данных профиля по токену
        async function fetchProfile(token) {
            try {
                const res = await fetch(`${API_URL}/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.success) {
                    showProfileUI(data.user);
                } else {
                    // Если токен просрочен или неверный - удаляем его
                    localStorage.removeItem('dxtr_token');
                }
            } catch (e) {
                console.error("Ошибка загрузки профиля", e);
            }
        }

        // Отрисовка личного кабинета
        function showProfileUI(user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('profileSection').classList.remove('hidden');

            document.getElementById('uName').innerText = user.username;
            document.getElementById('uId').innerText = user.clientId;
            // Ставим логотип по умолчанию, если аватара нет
            document.getElementById('uAvatar').src = user.avatarUrl && user.avatarUrl !== 'dslogo.png' 
                ? user.avatarUrl 
                : 'https://dxtrslizze.xyz/assets/images/dslogo.png'; // Укажи точный путь до твоего лого, если он не грузится
        }

        // Выход из аккаунта
        function logout() {
            localStorage.removeItem('dxtr_token');
            location.reload();
        }
    </script>
</body>
</html>
