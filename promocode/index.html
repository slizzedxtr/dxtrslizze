<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMOCODE | DXTR | SlizZe</title>
    <meta name="description" content="Секретная страница. Введите промокод для доступа к эксклюзивным материалам.">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-green-glow: rgba(0, 255, 102, 0.4);
            --bg-dark: #020602;
            --glass-bg: rgba(5, 15, 5, 0.7);
            --glass-border: rgba(0, 255, 102, 0.2);
            --text-main: #ffffff;
            --text-muted: #8aa88a;
            --error-red: #cc4444; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* МАТРИЦА ФОН */
        #matrixCanvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; opacity: 0.6;
        }
        
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;
            background: radial-gradient(circle at center, transparent 30%, var(--bg-dark) 100%);
        }

        /* МЕНЮ И БУРГЕР */
        .burger-btn { position: fixed; top: 25px; left: 25px; z-index: 10001; background: rgba(0,255,102,0.05); border: 1px solid var(--glass-border); width: 45px; height: 45px; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: white; font-size: 1.2rem; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
        .burger-btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); border-color: var(--neon-green); }
        .sidebar { position: fixed; top: 0; left: -300px; width: 300px; height: 100vh; background: rgba(2, 6, 2, 0.95); backdrop-filter: blur(25px); border-right: 1px solid var(--glass-border); z-index: 10000; display: flex; flex-direction: column; padding: 80px 30px 30px; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        .sidebar.active { left: 0; }
        .sidebar-link { color: white; text-decoration: none; font-size: 1.1rem; font-weight: 700; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 15px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .sidebar-link i { color: var(--neon-green); font-size: 1.4rem; transition: 0.3s; }
        .sidebar-link:hover { color: var(--neon-green); padding-left: 10px; border-bottom-color: var(--neon-green-glow); }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 9999; display: none; opacity: 0; transition: 0.3s; }
        .sidebar-overlay.active { display: block; opacity: 1; }

        /* ШАПКА СТРАНИЦЫ */
        header { text-align: center; padding: 10vh 20px 2vh; position: relative; z-index: 10; }
        header h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; text-transform: uppercase; letter-spacing: 10px; color: var(--neon-green); text-shadow: 0 0 25px var(--neon-green-glow); margin-bottom: 10px; }

        main { flex: 1; width: 100%; max-width: 900px; margin: 0 auto; padding: 0 20px 40px; z-index: 10; display: flex; flex-direction: column; align-items: center; position: relative; }

        /* ИНТЕРФЕЙС ПРОМОКОДА */
        .promo-wrapper { position: relative; width: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center; margin-top: 3vh; transition: all 0.5s ease-out; z-index: 10; }
        .promo-wrapper.hidden { opacity: 0; transform: scale(0.8); pointer-events: none; }
        
        .promo-box {
            display: flex; width: 100%; height: 70px; background: var(--glass-bg); border: 2px solid var(--neon-green); border-radius: 20px; overflow: hidden;
            box-shadow: 0 0 30px var(--neon-green-glow), inset 0 0 15px rgba(0, 255, 102, 0.1);
            backdrop-filter: blur(15px); transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative; z-index: 2;
        }
        
        .promo-box.collapsing { width: 70px; border-radius: 50%; background: var(--neon-green); border-color: #fff; box-shadow: 0 0 50px var(--neon-green); }
        .promo-box.collapsing input, .promo-box.collapsing button { opacity: 0; pointer-events: none; }

        .promo-box input { flex: 1; background: transparent; border: none; outline: none; padding: 0 25px; color: #fff; font-size: 1.2rem; font-weight: 700; text-align: center; font-family: 'Montserrat', sans-serif; letter-spacing: 2px; transition: opacity 0.3s; }
        .promo-box input::placeholder { color: var(--text-muted); font-weight: 500; letter-spacing: 1px; }
        
        .promo-box button { width: 70px; background: rgba(0, 255, 102, 0.1); border: none; border-left: 1px solid var(--glass-border); color: var(--neon-green); font-size: 1.5rem; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .promo-box button:hover { background: var(--neon-green); color: #000; box-shadow: -5px 0 20px var(--neon-green-glow); }

        .error-msg { margin-top: 15px; color: var(--error-red); font-size: 0.95rem; font-weight: 600; opacity: 0; transform: translateY(-10px); transition: all 0.3s; text-align: center; }
        .error-msg.visible { opacity: 1; transform: translateY(0); }

        /* ВСПЛЕСК КАПЕЛЬКИ */
        .splash-ring {
            position: absolute; top: 35px; left: 50%; width: 70px; height: 70px; background: var(--neon-green); border-radius: 50%;
            transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; z-index: 3;
        }
        .splash-ring.animate { animation: splashEffect 0.7s ease-out forwards; }
        @keyframes splashEffect {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(8); opacity: 0; }
        }

        /* === БЛОК ТРЕКА (ЗАБЛОКИРОВАННЫЙ И РАЗБЛОКИРОВАННЫЙ) === */
        .snippet-wrapper {
            width: 100%; display: flex; flex-direction: column; align-items: center; gap: 30px;
            margin-top: 20px; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative; z-index: 5;
        }
        /* Анимация подъема при разблокировке */
        .snippet-wrapper.unlocked { transform: translateY(-120px); }

        .hero-release {
            background: linear-gradient(135deg, rgba(5,20,10,0.8) 0%, rgba(2,10,5,0.9) 100%);
            backdrop-filter: blur(25px); border: 2px solid var(--glass-border); border-radius: 30px; padding: 40px; display: flex; gap: 40px; align-items: center; width: 100%; max-width: 850px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 255, 102, 0.05); position: relative; overflow: hidden;
            transition: all 0.6s ease-out; 
        }
        /* Меняем границу при разблокировке */
        .unlocked .hero-release { border-color: var(--neon-green); box-shadow: 0 0 50px rgba(0, 255, 102, 0.15), inset 0 0 20px rgba(0, 255, 102, 0.1); }
        
        .hero-release::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at center, rgba(0,255,102,0.1) 0%, transparent 60%); animation: rotateBg 15s linear infinite; pointer-events: none; z-index: 0; }
        @keyframes rotateBg { 100% { transform: rotate(360deg); } }

        /* Пульсация под бит */
        @keyframes beatPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .hero-release.pulsing { animation: beatPulse 0.5s infinite ease-out; }

        /* ОБЛОЖКА И ЕЁ ПЛАВНОЕ ПОКАЧИВАНИЕ */
        .hero-cover-wrap { 
            position: relative; flex-shrink: 0; width: 300px; aspect-ratio: 1/1; z-index: 1; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid var(--glass-border); 
            animation: float-cover 6s ease-in-out infinite; 
        }
        @keyframes float-cover {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        
        /* Заглушка обложки */
        .cover-placeholder {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(204, 68, 68, 0.1), rgba(0,0,0,0.8));
            display: flex; justify-content: center; align-items: center;
            font-size: 6rem; color: var(--error-red); text-shadow: 0 0 20px rgba(204, 68, 68, 0.5);
            transition: opacity 0.6s ease; z-index: 2;
        }
        .unlocked .cover-placeholder { opacity: 0; pointer-events: none; }
        
        /* Настоящая обложка */
        #realCover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: transform 0.5s, opacity 0.6s ease; z-index: 1;
        }
        .unlocked #realCover { opacity: 1; }
        .hero-cover-wrap:hover #realCover { transform: scale(1.05); }

        .hero-info { flex: 1; z-index: 1; display: flex; flex-direction: column; gap: 20px; width: 100%; }
        
        /* Бейджик статуса */
        .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 18px; border-radius: 50px; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; align-self: flex-start; transition: all 0.5s; }
        .locked-badge { color: var(--error-red); border: 1px solid var(--error-red); background: rgba(204, 68, 68, 0.1); box-shadow: 0 0 15px rgba(204, 68, 68, 0.3); }
        .unlocked-badge { color: var(--neon-green); border: 1px solid var(--neon-green); background: rgba(0, 255, 102, 0.15); box-shadow: 0 0 15px rgba(0, 255, 102, 0.3); }
        
        .hero-info h2 { font-size: 3rem; font-weight: 900; line-height: 1.1; color: #fff; text-shadow: 0 0 20px rgba(0,0,0,0.8); transition: color 0.5s; }
        .unlocked .hero-info h2 { text-shadow: 0 0 20px rgba(0,255,102,0.4); }

        /* ИСПРАВЛЕННЫЙ ПЛЕЕР (скрыт до разблокировки) */
        .audio-player-container { opacity: 0; max-height: 0; overflow: hidden; transition: all 0.6s ease; width: 100%; pointer-events: none; }
        .unlocked .audio-player-container { opacity: 1; max-height: 100px; pointer-events: all; }
        
        .audio-player { background: rgba(0,0,0,0.6); border-radius: 16px; padding: 15px 20px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--glass-border); box-shadow: inset 0 0 20px rgba(0,0,0,0.8); width: 100%; }
        .play-pause-btn { background: var(--neon-green); color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; box-shadow: 0 0 15px var(--neon-green-glow); flex-shrink: 0; }
        .play-pause-btn:hover { transform: scale(1.1); background: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.6); }
        
        .progress-container { flex: 1; height: 24px; display: flex; align-items: center; cursor: pointer; position: relative; touch-action: none; min-width: 50px; }
        .progress-container::before { content: ''; position: absolute; left: 0; width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .progress-bar { height: 6px; width: 0%; background: var(--neon-green); border-radius: 10px; position: relative; pointer-events: none; z-index: 2; box-shadow: 0 0 10px var(--neon-green); }
        .progress-bar::after { content: ''; position: absolute; right: -7px; top: -5px; width: 16px; height: 16px; background: #fff; border-radius: 50%; box-shadow: 0 0 12px var(--neon-green); }
        .time-display { font-size: 0.85rem; color: var(--text-muted); font-variant-numeric: tabular-nums; font-weight: 700; min-width: 90px; text-align: right; white-space: nowrap; flex-shrink: 0; }

        /* Кнопка Назад */
        #backBtn { opacity: 0; transform: translateY(-20px); transition: all 0.6s ease; pointer-events: none; background: transparent; border: 2px solid var(--text-muted); color: var(--text-muted); padding: 12px 30px; border-radius: 50px; font-size: 1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .unlocked #backBtn { opacity: 1; transform: translateY(0); pointer-events: all; }
        #backBtn:hover { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 15px rgba(0,255,102,0.2); transform: translateX(-5px); }

        /* ЧАТ ПОДДЕРЖКИ (ХАКЕРСКИЙ СТИЛЬ) */
        #chat-window {
            display: none; position: fixed; bottom: 30px; right: 30px; width: 380px; height: 520px; flex-direction: column; overflow: hidden;
            background: rgba(2, 6, 2, 0.85); border: 1px solid var(--glass-border); border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px var(--neon-green-glow), inset 0 0 20px rgba(0, 255, 102, 0.1);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 9999;
            animation: chatTerminalOpen 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .chat-header { background: linear-gradient(90deg, #050f05, #0a1f0a); border-bottom: 2px solid var(--neon-green); color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 2; cursor: grab; user-select: none; }
        .chat-header:active { cursor: grabbing; }
        .chat-header-info { display: flex; align-items: center; gap: 10px; }
        .chat-header-title { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-green); }
        .drag-handle { color: rgba(255,255,255,0.3); font-size: 1rem; }
        #chat-close { cursor: pointer; font-size: 1.5rem; transition: 0.3s; color: var(--text-muted); padding: 5px; }
        #chat-close:hover { color: var(--neon-green); transform: rotate(90deg); text-shadow: 0 0 10px var(--neon-green); }
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; font-size: 0.95rem; scroll-behavior: smooth; }
        #chat-messages::-webkit-scrollbar { width: 4px; }
        #chat-messages::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        #chat-messages::-webkit-scrollbar-thumb { background: var(--neon-green); border-radius: 10px; box-shadow: 0 0 10px var(--neon-green); }
        .chat-system-msg { color: var(--neon-green); text-align: center; font-size: 0.8rem; font-weight: 600; margin-bottom: 10px; padding: 8px; border: 1px dashed var(--glass-border); border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; background: rgba(0,0,0,0.3); }
        .chat-msg-wrapper { display: flex; flex-direction: column; animation: msgFade 0.3s ease-out forwards; }
        @keyframes msgFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .chat-msg-name { font-size: 0.7rem; font-weight: 900; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
        .chat-msg-bubble { padding: 14px 18px; border-radius: 16px; color: #fff; max-width: 85%; word-wrap: break-word; line-height: 1.5; box-shadow: 0 5px 20px rgba(0,0,0,0.4); backdrop-filter: blur(10px); font-weight: 500; }
        .msg-user { align-items: flex-end; }
        .msg-user .chat-msg-name { color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.3); }
        .msg-user .chat-msg-bubble { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); border-bottom-right-radius: 2px; }
        .msg-bot { align-items: flex-start; }
        .msg-bot .chat-msg-name { color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green-glow); }
        .msg-bot .chat-msg-bubble { background: rgba(0, 255, 102, 0.05); border: 1px solid var(--glass-border); border-bottom-left-radius: 2px; }
        .chat-input-area { padding: 15px 20px; display: flex; gap: 12px; border-top: 1px solid var(--glass-border); background: rgba(2, 6, 2, 0.9); z-index: 2; position: relative; }
        #chat-input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: #fff; padding: 14px 18px; border-radius: 14px; outline: none; font-family: 'Montserrat', sans-serif; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        #chat-input:focus { border-color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green-glow), inset 0 0 10px rgba(0, 255, 102, 0.1); }
        #chat-send { background: linear-gradient(135deg, #0a290a, #004d1f); border: 2px solid var(--glass-border); color: var(--neon-green); width: 52px; height: 52px; border-radius: 14px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px var(--neon-green-glow); display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }
        #chat-send:hover { transform: translateY(-2px) scale(1.05); background: var(--neon-green); color: #000; border-color: #fff; box-shadow: 0 0 25px var(--neon-green); }

        /* Мобильная адаптация */
        @media (max-width: 900px) {
            .hero-release { flex-direction: column; text-align: center; padding: 30px 20px; }
            .hero-cover-wrap { width: 100%; max-width: 250px; }
            .hero-badge { align-self: center; }
            .hero-info h2 { font-size: 2.2rem; }
            .snippet-wrapper.unlocked { transform: translateY(-90px); } /* Чуть меньше подъем на планшетах */
        }
        @media (max-width: 600px) {
            header h1 { font-size: 2.5rem; }
            .promo-box { height: 60px; }
            .promo-box input { font-size: 1rem; }
            .burger-btn { top: 15px; left: 15px; width: 40px; height: 40px; font-size: 1.1rem; }
            .snippet-wrapper.unlocked { transform: translateY(-80px); } /* Подъем на смартфонах */

            #chat-window { 
                width: 100vw !important; height: 75vh !important; bottom: 0 !important; left: 0 !important; right: 0 !important; top: auto !important;
                border-radius: 24px 24px 0 0 !important; border-bottom: none;
                animation: slideUpMobile 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            }
            .chat-header { border-radius: 24px 24px 0 0; cursor: default; }
            .drag-handle { display: none; }
        }
        @keyframes slideUpMobile { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="burger-btn" id="burgerBtn"><i class="fa-solid fa-bars"></i></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="color: var(--text-muted); font-size: 0.9rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
            МЕНЮ <i class="fa-solid fa-xmark" id="closeSidebar" style="font-size: 1.5rem; cursor: pointer; color: white; transition: 0.3s;"></i>
        </div>
        <a href="https://dxtrslizze.xyz/" class="sidebar-link"><i class="fa-solid fa-home"></i> Главная</a>
        <a href="https://dxtrslizze.xyz/muzcatalog/" class="sidebar-link"><i class="fa-solid fa-music"></i> Муз. каталог</a>
        <a href="https://dxtrslizze.xyz/about" class="sidebar-link"><i class="fa-solid fa-circle-info"></i> О нас</a>
        <a href="#" class="sidebar-link" id="sidebarSupportBtn">
            <i class="fa-solid fa-headset"></i> Тех. поддержка
        </a>
    </div>

    <header>
        <h1>PROMOCODE</h1>
    </header>

    <main>
        <div class="promo-wrapper" id="promoWrapper">
            <div class="promo-box" id="promoBox">
                <input type="text" id="promoInput" placeholder="Введите код доступа" autocomplete="off" spellcheck="false">
                <button id="promoSubmit"><i class="fa-solid fa-terminal"></i></button>
            </div>
            <div class="error-msg" id="promoError">Данный промокод не существует</div>
            <div class="splash-ring" id="splashRing"></div>
        </div>

        <div class="snippet-wrapper" id="snippetWrapper">
            <div class="hero-release" id="snippetHero">
                <div class="hero-cover-wrap">
                    <div class="cover-placeholder" id="coverPlaceholder"><i class="fa-solid fa-question"></i></div>
                    <img src="../logo_Dance_Girl.jpeg" id="realCover" alt="Dance Girl" onerror="this.src='dslogo.png'">
                </div>
                <div class="hero-info">
                    <div class="hero-badge locked-badge" id="lockBadge">
                        <i class="fa-solid fa-lock"></i> Контент заблокирован
                    </div>
                    <h2 id="trackTitle">???</h2>
                    
                    <div class="audio-player-container">
                        <div class="audio-player">
                            <button class="play-pause-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
                            <audio id="snippetAudio" src="../snippet_Dance_Girl.mp3" preload="metadata" crossorigin="anonymous"></audio>
                            <div class="progress-container" id="progressContainer">
                                <div class="progress-bar" id="progressBar"></div>
                            </div>
                            <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                        </div>
                    </div>
                </div>
            </div>
            <button id="backBtn" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i> Назад</button>
        </div>
    </main>

    <div id="chat-window">
        <div class="chat-header" id="chat-header">
            <div class="chat-header-info">
                <i class="fa-solid fa-grip-vertical drag-handle"></i>
                <span class="chat-header-title">DS Support</span>
            </div>
            <i class="fa-solid fa-xmark" id="chat-close"></i>
        </div>
        <div id="chat-messages">
            <div class="chat-system-msg" id="chatGreeting">Система тех. поддержки активна. Задайте ваш вопрос.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Ввод команды/проблемы...">
            <button id="chat-send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        // ==========================================
        // ======= НАСТРОЙКИ ПРОМОКОДА ==============
        // ==========================================
        const SECRET_PROMOCODE = "D&S_Dance";
        // ==========================================

        // === МАТРИЦА (КАНВАС) ===
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const matrixChars = "01".split(""); 
        const fontSize = 16; const columns = canvas.width / fontSize;
        const drops = []; for(let x = 0; x < columns; x++) drops[x] = 1;
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 6, 2, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff66'; ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        });

        // === МЕНЮ БУРГЕР ===
        const burgerBtn = document.getElementById('burgerBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const closeSidebar = document.getElementById('closeSidebar');
        const sidebarSupportBtn = document.getElementById('sidebarSupportBtn');

        function toggleMenu() { sidebar.classList.toggle('active'); sidebarOverlay.classList.toggle('active'); }
        burgerBtn.onclick = toggleMenu; closeSidebar.onclick = toggleMenu; sidebarOverlay.onclick = toggleMenu;

        // === ЛОГИКА ЧАТА (ХАКЕРСКАЯ) ===
        const chatWindow = document.getElementById('chat-window');
        const chatClose = document.getElementById('chat-close');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send');
        const chatHeader = document.getElementById('chat-header');

        const fpPromise = import('https://openfpcdn.io/fingerprintjs/v4').then(FingerprintJS => FingerprintJS.load());
        let clientId = localStorage.getItem('dxtrClientId') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('dxtrClientId', clientId);
        window.userNickname = localStorage.getItem('dxtrUserNickname') || null;

        const socket = io("https://dxtrslizze.onrender.com/");

        sidebarSupportBtn.onclick = (e) => {
            e.preventDefault(); toggleMenu();
            setTimeout(() => {
                chatWindow.style.display = 'flex'; chatMessages.scrollTop = chatMessages.scrollHeight;
                if(window.innerWidth > 600) { chatWindow.style.left = 'auto'; chatWindow.style.top = 'auto'; chatWindow.style.right = '30px'; chatWindow.style.bottom = '30px'; }
            }, 300);
        };
        chatClose.onclick = () => chatWindow.style.display = 'none';

        let isDraggingChat = false, chatOffsetX, chatOffsetY;
        chatHeader.addEventListener('mousedown', (e) => {
            if (window.innerWidth <= 600 || e.target.id === 'chat-close') return;
            isDraggingChat = true; chatWindow.style.animation = 'none'; chatWindow.style.transform = 'none';
            const rect = chatWindow.getBoundingClientRect();
            chatOffsetX = e.clientX - rect.left; chatOffsetY = e.clientY - rect.top;
            chatWindow.style.right = 'auto'; chatWindow.style.bottom = 'auto'; chatWindow.style.margin = '0';
            chatWindow.style.left = rect.left + 'px'; chatWindow.style.top = rect.top + 'px';
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDraggingChat) return; e.preventDefault();
            let newX = e.clientX - chatOffsetX; let newY = e.clientY - chatOffsetY;
            newX = Math.max(0, Math.min(newX, window.innerWidth - chatWindow.offsetWidth));
            newY = Math.max(0, Math.min(newY, window.innerHeight - chatWindow.offsetHeight));
            chatWindow.style.left = `${newX}px`; chatWindow.style.top = `${newY}px`;
        });
        document.addEventListener('mouseup', () => isDraggingChat = false);

        socket.on('connect', () => { fpPromise.then(fp => fp.get()).then(result => socket.emit('register_client', { clientId: clientId, fpHash: result.visitorId })); });
        socket.on('receive_message', d => {
            if (chatWindow.style.display === 'none') chatWindow.style.display = 'flex';
            addChatMessage('Support', d.text, 'flex-start', true, false, true);
        });

        chatSendBtn.onclick = sendMessage;
        chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

        function sendMessage() {
            const t = chatInput.value.trim(); if (!t) return;
            socket.emit('send_message', { text: t, clientId: clientId });
            addChatMessage(window.userNickname || 'Вы', t, 'flex-end');
            chatInput.value = '';
        }

        function addChatMessage(sender, text, align, save = true, isError = false, isBot = false) {
            const wrapper = document.createElement('div'); wrapper.className = `chat-msg-wrapper ${align === 'flex-end' ? 'msg-user' : 'msg-bot'}`;
            const nameLab = document.createElement('span'); nameLab.className = 'chat-msg-name'; nameLab.textContent = sender;
            const bubble = document.createElement('div'); bubble.className = 'chat-msg-bubble'; bubble.textContent = text;
            wrapper.appendChild(nameLab); wrapper.appendChild(bubble);
            chatMessages.appendChild(wrapper); chatMessages.scrollTop = chatMessages.scrollHeight;
            if (save) {
                const h = JSON.parse(localStorage.getItem('dxtrChatHistory')) || []; h.push({ sender, text, align, isBot });
                if (h.length > 50) h.shift(); localStorage.setItem('dxtrChatHistory', JSON.stringify(h));
            }
        }
        (JSON.parse(localStorage.getItem('dxtrChatHistory')) || []).forEach(m => addChatMessage(m.sender, m.text, m.align, false, false, m.isBot));

        // === ЛОГИКА РАЗБЛОКИРОВКИ ===
        const promoInput = document.getElementById('promoInput');
        const promoSubmit = document.getElementById('promoSubmit');
        const promoError = document.getElementById('promoError');
        const promoBox = document.getElementById('promoBox');
        const promoWrapper = document.getElementById('promoWrapper');
        const splashRing = document.getElementById('splashRing');
        
        const snippetWrapper = document.getElementById('snippetWrapper');
        const lockBadge = document.getElementById('lockBadge');
        const trackTitle = document.getElementById('trackTitle');

        function checkPromo() {
            const val = promoInput.value.trim();
            if (val === "") return;

            if (val === SECRET_PROMOCODE) {
                promoError.classList.remove('visible');
                promoBox.classList.add('collapsing'); // 1. Сжимаем поле
                
                setTimeout(() => {
                    promoBox.style.opacity = '0'; // Прячем сжатый кружок
                    splashRing.classList.add('animate'); // Пускаем всплеск
                    
                    setTimeout(() => {
                        // 2. Скрываем блок ввода (плавный fade out)
                        promoWrapper.classList.add('hidden');
                        
                        // 3. Поднимаем трек и разблокируем визуал
                        snippetWrapper.classList.add('unlocked');
                        
                        lockBadge.classList.remove('locked-badge');
                        lockBadge.classList.add('unlocked-badge');
                        lockBadge.innerHTML = '<i class="fa-solid fa-lock-open"></i> Доступ открыт';
                        trackTitle.textContent = 'Dance Girl';
                        
                    }, 200); 
                }, 600); 
            } else {
                // Ошибка
                promoError.classList.add('visible');
                promoBox.style.transform = 'translateX(-10px)';
                setTimeout(() => promoBox.style.transform = 'translateX(10px)', 100);
                setTimeout(() => promoBox.style.transform = 'translateX(-10px)', 200);
                setTimeout(() => promoBox.style.transform = 'translateX(0)', 300);
            }
        }

        promoSubmit.onclick = checkPromo;
        promoInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPromo(); });
        promoInput.addEventListener('input', () => promoError.classList.remove('visible'));

        function goBack() {
            // Остановка музыки
            if(snippetAudio) { snippetAudio.pause(); snippetAudio.currentTime = 0; }
            if(playBtnIcon) playBtnIcon.className = 'fa-solid fa-play';
            if(snippetHero) {
                snippetHero.style.transform = `scale(1)`;
                snippetHero.style.boxShadow = `0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 255, 102, 0.05)`;
            }

            // 1. Опускаем трек вниз и блокируем
            snippetWrapper.classList.remove('unlocked');
            
            setTimeout(() => {
                lockBadge.classList.remove('unlocked-badge');
                lockBadge.classList.add('locked-badge');
                lockBadge.innerHTML = '<i class="fa-solid fa-lock"></i> Контент заблокирован';
                trackTitle.textContent = '???';
            }, 300);

            // 2. Возвращаем поле ввода
            setTimeout(() => {
                promoWrapper.classList.remove('hidden');
                splashRing.classList.remove('animate');
                
                setTimeout(() => {
                    promoBox.style.opacity = '1';
                    promoBox.classList.remove('collapsing');
                    promoInput.value = ''; 
                }, 50);
            }, 600);
        }

        // === Web Audio API: НАСТОЯЩАЯ ПУЛЬСАЦИЯ ПОД БИТ ===
        const snippetAudio = document.getElementById('snippetAudio');
        const snippetHero = document.getElementById('snippetHero');
        let audioCtx, analyser, source, dataArray;
        let isAudioSetup = false;

        function setupAudio() {
            if (isAudioSetup) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256; 
            source = audioCtx.createMediaElementSource(snippetAudio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            isAudioSetup = true;
            pulseBeat();
        }

        function pulseBeat() {
            requestAnimationFrame(pulseBeat);
            if (snippetAudio.paused) return; 

            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i = 0; i < 10; i++) sum += dataArray[i];
            let avg = sum / 10; 
            
            if (avg < 30) {
                snippetHero.style.transform = `scale(1)`;
                snippetHero.style.boxShadow = `0 0 50px rgba(0, 255, 102, 0.15), inset 0 0 20px rgba(0, 255, 102, 0.1)`;
                return;
            }
            
            let scale = 1 + (avg / 255) * 0.05; 
            let glow = 50 + (avg / 255) * 70;
            snippetHero.style.transform = `scale(${scale})`;
            snippetHero.style.boxShadow = `0 0 ${glow}px rgba(0, 255, 102, 0.3), inset 0 0 ${glow/2}px rgba(0, 255, 102, 0.2)`;
        }

        // === АУДИОПЛЕЕР С ИСПРАВЛЕННОЙ ПЕРЕМОТКОЙ ===
        const playBtnIcon = document.querySelector('#playBtn i');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const timeDisplay = document.getElementById('timeDisplay');
        let isDragging = false;

        function togglePlay() {
            if (!isAudioSetup) setupAudio(); 
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            if (snippetAudio.paused) {
                snippetAudio.play();
                playBtnIcon.className = 'fa-solid fa-pause';
            } else {
                snippetAudio.pause();
                playBtnIcon.className = 'fa-solid fa-play';
                snippetHero.style.transform = `scale(1)`;
                snippetHero.style.boxShadow = `0 0 50px rgba(0, 255, 102, 0.15), inset 0 0 20px rgba(0, 255, 102, 0.1)`;
            }
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "00:00";
            const min = Math.floor(seconds / 60); const sec = Math.floor(seconds % 60);
            return `${min < 10 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        snippetAudio.addEventListener('loadedmetadata', () => { timeDisplay.textContent = `00:00 / ${formatTime(snippetAudio.duration)}`; });

        function updateProgress(clientX) {
            const rect = progressContainer.getBoundingClientRect();
            let offsetX = clientX - rect.left; const width = rect.width;
            if (offsetX < 0) offsetX = 0; if (offsetX > width) offsetX = width;
            const percentage = offsetX / width;
            progressBar.style.width = (percentage * 100) + '%';
            if (snippetAudio.duration) {
                const targetTime = percentage * snippetAudio.duration;
                timeDisplay.textContent = `${formatTime(targetTime)} / ${formatTime(snippetAudio.duration)}`;
                snippetAudio.currentTime = targetTime;
            }
        }

        progressContainer.addEventListener('mousedown', (e) => { isDragging = true; updateProgress(e.clientX); });
        window.addEventListener('mousemove', (e) => { if (isDragging) { e.preventDefault(); updateProgress(e.clientX); } });
        window.addEventListener('mouseup', () => { isDragging = false; });
        progressContainer.addEventListener('touchstart', (e) => { isDragging = true; updateProgress(e.touches[0].clientX); }, { passive: false });
        progressContainer.addEventListener('touchmove', (e) => { if (isDragging) { e.preventDefault(); updateProgress(e.touches[0].clientX); } }, { passive: false });
        progressContainer.addEventListener('touchend', () => { isDragging = false; });

        snippetAudio.addEventListener('timeupdate', () => {
            if (snippetAudio.duration && !isDragging) {
                const progressPercent = (snippetAudio.currentTime / snippetAudio.duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
                timeDisplay.textContent = `${formatTime(snippetAudio.currentTime)} / ${formatTime(snippetAudio.duration)}`;
            }
        });

        snippetAudio.addEventListener('ended', () => {
            playBtnIcon.className = 'fa-solid fa-play'; progressBar.style.width = '0%'; snippetAudio.currentTime = 0;
            timeDisplay.textContent = `00:00 / ${formatTime(snippetAudio.duration)}`;
            snippetHero.style.transform = `scale(1)`; snippetHero.style.boxShadow = `0 0 50px rgba(0, 255, 102, 0.15), inset 0 0 20px rgba(0, 255, 102, 0.1)`;
        });
    </script>
</body>
</html>
