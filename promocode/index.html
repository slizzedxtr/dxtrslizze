<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXTR | SlizZe — PROMOCODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../dslogo.png">

    <style>
        /* ============================================================
           КОНФИГУРАЦИЯ: ПРОМОКОД ХРАНИТСЯ ЗДЕСЬ
           Измените значение VALID_PROMO чтобы сменить промокод
           ============================================================ */
        :root {
            --valid-promo-placeholder: "D&S_Dance"; /* Только для отображения, логика ниже */
        }
        /* ============================================================ */

        :root {
            --matrix-green: #00ff41;
            --matrix-dim: #003b10;
            --matrix-mid: #00a832;
            --matrix-glow: rgba(0, 255, 65, 0.4);
            --bg-dark: #010c02;
            --glass-bg: rgba(0, 20, 5, 0.75);
            --glass-border: rgba(0, 255, 65, 0.15);
            --text-muted: #3a7a45;
            --neon-red: #ff2244;
            --neon-cyan: #00c6ff;
            --neon-purple: #7000ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--matrix-green);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== MATRIX RAIN CANVAS ===== */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            opacity: 0.35;
        }

        /* Тёмный оверлей для читаемости */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(1, 12, 2, 0.7) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== МЕНЮ (боковое) ===== */
        .burger-btn {
            position: fixed; top: 25px; left: 25px; z-index: 10001;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.25);
            width: 45px; height: 45px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            color: var(--matrix-green); font-size: 1.2rem; cursor: pointer;
            transition: 0.3s; backdrop-filter: blur(10px);
        }
        .burger-btn:hover {
            background: var(--matrix-green); color: #000;
            box-shadow: 0 0 20px var(--matrix-glow);
        }

        .sidebar-overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            z-index: 9999; display: none; opacity: 0; transition: 0.3s;
        }
        .sidebar-overlay.active { display: block; opacity: 1; }

        .sidebar {
            position: fixed; top: 0; left: -300px;
            width: 300px; height: 100vh;
            background: rgba(1, 8, 2, 0.95);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(0, 255, 65, 0.25);
            z-index: 10000;
            display: flex; flex-direction: column;
            padding: 80px 30px 30px;
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.8);
        }
        .sidebar.active { left: 0; }

        .sidebar-header {
            color: var(--text-muted); font-size: 0.9rem; font-weight: 800;
            letter-spacing: 2px; margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-header-close {
            font-size: 1.5rem; cursor: pointer; color: var(--matrix-green);
            transition: 0.3s;
        }
        .sidebar-header-close:hover { color: var(--neon-red); transform: rotate(90deg); }

        .sidebar-link {
            color: white; text-decoration: none;
            font-size: 1.1rem; font-weight: 700;
            padding: 18px 0;
            border-bottom: 1px solid rgba(0, 255, 65, 0.07);
            display: flex; align-items: center; gap: 15px;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .sidebar-link .icon-main { color: var(--matrix-green); font-size: 1.4rem; transition: 0.3s; }
        .sidebar-link:hover, .sidebar-link.active {
            color: var(--matrix-green); padding-left: 10px;
            border-bottom-color: rgba(0, 255, 65, 0.3);
        }

        /* ===== ЗАГОЛОВОК СТРАНИЦЫ ===== */
        header {
            text-align: center;
            padding: 6vh 20px 4vh;
            position: relative; z-index: 10;
        }
        header h1 {
            font-size: clamp(3rem, 7vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #00ff41, #00c86a, #00ff41, #7fff00);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 5s linear infinite;
            filter: drop-shadow(0 0 20px rgba(0, 255, 65, 0.5));
        }
        @keyframes gradient-shift {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        main {
            flex: 1; width: 100%; max-width: 800px;
            margin: 0 auto; padding: 0 20px 60px;
            z-index: 10; position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ===== ПОЛЕ ВВОДА ПРОМОКОДА ===== */
        #promo-section {
            width: 100%; display: flex; flex-direction: column;
            align-items: center; gap: 20px; margin-top: 30px;
        }

        .promo-label {
            font-size: 0.9rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 3px;
            color: var(--text-muted);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .promo-input-wrap {
            position: relative; width: 100%; max-width: 460px;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #promo-input {
            width: 100%;
            background: rgba(0, 20, 5, 0.7);
            border: 2px solid rgba(0, 255, 65, 0.3);
            color: var(--matrix-green);
            padding: 18px 60px 18px 24px;
            border-radius: 16px;
            font-size: 1.15rem;
            font-weight: 700;
            font-family: 'Montserrat', monospace;
            letter-spacing: 2px;
            outline: none;
            transition: 0.3s;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.05), inset 0 0 20px rgba(0, 0, 0, 0.4);
        }
        #promo-input::placeholder { color: var(--text-muted); letter-spacing: 1px; }
        #promo-input:focus {
            border-color: var(--matrix-green);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2), inset 0 0 15px rgba(0, 255, 65, 0.05);
        }

        #promo-submit {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: transparent; border: none;
            color: var(--matrix-mid); font-size: 1.5rem;
            cursor: pointer; transition: 0.3s; padding: 5px;
        }
        #promo-submit:hover { color: var(--matrix-green); text-shadow: 0 0 15px var(--matrix-green); }

        #promo-error {
            font-size: 0.9rem; font-weight: 700;
            color: rgba(255, 34, 68, 0.75);
            letter-spacing: 1px; text-align: center;
            opacity: 0; transform: translateY(-5px);
            transition: opacity 0.3s, transform 0.3s;
            min-height: 20px;
        }
        #promo-error.show { opacity: 1; transform: translateY(0); }

        /* ===== АНИМАЦИЯ ИСЧЕЗНОВЕНИЯ ПОЛЯ ВВОДА ===== */
        @keyframes collapse-to-dot {
            0% { transform: scale(1) translateX(0); opacity: 1; border-radius: 16px; }
            40% { transform: scale(0.6) translateX(0); opacity: 1; border-radius: 30px; }
            70% { transform: scale(0.15) translateX(0); opacity: 1; border-radius: 50%; }
            85% { transform: scale(0.15) translateX(0); opacity: 1; border-radius: 50%; }
            100% { transform: scale(0) translateX(0); opacity: 0; border-radius: 50%; }
        }
        .collapsing { animation: collapse-to-dot 0.85s cubic-bezier(0.4, 0, 0.2, 1) forwards; pointer-events: none; }

        /* Капелька */
        .droplet {
            position: fixed;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #7fff00, var(--matrix-green));
            box-shadow: 0 0 20px var(--matrix-green), 0 0 40px rgba(0, 255, 65, 0.5);
            pointer-events: none; z-index: 9998;
            animation: droplet-fly 0.9s cubic-bezier(0.2, 0, 1, 0.8) forwards;
        }
        @keyframes droplet-fly {
            0% { transform: scale(1) translate(0, 0); opacity: 1; }
            50% { transform: scale(1.5) translate(0, -60px); opacity: 1; }
            100% { transform: scale(0) translate(0, -120px); opacity: 0; }
        }

        /* ===== СЕКЦИЯ СЕКРЕТНОГО ТРЕКА ===== */
        #secret-section {
            display: none; width: 100%;
            opacity: 0; transform: scale(0.9) translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #secret-section.visible { opacity: 1; transform: scale(1) translateY(0); }

        .secret-release {
            background: linear-gradient(135deg, rgba(0, 20, 5, 0.85) 0%, rgba(1, 8, 2, 0.95) 100%);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 2px solid var(--matrix-green);
            border-radius: 30px; padding: 40px;
            display: flex; gap: 40px; align-items: center;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.2), inset 0 0 30px rgba(0, 255, 65, 0.05);
            position: relative; overflow: hidden;
        }
        .secret-release::before {
            content: '';
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(0, 255, 65, 0.08) 0%, transparent 60%);
            animation: rotate 20s linear infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .secret-cover-wrap {
            position: relative; flex-shrink: 0;
            width: 300px; height: 300px; z-index: 1;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7), 0 0 30px rgba(0, 255, 65, 0.15);
            border: 1px solid rgba(0, 255, 65, 0.2);
            animation: float-cover 6s ease-in-out infinite;
        }
        @keyframes float-cover {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .secret-cover-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .secret-info {
            flex: 1; z-index: 1;
            display: flex; flex-direction: column; gap: 20px;
        }

        .secret-badge {
            display: inline-block;
            background: rgba(0, 255, 65, 0.1);
            color: var(--matrix-green);
            padding: 6px 18px; border-radius: 50px;
            font-size: 0.82rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px;
            border: 1px solid rgba(0, 255, 65, 0.4);
            align-self: flex-start;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        .secret-title-block { display: flex; flex-direction: column; gap: 6px; }
        .secret-snippet-label {
            font-size: 0.8rem; font-weight: 700;
            color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 3px;
        }
        .secret-title {
            font-size: 2.8rem; font-weight: 900;
            color: #fff; line-height: 1.1; letter-spacing: 1px;
            text-shadow: 0 0 25px rgba(0, 255, 65, 0.3);
        }

        /* Аудиоплеер (зелёная версия) */
        .audio-player {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px; padding: 15px 20px;
            display: flex; align-items: center; gap: 20px;
            border: 1px solid rgba(0, 255, 65, 0.1);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .play-pause-btn {
            background: var(--matrix-green); color: #000;
            border: none; width: 50px; height: 50px;
            border-radius: 50%; font-size: 1.2rem; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: 0.3s; flex-shrink: 0;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }
        .play-pause-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.8);
        }
        .progress-container {
            width: 100%; height: 24px;
            display: flex; align-items: center;
            cursor: pointer; position: relative;
        }
        .progress-container::before {
            content: ''; position: absolute; left: 0;
            width: 100%; height: 6px;
            background: rgba(0, 255, 65, 0.1); border-radius: 10px;
        }
        .progress-bar {
            height: 6px; width: 0%;
            background: linear-gradient(90deg, var(--matrix-dim), var(--matrix-green));
            border-radius: 10px; position: relative;
            pointer-events: none; z-index: 2;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }
        .progress-bar::after {
            content: ''; position: absolute; right: -7px; top: -5px;
            width: 16px; height: 16px; background: var(--matrix-green);
            border-radius: 50%; box-shadow: 0 0 12px var(--matrix-green);
            transition: transform 0.1s;
        }
        .progress-container:active .progress-bar::after { transform: scale(1.4); }
        .time-display {
            font-size: 0.85rem; color: var(--text-muted);
            font-variant-numeric: tabular-nums; font-weight: 700;
            min-width: 90px; text-align: right; white-space: nowrap;
        }

        /* Кнопка "Назад" */
        .back-btn-wrap { display: flex; justify-content: flex-start; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(0, 255, 65, 0.05);
            color: var(--matrix-green);
            padding: 13px 24px; border-radius: 12px;
            text-decoration: none; font-weight: 800;
            border: 1px solid rgba(0, 255, 65, 0.25);
            cursor: pointer; transition: 0.3s;
            font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .back-btn:hover {
            background: rgba(0, 255, 65, 0.12);
            border-color: var(--matrix-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            transform: translateX(-4px);
        }

        /* Анимация появления секрета */
        @keyframes expand-from-dot {
            0% { opacity: 0; transform: scale(0.85) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 750px) {
            .secret-release { flex-direction: column; text-align: center; padding: 28px 20px; }
            .secret-cover-wrap { width: 100%; max-width: 260px; height: 260px; }
            .secret-badge { align-self: center; }
            .secret-title { font-size: 2rem; }
            .back-btn-wrap { justify-content: center; }
        }
        @media (max-width: 480px) {
            .burger-btn { top: 15px; left: 15px; }
            header { padding-top: 70px; }
            #promo-input { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <!-- ===== БОКОВОЕ МЕНЮ ===== -->
    <div class="burger-btn" id="burgerBtn"><i class="fa-solid fa-bars"></i></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            МЕНЮ
            <i class="fa-solid fa-xmark sidebar-header-close" id="closeSidebar"></i>
        </div>
        <a href="https://dxtrslizze.xyz/" class="sidebar-link"><i class="fa-solid fa-home icon-main"></i> Главная</a>
        <a href="https://dxtrslizze.xyz/muzcatalog/" class="sidebar-link"><i class="fa-solid fa-music icon-main"></i> Муз. каталог</a>
        <a href="https://dxtrslizze.xyz/about" class="sidebar-link"><i class="fa-solid fa-circle-info icon-main"></i> О нас</a>
    </div>

    <!-- ===== ШАПКА ===== -->
    <header>
        <h1>PROMOCODE</h1>
    </header>

    <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
    <main>

        <!-- СЕКЦИЯ ВВОДА ПРОМОКОДА -->
        <div id="promo-section">
            <p class="promo-label"><i class="fa-solid fa-key" style="margin-right:8px;"></i>Введи промокод</p>
            <div class="promo-input-wrap" id="promo-input-wrap">
                <input type="text" id="promo-input" placeholder="Введи промокод..." autocomplete="off" spellcheck="false">
                <button id="promo-submit"><i class="fa-solid fa-arrow-right"></i></button>
            </div>
            <div id="promo-error"><i class="fa-solid fa-circle-xmark" style="margin-right:6px;"></i>Промокод не существует</div>
        </div>

        <!-- СЕКЦИЯ СЕКРЕТНОГО ТРЕКА (скрыта по умолчанию) -->
        <div id="secret-section">
            <div class="secret-release">
                <div class="secret-cover-wrap">
                    <img src="../logo_Dance_Girl.jpeg" alt="Dance Girl Cover" onerror="this.src='../dslogo.png'">
                </div>
                <div class="secret-info">
                    <div class="secret-badge"><i class="fa-solid fa-lock-open" style="margin-right:6px;"></i>Секретный контент</div>
                    <div class="secret-title-block">
                        <span class="secret-snippet-label">Snippet</span>
                        <span class="secret-title">Dance Girl</span>
                    </div>

                    <div class="audio-player">
                        <button class="play-pause-btn" id="secretPlayBtn" onclick="toggleSecretPlay()">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <audio id="secretAudio" src="../snippet_Dance_Girl.mp3" preload="metadata"></audio>
                        <div class="progress-container" id="secretProgressContainer">
                            <div class="progress-bar" id="secretProgressBar"></div>
                        </div>
                        <span class="time-display" id="secretTimeDisplay">00:00 / 00:00</span>
                    </div>

                    <div class="back-btn-wrap">
                        <div class="back-btn" id="backBtn">
                            <i class="fa-solid fa-arrow-left"></i> Назад
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        /* ============================================================
           ПРОМОКОД — МЕНЯЙ ТОЛЬКО ЭТУ СТРОКУ
           ============================================================ */
        const VALID_PROMO = "D&S_Dance";
        /* ============================================================ */

        // ===== MATRIX RAIN =====
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let drops = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initDrops();
        }

        function initDrops() {
            const cols = Math.floor(canvas.width / 20);
            drops = Array.from({ length: cols }, () => Math.random() * -canvas.height / 14);
        }

        const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF";
        const charArr = chars.split('');

        function drawMatrix() {
            ctx.fillStyle = 'rgba(1, 12, 2, 0.045)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drops.forEach((y, i) => {
                const char = charArr[Math.floor(Math.random() * charArr.length)];
                const x = i * 20;

                // Яркий символ впереди
                ctx.fillStyle = '#afffbf';
                ctx.font = '14px Montserrat, monospace';
                ctx.fillText(char, x, y * 14);

                // Остальная цепочка
                ctx.fillStyle = '#00ff41';
                ctx.font = '13px Montserrat, monospace';
                ctx.fillText(charArr[Math.floor(Math.random() * charArr.length)], x, (y - 1) * 14);

                ctx.fillStyle = 'rgba(0, 180, 60, 0.7)';
                ctx.fillText(charArr[Math.floor(Math.random() * charArr.length)], x, (y - 2) * 14);

                drops[i]++;
                if (drops[i] * 14 > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
            });
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        setInterval(drawMatrix, 42);

        // ===== МЕНЮ =====
        const burgerBtn = document.getElementById('burgerBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const closeSidebar = document.getElementById('closeSidebar');

        function toggleMenu() {
            sidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
        }
        burgerBtn.onclick = toggleMenu;
        closeSidebar.onclick = toggleMenu;
        sidebarOverlay.onclick = toggleMenu;

        // ===== ПРОМОКОД =====
        const promoInput = document.getElementById('promo-input');
        const promoSubmit = document.getElementById('promo-submit');
        const promoError = document.getElementById('promo-error');
        const promoInputWrap = document.getElementById('promo-input-wrap');
        const promoSection = document.getElementById('promo-section');
        const secretSection = document.getElementById('secret-section');
        const promoLabel = document.querySelector('.promo-label');

        function showError() {
            promoError.classList.add('show');
            promoInputWrap.style.animation = 'shake 0.4s ease';
            setTimeout(() => { promoInputWrap.style.animation = ''; }, 400);
        }

        function hideError() {
            promoError.classList.remove('show');
        }

        promoInput.addEventListener('input', hideError);

        // Анимация тряски при ошибке
        const shakeStyle = document.createElement('style');
        shakeStyle.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                18% { transform: translateX(-10px); }
                36% { transform: translateX(10px); }
                54% { transform: translateX(-6px); }
                72% { transform: translateX(6px); }
                90% { transform: translateX(-2px); }
            }
        `;
        document.head.appendChild(shakeStyle);

        function activatePromo() {
            const val = promoInput.value.trim();
            if (!val) return;

            if (val !== VALID_PROMO) {
                showError();
                return;
            }

            // Верный промокод — запускаем анимацию
            hideError();
            promoLabel.style.transition = 'opacity 0.4s';
            promoLabel.style.opacity = '0';

            const rect = promoInputWrap.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            promoInputWrap.classList.add('collapsing');

            setTimeout(() => {
                // Создаём капельку
                const droplet = document.createElement('div');
                droplet.className = 'droplet';
                droplet.style.left = (centerX - 10) + 'px';
                droplet.style.top = (centerY - 10) + 'px';
                document.body.appendChild(droplet);

                promoSection.style.visibility = 'hidden';

                setTimeout(() => {
                    droplet.remove();
                    promoSection.style.display = 'none';

                    // Показываем секретный трек
                    secretSection.style.display = 'block';
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            secretSection.classList.add('visible');
                        });
                    });
                }, 900);
            }, 500);
        }

        promoSubmit.onclick = activatePromo;
        promoInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') activatePromo();
        });

        // ===== КНОПКА "НАЗАД" =====
        document.getElementById('backBtn').onclick = function () {
            // Останавливаем аудио
            if (!secretAudio.paused) {
                secretAudio.pause();
                secretAudio.currentTime = 0;
                secretPlayBtnIcon.className = 'fa-solid fa-play';
                secretProgressBar.style.width = '0%';
            }

            // Скрываем секрет
            secretSection.classList.remove('visible');

            setTimeout(() => {
                secretSection.style.display = 'none';

                // Восстанавливаем поле ввода
                promoInput.value = '';
                promoInputWrap.classList.remove('collapsing');
                promoInputWrap.style.animation = 'none';
                promoInputWrap.style.transform = '';
                promoInputWrap.style.opacity = '';
                promoInputWrap.style.borderRadius = '';

                promoSection.style.display = 'flex';
                promoSection.style.visibility = 'visible';

                // Анимация появления поля ввода
                promoInputWrap.style.opacity = '0';
                promoInputWrap.style.transform = 'scale(0.1)';
                promoInputWrap.style.transition = 'opacity 0.5s ease, transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)';

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        promoInputWrap.style.opacity = '1';
                        promoInputWrap.style.transform = 'scale(1)';
                        promoLabel.style.opacity = '1';

                        setTimeout(() => {
                            promoInputWrap.style.transition = '';
                            promoInputWrap.style.transform = '';
                        }, 600);
                    });
                });
            }, 500);
        };

        // ===== АУДИОПЛЕЕР (СЕКРЕТНЫЙ ТРЕК) =====
        const secretAudio = document.getElementById('secretAudio');
        const secretPlayBtnIcon = document.querySelector('#secretPlayBtn i');
        const secretProgressBar = document.getElementById('secretProgressBar');
        const secretProgressContainer = document.getElementById('secretProgressContainer');
        const secretTimeDisplay = document.getElementById('secretTimeDisplay');
        let isDragging = false;

        function toggleSecretPlay() {
            if (secretAudio.paused) {
                secretAudio.play();
                secretPlayBtnIcon.className = 'fa-solid fa-pause';
            } else {
                secretAudio.pause();
                secretPlayBtnIcon.className = 'fa-solid fa-play';
            }
        }

        function formatTime(s) {
            if (!s || isNaN(s)) return "00:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m < 10 ? '0' : ''}${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        secretAudio.addEventListener('loadedmetadata', () => {
            secretTimeDisplay.textContent = `00:00 / ${formatTime(secretAudio.duration)}`;
        });

        function updateProgress(clientX) {
            const rect = secretProgressContainer.getBoundingClientRect();
            let offsetX = Math.max(0, Math.min(clientX - rect.left, rect.width));
            const pct = offsetX / rect.width;
            secretProgressBar.style.width = (pct * 100) + '%';
            if (secretAudio.duration) {
                secretAudio.currentTime = pct * secretAudio.duration;
                secretTimeDisplay.textContent = `${formatTime(secretAudio.currentTime)} / ${formatTime(secretAudio.duration)}`;
            }
        }

        secretProgressContainer.addEventListener('mousedown', e => { isDragging = true; updateProgress(e.clientX); });
        window.addEventListener('mousemove', e => { if (isDragging) updateProgress(e.clientX); });
        window.addEventListener('mouseup', () => { isDragging = false; });
        secretProgressContainer.addEventListener('touchstart', e => { isDragging = true; updateProgress(e.touches[0].clientX); }, { passive: false });
        window.addEventListener('touchmove', e => { if (isDragging) { updateProgress(e.touches[0].clientX); e.preventDefault(); } }, { passive: false });
        window.addEventListener('touchend', () => { isDragging = false; });

        secretAudio.addEventListener('timeupdate', () => {
            if (!isDragging && secretAudio.duration) {
                secretProgressBar.style.width = `${(secretAudio.currentTime / secretAudio.duration) * 100}%`;
                secretTimeDisplay.textContent = `${formatTime(secretAudio.currentTime)} / ${formatTime(secretAudio.duration)}`;
            }
        });

        secretAudio.addEventListener('ended', () => {
            secretPlayBtnIcon.className = 'fa-solid fa-play';
            secretProgressBar.style.width = '0%';
            secretAudio.currentTime = 0;
            secretTimeDisplay.textContent = `00:00 / ${formatTime(secretAudio.duration)}`;
        });
    </script>

</body>
</html>
