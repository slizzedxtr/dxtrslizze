<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMOCODE | DXTR | SlizZe</title>
    <meta name="description" content="Секретная страница. Введите промокод для доступа к эксклюзивным материалам.">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-green-glow: rgba(0, 255, 102, 0.4);
            --bg-dark: #020602;
            --glass-bg: rgba(5, 15, 5, 0.7);
            --glass-border: rgba(0, 255, 102, 0.2);
            --text-main: #ffffff;
            --text-muted: #8aa88a;
            --error-red: #cc4444; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; position: relative;
        }

        #matrixCanvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; opacity: 0.6;
        }
        
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;
            background: radial-gradient(circle at center, transparent 30%, var(--bg-dark) 100%);
        }

        /* ============================================================
           ХЭЛЛОУИН ОВЕРЛЕЙ
        ============================================================ */
        #horror-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 500; pointer-events: none;
            opacity: 0; transition: opacity 0.4s ease;
            display: flex; justify-content: center; align-items: center;
        }
        #horror-overlay.active { opacity: 1; }

        /* Кровавый туман по краям */
        #horror-fog {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 20%, rgba(140, 0, 0, 0.22) 65%, rgba(80, 0, 0, 0.6) 100%);
            opacity: 0; transition: opacity 1.2s ease;
        }
        #horror-overlay.active #horror-fog { opacity: 1; }

        #pumpkin-face {
            position: absolute;
            width: 340px; height: 280px;
            opacity: 0;
            transform: scale(0.15);
            filter: drop-shadow(0 0 50px rgba(255, 30, 0, 0.9)) drop-shadow(0 0 100px rgba(180, 0, 0, 0.6));
            will-change: transform, opacity;
        }

        /* ========== ГЛИТЧ ЗАГОЛОВКА ========== */
        @keyframes glitch-shift-1 {
            0%   { clip-path: inset(8% 0 82% 0);  transform: translate(-5px, 0); }
            15%  { clip-path: inset(55% 0 15% 0); transform: translate(5px, 0); }
            30%  { clip-path: inset(25% 0 55% 0); transform: translate(-4px, 2px); }
            45%  { clip-path: inset(75% 0 3% 0);  transform: translate(4px, -2px); }
            60%  { clip-path: inset(3% 0 75% 0);  transform: translate(-6px, 0); }
            75%  { clip-path: inset(40% 0 35% 0); transform: translate(6px, 1px); }
            90%  { clip-path: inset(65% 0 12% 0); transform: translate(-3px, 0); }
            100% { clip-path: inset(8% 0 82% 0);  transform: translate(-5px, 0); }
        }
        @keyframes glitch-shift-2 {
            0%   { clip-path: inset(65% 0 8% 0);  transform: translate(6px, 0); }
            15%  { clip-path: inset(15% 0 65% 0); transform: translate(-6px, 0); }
            30%  { clip-path: inset(45% 0 35% 0); transform: translate(5px, -2px); }
            45%  { clip-path: inset(3% 0 80% 0);  transform: translate(-5px, 2px); }
            60%  { clip-path: inset(35% 0 45% 0); transform: translate(7px, 0); }
            75%  { clip-path: inset(80% 0 5% 0);  transform: translate(-7px, -1px); }
            90%  { clip-path: inset(20% 0 60% 0); transform: translate(4px, 0); }
            100% { clip-path: inset(65% 0 8% 0);  transform: translate(6px, 0); }
        }
        @keyframes glitch-rgb {
            0%   { text-shadow: -4px 0 #ff0000, 4px 0 #00ffcc, 0 0 35px rgba(255,0,0,0.9); color: #cc0000; }
            20%  { text-shadow:  4px 0 #ff2200, -4px 0 #00aaff, 0 0 55px rgba(220,0,0,1);  color: #dd0000; }
            40%  { text-shadow: -5px 0 #ff4400,  5px 0 #0066ff, 0 0 28px rgba(200,0,0,0.8); color: #bb0000; }
            60%  { text-shadow:  3px 0 #cc0000, -3px 0 #33ffbb, 0 0 45px rgba(255,30,0,0.9); color: #ee0000; }
            80%  { text-shadow: -6px 0 #ff1100,  6px 0 #0088ff, 0 0 20px rgba(180,0,0,1);  color: #cc0000; }
            100% { text-shadow: -4px 0 #ff0000,  4px 0 #00ffcc, 0 0 35px rgba(255,0,0,0.9); color: #cc0000; }
        }
        @keyframes glitch-body {
            0%,2%,4%,100% { transform: translate(0); }
            1%   { transform: translate(-3px, 1px); }
            3%   { transform: translate(3px, -1px); }
        }

        .glitch-title {
            position: relative;
            animation: glitch-rgb 0.13s infinite, glitch-body 0.8s infinite !important;
            -webkit-text-fill-color: unset !important;
        }
        .glitch-title::before,
        .glitch-title::after {
            content: 'ERROR';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            font-size: inherit; font-weight: inherit; letter-spacing: inherit; text-transform: inherit;
        }
        .glitch-title::before {
            color: #ff2200;
            animation: glitch-shift-1 0.18s infinite;
        }
        .glitch-title::after {
            color: #ff0066;
            animation: glitch-shift-2 0.22s infinite;
        }

        /* МЕНЮ */
        .burger-btn { position: fixed; top: 25px; left: 25px; z-index: 10001; background: rgba(0,255,102,0.05); border: 1px solid var(--glass-border); width: 45px; height: 45px; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: white; font-size: 1.2rem; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
        .burger-btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); border-color: var(--neon-green); }
        .sidebar { position: fixed; top: 0; left: -300px; width: 300px; height: 100vh; background: rgba(2, 6, 2, 0.95); backdrop-filter: blur(25px); border-right: 1px solid var(--glass-border); z-index: 10000; display: flex; flex-direction: column; padding: 80px 30px 30px; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        .sidebar.active { left: 0; }
        .sidebar-link { color: white; text-decoration: none; font-size: 1.1rem; font-weight: 700; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 15px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .sidebar-link i { color: var(--neon-green); font-size: 1.4rem; transition: 0.3s; }
        .sidebar-link:hover { color: var(--neon-green); padding-left: 10px; border-bottom-color: var(--neon-green-glow); }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 9999; display: none; opacity: 0; transition: 0.3s; }
        .sidebar-overlay.active { display: block; opacity: 1; }

        header { text-align: center; padding: 10vh 20px 2vh; position: relative; z-index: 10; }
        header h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; text-transform: uppercase; letter-spacing: 10px; color: var(--neon-green); text-shadow: 0 0 25px var(--neon-green-glow); margin-bottom: 10px; transition: color 0.3s; }

        main { flex: 1; width: 100%; max-width: 900px; margin: 0 auto; padding: 0 20px 40px; z-index: 10; display: flex; flex-direction: column; align-items: center; position: relative; }

        .promo-wrapper { position: relative; width: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center; margin-top: 3vh; transition: all 0.5s ease-out; z-index: 10; }
        .promo-wrapper.hidden { opacity: 0; transform: scale(0.8); pointer-events: none; }
        
        .promo-box {
            display: flex; width: 100%; height: 70px; background: var(--glass-bg); border: 2px solid var(--neon-green); border-radius: 20px; overflow: hidden;
            box-shadow: 0 0 30px var(--neon-green-glow), inset 0 0 15px rgba(0, 255, 102, 0.1);
            backdrop-filter: blur(15px); transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative; z-index: 2;
        }
        .promo-box.collapsing { width: 70px; border-radius: 50%; background: var(--neon-green); border-color: #fff; box-shadow: 0 0 50px var(--neon-green); }
        .promo-box.collapsing input, .promo-box.collapsing button { opacity: 0; pointer-events: none; }
        .promo-box input { flex: 1; background: transparent; border: none; outline: none; padding: 0 25px; color: #fff; font-size: 1.2rem; font-weight: 700; text-align: center; font-family: 'Montserrat', sans-serif; letter-spacing: 2px; transition: opacity 0.3s; }
        .promo-box input::placeholder { color: var(--text-muted); font-weight: 500; letter-spacing: 1px; }
        .promo-box button { width: 70px; background: rgba(0, 255, 102, 0.1); border: none; border-left: 1px solid var(--glass-border); color: var(--neon-green); font-size: 1.5rem; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .promo-box button:hover { background: var(--neon-green); color: #000; box-shadow: -5px 0 20px var(--neon-green-glow); }
        .error-msg { margin-top: 15px; color: var(--error-red); font-size: 0.95rem; font-weight: 600; opacity: 0; transform: translateY(-10px); transition: all 0.3s; text-align: center; }
        .error-msg.visible { opacity: 1; transform: translateY(0); }
        .splash-ring { position: absolute; top: 35px; left: 50%; width: 70px; height: 70px; background: var(--neon-green); border-radius: 50%; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; z-index: 3; }
        .splash-ring.animate { animation: splashEffect 0.7s ease-out forwards; }
        @keyframes splashEffect { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(8); opacity: 0; } }

        .snippet-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 30px; margin-top: 20px; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; z-index: 5; }
        .snippet-wrapper.unlocked { transform: translateY(-120px); }

        .hero-release {
            background: linear-gradient(135deg, rgba(5,20,10,0.8) 0%, rgba(2,10,5,0.9) 100%);
            backdrop-filter: blur(25px); border: 2px solid var(--glass-border); border-radius: 30px; padding: 40px; display: flex; gap: 40px; align-items: center; width: 100%; max-width: 850px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 255, 102, 0.05); position: relative; overflow: hidden;
            transition: all 0.6s ease-out; 
        }
        .unlocked .hero-release { border-color: var(--neon-green); box-shadow: 0 0 50px rgba(0, 255, 102, 0.15), inset 0 0 20px rgba(0, 255, 102, 0.1); }
        .hero-release::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at center, rgba(0,255,102,0.1) 0%, transparent 60%); animation: rotateBg 15s linear infinite; pointer-events: none; z-index: 0; }
        @keyframes rotateBg { 100% { transform: rotate(360deg); } }
        .hero-cover-wrap { position: relative; flex-shrink: 0; width: 300px; aspect-ratio: 1/1; z-index: 1; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid var(--glass-border); animation: float-cover 6s ease-in-out infinite; }
        @keyframes float-cover { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-10px) rotate(2deg); } 100% { transform: translateY(0px) rotate(0deg); } }
        .cover-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(204, 68, 68, 0.1), rgba(0,0,0,0.8)); display: flex; justify-content: center; align-items: center; font-size: 6rem; color: var(--error-red); text-shadow: 0 0 20px rgba(204, 68, 68, 0.5); transition: opacity 0.6s ease; z-index: 2; }
        .unlocked .cover-placeholder { opacity: 0; pointer-events: none; }
        #realCover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: transform 0.5s, opacity 0.6s ease; z-index: 1; }
        .unlocked #realCover { opacity: 1; }
        .hero-cover-wrap:hover #realCover { transform: scale(1.05); }
        .hero-info { flex: 1; z-index: 1; display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 18px; border-radius: 50px; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; align-self: flex-start; transition: all 0.5s; }
        .locked-badge { color: var(--error-red); border: 1px solid var(--error-red); background: rgba(204, 68, 68, 0.1); box-shadow: 0 0 15px rgba(204, 68, 68, 0.3); }
        .unlocked-badge { color: var(--neon-green); border: 1px solid var(--neon-green); background: rgba(0, 255, 102, 0.15); box-shadow: 0 0 15px rgba(0, 255, 102, 0.3); }
        .hero-info h2 { font-size: 3rem; font-weight: 900; line-height: 1.1; color: #fff; text-shadow: 0 0 20px rgba(0,0,0,0.8); transition: color 0.5s; }
        .unlocked .hero-info h2 { text-shadow: 0 0 20px rgba(0,255,102,0.4); }
        .audio-player-container { opacity: 0; max-height: 0; overflow: hidden; transition: all 0.6s ease; width: 100%; pointer-events: none; }
        .unlocked .audio-player-container { opacity: 1; max-height: 100px; pointer-events: all; }
        .audio-player { background: rgba(0,0,0,0.6); border-radius: 16px; padding: 15px 20px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--glass-border); box-shadow: inset 0 0 20px rgba(0,0,0,0.8); width: 100%; }
        .play-pause-btn { background: var(--neon-green); color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; box-shadow: 0 0 15px var(--neon-green-glow); flex-shrink: 0; }
        .play-pause-btn:hover { transform: scale(1.1); background: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.6); }
        .progress-container { flex: 1; height: 24px; display: flex; align-items: center; cursor: pointer; position: relative; touch-action: none; min-width: 50px; }
        .progress-container::before { content: ''; position: absolute; left: 0; width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .progress-bar { height: 6px; width: 0%; background: var(--neon-green); border-radius: 10px; position: relative; pointer-events: none; z-index: 2; box-shadow: 0 0 10px var(--neon-green); }
        .progress-bar::after { content: ''; position: absolute; right: -7px; top: -5px; width: 16px; height: 16px; background: #fff; border-radius: 50%; box-shadow: 0 0 12px var(--neon-green); }
        .time-display { font-size: 0.85rem; color: var(--text-muted); font-variant-numeric: tabular-nums; font-weight: 700; min-width: 90px; text-align: right; white-space: nowrap; flex-shrink: 0; }
        #backBtn { opacity: 0; transform: translateY(-20px); transition: all 0.6s ease; pointer-events: none; background: transparent; border: 2px solid var(--text-muted); color: var(--text-muted); padding: 12px 30px; border-radius: 50px; font-size: 1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .unlocked #backBtn { opacity: 1; transform: translateY(0); pointer-events: all; }
        #backBtn:hover { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 15px rgba(0,255,102,0.2); transform: translateX(-5px); }

        /* ЧАТ */
        #chat-window { display: none; position: fixed; bottom: 30px; right: 30px; width: 380px; height: 520px; flex-direction: column; overflow: hidden; background: rgba(2, 6, 2, 0.85); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px var(--neon-green-glow); backdrop-filter: blur(30px); z-index: 9999; animation: chatTerminalOpen 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .chat-header { background: linear-gradient(90deg, #050f05, #0a1f0a); border-bottom: 2px solid var(--neon-green); color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: grab; user-select: none; }
        .chat-header:active { cursor: grabbing; }
        .chat-header-info { display: flex; align-items: center; gap: 10px; }
        .chat-header-title { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-green); }
        .drag-handle { color: rgba(255,255,255,0.3); }
        #chat-close { cursor: pointer; font-size: 1.5rem; transition: 0.3s; color: var(--text-muted); padding: 5px; }
        #chat-close:hover { color: var(--neon-green); transform: rotate(90deg); }
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        #chat-messages::-webkit-scrollbar { width: 4px; }
        #chat-messages::-webkit-scrollbar-thumb { background: var(--neon-green); border-radius: 10px; }
        .chat-system-msg { color: var(--neon-green); text-align: center; font-size: 0.8rem; font-weight: 600; padding: 8px; border: 1px dashed var(--glass-border); border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .chat-msg-wrapper { display: flex; flex-direction: column; animation: msgFade 0.3s ease-out forwards; }
        @keyframes msgFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .chat-msg-name { font-size: 0.7rem; font-weight: 900; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
        .chat-msg-bubble { padding: 14px 18px; border-radius: 16px; color: #fff; max-width: 85%; word-wrap: break-word; line-height: 1.5; font-weight: 500; }
        .msg-user { align-items: flex-end; }
        .msg-user .chat-msg-name { color: #fff; }
        .msg-user .chat-msg-bubble { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-bottom-right-radius: 2px; }
        .msg-bot { align-items: flex-start; }
        .msg-bot .chat-msg-name { color: var(--neon-green); }
        .msg-bot .chat-msg-bubble { background: rgba(0,255,102,0.05); border: 1px solid var(--glass-border); border-bottom-left-radius: 2px; }
        .chat-input-area { padding: 15px 20px; display: flex; gap: 12px; border-top: 1px solid var(--glass-border); background: rgba(2,6,2,0.9); }
        #chat-input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: #fff; padding: 14px 18px; border-radius: 14px; outline: none; font-family: 'Montserrat', sans-serif; transition: 0.3s; }
        #chat-input:focus { border-color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green-glow); }
        #chat-send { background: linear-gradient(135deg, #0a290a, #004d1f); border: 2px solid var(--glass-border); color: var(--neon-green); width: 52px; height: 52px; border-radius: 14px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }
        #chat-send:hover { background: var(--neon-green); color: #000; }
        @keyframes chatTerminalOpen { 0% { opacity: 0; transform: scale(0.9) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

        @media (max-width: 900px) {
            .hero-release { flex-direction: column; text-align: center; padding: 30px 20px; }
            .hero-cover-wrap { width: 100%; max-width: 250px; }
            .hero-badge { align-self: center; }
            .hero-info h2 { font-size: 2.2rem; }
            .snippet-wrapper.unlocked { transform: translateY(-90px); }
        }
        @media (max-width: 600px) {
            header h1 { font-size: 2.5rem; letter-spacing: 5px; }
            .promo-box { height: 60px; }
            .promo-box input { font-size: 1rem; }
            .burger-btn { top: 15px; left: 15px; width: 40px; height: 40px; }
            .snippet-wrapper.unlocked { transform: translateY(-80px); }
            #pumpkin-face { width: 240px; height: 200px; }
            #chat-window { width: 100vw !important; height: 75vh !important; bottom: 0 !important; left: 0 !important; right: 0 !important; top: auto !important; border-radius: 24px 24px 0 0 !important; border-bottom: none; }
            .drag-handle { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <!-- ХЭЛЛОУИН ОВЕРЛЕЙ -->
    <div id="horror-overlay">
        <div id="horror-fog"></div>
        <svg id="pumpkin-face" viewBox="0 0 200 170" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="burger-btn" id="burgerBtn"><i class="fa-solid fa-bars"></i></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="color: var(--text-muted); font-size: 0.9rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
            МЕНЮ <i class="fa-solid fa-xmark" id="closeSidebar" style="font-size: 1.5rem; cursor: pointer; color: white; transition: 0.3s;"></i>
        </div>
        <a href="https://dxtrslizze.xyz/" class="sidebar-link"><i class="fa-solid fa-home"></i> Главная</a>
        <a href="https://dxtrslizze.xyz/muzcatalog/" class="sidebar-link"><i class="fa-solid fa-music"></i> Муз. каталог</a>
        <a href="https://dxtrslizze.xyz/about" class="sidebar-link"><i class="fa-solid fa-circle-info"></i> О нас</a>
        <a href="#" class="sidebar-link" id="sidebarSupportBtn"><i class="fa-solid fa-headset"></i> Тех. поддержка</a>
    </div>

    <header>
        <h1 id="pageTitle">PROMOCODE</h1>
    </header>

    <main>
        <div class="promo-wrapper" id="promoWrapper">
            <div class="promo-box" id="promoBox">
                <input type="text" id="promoInput" placeholder="Введите код доступа" autocomplete="off" spellcheck="false">
                <button id="promoSubmit"><i class="fa-solid fa-terminal"></i></button>
            </div>
            <div class="error-msg" id="promoError">Данный промокод не существует</div>
            <div class="splash-ring" id="splashRing"></div>
        </div>

        <div class="snippet-wrapper" id="snippetWrapper">
            <div class="hero-release" id="snippetHero">
                <div class="hero-cover-wrap">
                    <div class="cover-placeholder" id="coverPlaceholder"><i class="fa-solid fa-question"></i></div>
                    <img src="../logo_Dance_Girl.jpeg" id="realCover" alt="Dance Girl" onerror="this.src='../dslogo.png'">
                </div>
                <div class="hero-info">
                    <div class="hero-badge locked-badge" id="lockBadge"><i class="fa-solid fa-lock"></i> Контент заблокирован</div>
                    <h2 id="trackTitle">???</h2>
                    <div class="audio-player-container">
                        <div class="audio-player">
                            <button class="play-pause-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
                            <audio id="snippetAudio" src="../snippet_Dance_Girl.mp3" preload="metadata" crossorigin="anonymous"></audio>
                            <div class="progress-container" id="progressContainer">
                                <div class="progress-bar" id="progressBar"></div>
                            </div>
                            <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                        </div>
                    </div>
                </div>
            </div>
            <button id="backBtn" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i> Назад</button>
        </div>
    </main>

    <div id="chat-window">
        <div class="chat-header" id="chat-header">
            <div class="chat-header-info">
                <i class="fa-solid fa-grip-vertical drag-handle"></i>
                <span class="chat-header-title">DS Support</span>
            </div>
            <i class="fa-solid fa-xmark" id="chat-close"></i>
        </div>
        <div id="chat-messages">
            <div class="chat-system-msg">Система тех. поддержки активна. Задайте ваш вопрос.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Ввод команды/проблемы...">
            <button id="chat-send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ==========================================
        // ======= НАСТРОЙКИ ПРОМОКОДА ==============
        // ==========================================
        const SECRET_PROMOCODE = "D&S_Dance";
        // ==========================================

        // ========== МАТРИЦА ==========
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const FONT_SIZE = 16;
        let columns = Math.floor(canvas.width / FONT_SIZE);
        let drops = [];
        // Цвет каждого столбца: 0 = зелёный, 1 = красный
        let colColor = [];

        function initMatrix() {
            columns = Math.floor(canvas.width / FONT_SIZE);
            drops = [];
            colColor = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -60;
                colColor[i] = 0;
            }
        }
        initMatrix();

        function drawMatrix() {
            // Фон чуть темнее когда красный
            const hasSomeRed = colColor.some(c => c === 1);
            ctx.fillStyle = hasSomeRed ? 'rgba(5, 1, 1, 0.08)' : 'rgba(2, 6, 2, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = FONT_SIZE + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const char = Math.random() > 0.5 ? '1' : '0';
                const isRed = colColor[i] === 1;
                // Яркий «голова» символ
                const headRow = Math.floor(drops[i]);
                const currentRow = headRow;
                ctx.fillStyle = isRed
                    ? (currentRow % 6 < 2 ? '#ff5555' : '#cc0000')
                    : (currentRow % 6 < 2 ? '#afffbf' : '#00ff66');
                ctx.fillText(char, i * FONT_SIZE, drops[i] * FONT_SIZE);

                if (drops[i] * FONT_SIZE > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initMatrix();
        });

        // ========== ХЭЛЛОУИН ИВЕНТ ==========
        const horrorOverlay = document.getElementById('horror-overlay');
        const pumpkinSvg = document.getElementById('pumpkin-face');
        const pageTitle = document.getElementById('pageTitle');
        let horrorActive = false;
        let waveIntervalId = null;

        function triggerHorrorEvent() {
            if (horrorActive) return;
            horrorActive = true;

            // Случайная рожица
            const face = pumpkinFaces[Math.floor(Math.random() * pumpkinFaces.length)];
            pumpkinSvg.innerHTML = face;

            // Волна красного по матрице слева направо
            let wavePos = 0;
            waveIntervalId = setInterval(() => {
                for (let i = wavePos; i < Math.min(wavePos + 5, columns); i++) colColor[i] = 1;
                wavePos += 5;
                if (wavePos >= columns) clearInterval(waveIntervalId);
            }, 15);

            // Показываем оверлей
            horrorOverlay.classList.add('active');

            // Заголовок → ERROR с глитчем
            pageTitle.textContent = 'ERROR';
            pageTitle.classList.add('glitch-title');

            // Рожица: начальная позиция (маленькая, прозрачная)
            pumpkinSvg.style.transition = 'none';
            pumpkinSvg.style.opacity = '0';
            pumpkinSvg.style.transform = 'scale(0.12)';

            // Запускаем приближение
            requestAnimationFrame(() => requestAnimationFrame(() => {
                pumpkinSvg.style.transition = 'opacity 0.9s ease-out, transform 4s cubic-bezier(0.05, 0.0, 0.35, 1.0)';
                pumpkinSvg.style.opacity = '0.95';
                pumpkinSvg.style.transform = 'scale(3.2)';
            }));

            // Через 4с — растворяем рожицу
            setTimeout(() => {
                pumpkinSvg.style.transition = 'opacity 1.1s ease-in, transform 1.1s ease-in';
                pumpkinSvg.style.opacity = '0';
                pumpkinSvg.style.transform = 'scale(3.8)';
            }, 4000);

            // Через 5.2с — всё возвращается
            setTimeout(() => {
                // Скрываем оверлей
                horrorOverlay.classList.remove('active');

                // Волна зелёного обратно
                let waveBack = 0;
                const waveBackId = setInterval(() => {
                    for (let i = waveBack; i < Math.min(waveBack + 5, columns); i++) colColor[i] = 0;
                    waveBack += 5;
                    if (waveBack >= columns) clearInterval(waveBackId);
                }, 15);

                // Восстанавливаем заголовок
                pageTitle.textContent = 'PROMOCODE';
                pageTitle.classList.remove('glitch-title');

                horrorActive = false;
            }, 5200);
        }

        // Каждые 30 секунд
        setInterval(triggerHorrorEvent, 30000);

        // ========== МЕНЮ ==========
        const burgerBtn = document.getElementById('burgerBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const closeSidebar = document.getElementById('closeSidebar');
        const sidebarSupportBtn = document.getElementById('sidebarSupportBtn');

        function toggleMenu() { sidebar.classList.toggle('active'); sidebarOverlay.classList.toggle('active'); }
        burgerBtn.onclick = toggleMenu;
        closeSidebar.onclick = toggleMenu;
        sidebarOverlay.onclick = toggleMenu;

        // ========== ЧАТ ==========
        const chatWindow = document.getElementById('chat-window');
        const chatClose = document.getElementById('chat-close');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send');
        const chatHeader = document.getElementById('chat-header');

        let clientId = localStorage.getItem('dxtrClientId') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('dxtrClientId', clientId);
        window.userNickname = localStorage.getItem('dxtrUserNickname') || null;

        let socket;
        try {
            socket = io("https://dxtrslizze.onrender.com/");
            socket.on('connect', () => {
                import('https://openfpcdn.io/fingerprintjs/v4')
                    .then(FP => FP.load())
                    .then(fp => fp.get())
                    .then(r => socket.emit('register_client', { clientId, fpHash: r.visitorId }))
                    .catch(() => socket.emit('register_client', { clientId, fpHash: 'blocked' }));
            });
            socket.on('receive_message', d => {
                if (chatWindow.style.display === 'none') chatWindow.style.display = 'flex';
                addChatMessage('Support', d.text, 'flex-start', true);
            });
        } catch(e) {}

        sidebarSupportBtn.onclick = (e) => {
            e.preventDefault(); toggleMenu();
            setTimeout(() => {
                chatWindow.style.display = 'flex';
                chatMessages.scrollTop = chatMessages.scrollHeight;
                if(window.innerWidth > 600) { chatWindow.style.right = '30px'; chatWindow.style.bottom = '30px'; }
            }, 300);
        };
        chatClose.onclick = () => chatWindow.style.display = 'none';

        let isDraggingChat = false, chatOffX, chatOffY;
        chatHeader.addEventListener('mousedown', e => {
            if (window.innerWidth <= 600 || e.target.id === 'chat-close') return;
            isDraggingChat = true;
            const r = chatWindow.getBoundingClientRect();
            chatOffX = e.clientX - r.left; chatOffY = e.clientY - r.top;
            chatWindow.style.right = 'auto'; chatWindow.style.bottom = 'auto';
            chatWindow.style.left = r.left + 'px'; chatWindow.style.top = r.top + 'px';
        });
        document.addEventListener('mousemove', e => {
            if (!isDraggingChat) return;
            chatWindow.style.left = Math.max(0, Math.min(e.clientX - chatOffX, window.innerWidth - chatWindow.offsetWidth)) + 'px';
            chatWindow.style.top = Math.max(0, Math.min(e.clientY - chatOffY, window.innerHeight - chatWindow.offsetHeight)) + 'px';
        });
        document.addEventListener('mouseup', () => isDraggingChat = false);

        chatSendBtn.onclick = sendMessage;
        chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

        function sendMessage() {
            const t = chatInput.value.trim(); if (!t) return;
            if (socket) socket.emit('send_message', { text: t, clientId });
            addChatMessage(window.userNickname || 'Вы', t, 'flex-end');
            chatInput.value = '';
        }

        function addChatMessage(sender, text, align, save = true) {
            const w = document.createElement('div');
            w.className = `chat-msg-wrapper ${align === 'flex-end' ? 'msg-user' : 'msg-bot'}`;
            const n = document.createElement('span'); n.className = 'chat-msg-name'; n.textContent = sender;
            const b = document.createElement('div'); b.className = 'chat-msg-bubble'; b.textContent = text;
            w.appendChild(n); w.appendChild(b);
            chatMessages.appendChild(w); chatMessages.scrollTop = chatMessages.scrollHeight;
            if (save) {
                const h = JSON.parse(localStorage.getItem('dxtrChatHistory') || '[]');
                h.push({ sender, text, align }); if (h.length > 50) h.shift();
                localStorage.setItem('dxtrChatHistory', JSON.stringify(h));
            }
        }
        (JSON.parse(localStorage.getItem('dxtrChatHistory') || '[]')).forEach(m => addChatMessage(m.sender, m.text, m.align, false));

        // ========== ПРОМОКОД ==========
        const promoInput = document.getElementById('promoInput');
        const promoSubmit = document.getElementById('promoSubmit');
        const promoError = document.getElementById('promoError');
        const promoBox = document.getElementById('promoBox');
        const promoWrapper = document.getElementById('promoWrapper');
        const splashRing = document.getElementById('splashRing');
        const snippetWrapper = document.getElementById('snippetWrapper');
        const lockBadge = document.getElementById('lockBadge');
        const trackTitle = document.getElementById('trackTitle');

        function checkPromo() {
            const val = promoInput.value.trim();
            if (!val) return;
            if (val === SECRET_PROMOCODE) {
                promoError.classList.remove('visible');
                promoBox.classList.add('collapsing');
                setTimeout(() => {
                    promoBox.style.opacity = '0';
                    splashRing.classList.add('animate');
                    setTimeout(() => {
                        promoWrapper.classList.add('hidden');
                        snippetWrapper.classList.add('unlocked');
                        lockBadge.classList.remove('locked-badge');
                        lockBadge.classList.add('unlocked-badge');
                        lockBadge.innerHTML = '<i class="fa-solid fa-lock-open"></i> Доступ открыт';
                        trackTitle.textContent = 'Dance Girl';
                    }, 200);
                }, 600);
            } else {
                promoError.classList.add('visible');
                promoBox.style.transition = 'transform 0.1s';
                ['-10px','10px','-10px','0px'].forEach((x, i) => {
                    setTimeout(() => promoBox.style.transform = `translateX(${x})`, i * 100);
                });
                setTimeout(() => promoBox.style.transition = '', 400);
            }
        }

        promoSubmit.onclick = checkPromo;
        promoInput.addEventListener('keypress', e => { if (e.key === 'Enter') checkPromo(); });
        promoInput.addEventListener('input', () => promoError.classList.remove('visible'));

        function goBack() {
            if (snippetAudio && !snippetAudio.paused) { snippetAudio.pause(); snippetAudio.currentTime = 0; }
            if (playBtnIcon) playBtnIcon.className = 'fa-solid fa-play';
            if (snippetHero) { snippetHero.style.transform = 'scale(1)'; snippetHero.style.boxShadow = ''; }

            snippetWrapper.classList.remove('unlocked');
            setTimeout(() => {
                lockBadge.classList.remove('unlocked-badge');
                lockBadge.classList.add('locked-badge');
                lockBadge.innerHTML = '<i class="fa-solid fa-lock"></i> Контент заблокирован';
                trackTitle.textContent = '???';
            }, 300);
            setTimeout(() => {
                promoWrapper.classList.remove('hidden');
                splashRing.classList.remove('animate');
                setTimeout(() => {
                    promoBox.style.opacity = '1';
                    promoBox.classList.remove('collapsing');
                    promoInput.value = '';
                }, 50);
            }, 600);
        }

        // ========== WEB AUDIO ПУЛЬСАЦИЯ ==========
        const snippetAudio = document.getElementById('snippetAudio');
        const snippetHero = document.getElementById('snippetHero');
        let audioCtx, analyser, source, dataArray, isAudioSetup = false;

        function setupAudio() {
            if (isAudioSetup) return;
            const AC = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AC();
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
            source = audioCtx.createMediaElementSource(snippetAudio);
            source.connect(analyser); analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            isAudioSetup = true;
            pulseBeat();
        }

        function pulseBeat() {
            requestAnimationFrame(pulseBeat);
            if (!snippetAudio || snippetAudio.paused) return;
            analyser.getByteFrequencyData(dataArray);
            let sum = 0; for(let i = 0; i < 10; i++) sum += dataArray[i];
            const avg = sum / 10;
            if (avg < 30) { snippetHero.style.transform = 'scale(1)'; return; }
            const scale = 1 + (avg / 255) * 0.05;
            const glow = 50 + (avg / 255) * 70;
            snippetHero.style.transform = `scale(${scale})`;
            snippetHero.style.boxShadow = `0 0 ${glow}px rgba(0,255,102,0.3), inset 0 0 ${glow/2}px rgba(0,255,102,0.2)`;
        }

        // ========== ПЛЕЕР ==========
        const playBtnIcon = document.querySelector('#playBtn i');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const timeDisplay = document.getElementById('timeDisplay');
        let isDragging = false;

        function togglePlay() {
            if (!isAudioSetup) setupAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            if (snippetAudio.paused) {
                snippetAudio.play(); playBtnIcon.className = 'fa-solid fa-pause';
            } else {
                snippetAudio.pause(); playBtnIcon.className = 'fa-solid fa-play';
                if (snippetHero) snippetHero.style.transform = 'scale(1)';
            }
        }

        function fmt(s) {
            if (!s || isNaN(s)) return '00:00';
            return `${Math.floor(s/60)<10?'0':''}${Math.floor(s/60)}:${Math.floor(s%60)<10?'0':''}${Math.floor(s%60)}`;
        }

        snippetAudio.addEventListener('loadedmetadata', () => { timeDisplay.textContent = `00:00 / ${fmt(snippetAudio.duration)}`; });

        function updateProg(x) {
            const r = progressContainer.getBoundingClientRect();
            const pct = Math.max(0, Math.min((x - r.left) / r.width, 1));
            progressBar.style.width = (pct * 100) + '%';
            if (snippetAudio.duration) {
                snippetAudio.currentTime = pct * snippetAudio.duration;
                timeDisplay.textContent = `${fmt(snippetAudio.currentTime)} / ${fmt(snippetAudio.duration)}`;
            }
        }

        progressContainer.addEventListener('mousedown', e => { isDragging = true; updateProg(e.clientX); });
        window.addEventListener('mousemove', e => { if (isDragging) { e.preventDefault(); updateProg(e.clientX); } });
        window.addEventListener('mouseup', () => isDragging = false);
        progressContainer.addEventListener('touchstart', e => { isDragging = true; updateProg(e.touches[0].clientX); }, { passive: false });
        progressContainer.addEventListener('touchmove', e => { if (isDragging) { e.preventDefault(); updateProg(e.touches[0].clientX); } }, { passive: false });
        progressContainer.addEventListener('touchend', () => isDragging = false);

        snippetAudio.addEventListener('timeupdate', () => {
            if (snippetAudio.duration && !isDragging) {
                progressBar.style.width = `${(snippetAudio.currentTime / snippetAudio.duration) * 100}%`;
                timeDisplay.textContent = `${fmt(snippetAudio.currentTime)} / ${fmt(snippetAudio.duration)}`;
            }
        });

        snippetAudio.addEventListener('ended', () => {
            playBtnIcon.className = 'fa-solid fa-play';
            progressBar.style.width = '0%';
            snippetAudio.currentTime = 0;
            timeDisplay.textContent = `00:00 / ${fmt(snippetAudio.duration)}`;
            if (snippetHero) snippetHero.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
