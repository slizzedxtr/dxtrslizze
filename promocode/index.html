<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMOCODE | DXTR | SlizZe</title>
    <meta name="description" content="Секретная страница. Введите промокод для доступа к эксклюзивным материалам.">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-green-glow: rgba(0, 255, 102, 0.4);
            --bg-dark: #020602;
            --glass-bg: rgba(5, 15, 5, 0.7);
            --glass-border: rgba(0, 255, 102, 0.2);
            --text-main: #ffffff;
            --text-muted: #8aa88a;
            --error-red: #cc4444; /* Не ярко-красный */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* МАТРИЦА ФОН */
        #matrixCanvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; opacity: 0.6;
        }
        
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;
            background: radial-gradient(circle at center, transparent 30%, var(--bg-dark) 100%);
        }

        /* МЕНЮ И БУРГЕР */
        .burger-btn { position: fixed; top: 25px; left: 25px; z-index: 10001; background: rgba(0,255,102,0.05); border: 1px solid var(--glass-border); width: 45px; height: 45px; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: white; font-size: 1.2rem; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
        .burger-btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); border-color: var(--neon-green); }
        .sidebar { position: fixed; top: 0; left: -300px; width: 300px; height: 100vh; background: rgba(2, 6, 2, 0.95); backdrop-filter: blur(25px); border-right: 1px solid var(--glass-border); z-index: 10000; display: flex; flex-direction: column; padding: 80px 30px 30px; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        .sidebar.active { left: 0; }
        .sidebar-link { color: white; text-decoration: none; font-size: 1.1rem; font-weight: 700; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 15px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .sidebar-link i { color: var(--neon-green); font-size: 1.4rem; transition: 0.3s; }
        .sidebar-link:hover { color: var(--neon-green); padding-left: 10px; border-bottom-color: var(--neon-green-glow); }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 9999; display: none; opacity: 0; transition: 0.3s; }
        .sidebar-overlay.active { display: block; opacity: 1; }

        /* ШАПКА СТРАНИЦЫ */
        header { text-align: center; padding: 12vh 20px 4vh; position: relative; z-index: 10; }
        header h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; text-transform: uppercase; letter-spacing: 10px; color: var(--neon-green); text-shadow: 0 0 25px var(--neon-green-glow); margin-bottom: 10px; }

        main { flex: 1; width: 100%; max-width: 900px; margin: 0 auto; padding: 0 20px 40px; z-index: 10; display: flex; flex-direction: column; align-items: center; position: relative; }

        /* ИНТЕРФЕЙС ПРОМОКОДА */
        .promo-wrapper { position: relative; width: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center; margin-top: 5vh; transition: opacity 0.3s; }
        
        .promo-box {
            display: flex; width: 100%; height: 70px; background: var(--glass-bg); border: 2px solid var(--neon-green); border-radius: 20px; overflow: hidden;
            box-shadow: 0 0 30px var(--neon-green-glow), inset 0 0 15px rgba(0, 255, 102, 0.1);
            backdrop-filter: blur(15px); transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative; z-index: 2;
        }
        
        /* Сжатие поля ввода */
        .promo-box.collapsing { width: 70px; border-radius: 50%; background: var(--neon-green); border-color: #fff; box-shadow: 0 0 50px var(--neon-green); }
        .promo-box.collapsing input, .promo-box.collapsing button { opacity: 0; pointer-events: none; }

        .promo-box input { flex: 1; background: transparent; border: none; outline: none; padding: 0 25px; color: #fff; font-size: 1.2rem; font-weight: 700; text-align: center; font-family: 'Montserrat', sans-serif; letter-spacing: 2px; transition: opacity 0.3s; }
        .promo-box input::placeholder { color: var(--text-muted); font-weight: 500; letter-spacing: 1px; }
        
        .promo-box button { width: 70px; background: rgba(0, 255, 102, 0.1); border: none; border-left: 1px solid var(--glass-border); color: var(--neon-green); font-size: 1.5rem; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .promo-box button:hover { background: var(--neon-green); color: #000; box-shadow: -5px 0 20px var(--neon-green-glow); }

        .error-msg { margin-top: 15px; color: var(--error-red); font-size: 0.95rem; font-weight: 600; opacity: 0; transform: translateY(-10px); transition: all 0.3s; text-align: center; }
        .error-msg.visible { opacity: 1; transform: translateY(0); }

        /* ВСПЛЕСК КАПЕЛЬКИ */
        .splash-ring {
            position: absolute; top: 35px; left: 50%; width: 70px; height: 70px; background: var(--neon-green); border-radius: 50%;
            transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; z-index: 3;
        }
        .splash-ring.animate { animation: splashEffect 0.7s ease-out forwards; }
        @keyframes splashEffect {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(8); opacity: 0; }
        }

        /* БЛОК СО СНИППЕТОМ */
        .snippet-wrapper {
            width: 100%; display: none; flex-direction: column; align-items: center; gap: 30px;
            opacity: 0; transform: scale(0.9); transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .snippet-wrapper.visible { display: flex; }
        .snippet-wrapper.active { opacity: 1; transform: scale(1); }

        .hero-release {
            background: linear-gradient(135deg, rgba(5,20,10,0.8) 0%, rgba(2,10,5,0.9) 100%);
            backdrop-filter: blur(25px); border: 2px solid var(--neon-green); border-radius: 30px; padding: 40px; display: flex; gap: 40px; align-items: center; width: 100%; max-width: 850px;
            box-shadow: 0 0 50px rgba(0, 255, 102, 0.15), inset 0 0 20px rgba(0, 255, 102, 0.1); position: relative; overflow: hidden;
        }
        .hero-release::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at center, rgba(0,255,102,0.1) 0%, transparent 60%); animation: rotateBg 15s linear infinite; pointer-events: none; z-index: 0; }
        @keyframes rotateBg { 100% { transform: rotate(360deg); } }

        .hero-cover-wrap { position: relative; flex-shrink: 0; width: 300px; z-index: 1; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid var(--glass-border); }
        .hero-cover-wrap img { width: 100%; display: block; transition: transform 0.5s; }
        .hero-cover-wrap:hover img { transform: scale(1.05); }

        .hero-info { flex: 1; z-index: 1; display: flex; flex-direction: column; gap: 20px; }
        .hero-badge { display: inline-block; background: rgba(0, 255, 102, 0.15); color: var(--neon-green); padding: 5px 15px; border-radius: 50px; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; border: 1px solid var(--neon-green); align-self: flex-start; box-shadow: 0 0 15px rgba(0, 255, 102, 0.3); }
        .hero-info h2 { font-size: 3rem; font-weight: 900; line-height: 1.1; color: #fff; text-shadow: 0 0 20px rgba(0,255,102,0.4); }

        /* Плеер */
        .audio-player { background: rgba(0,0,0,0.6); border-radius: 16px; padding: 15px 20px; display: flex; align-items: center; gap: 20px; border: 1px solid var(--glass-border); box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .play-pause-btn { background: var(--neon-green); color: #000; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 1.3rem; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; box-shadow: 0 0 15px var(--neon-green-glow); flex-shrink: 0; }
        .play-pause-btn:hover { transform: scale(1.1); background: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.6); }
        
        .progress-container { width: 100%; height: 24px; display: flex; align-items: center; cursor: pointer; position: relative; }
        .progress-container::before { content: ''; position: absolute; left: 0; width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .progress-bar { height: 6px; width: 0%; background: var(--neon-green); border-radius: 10px; position: relative; pointer-events: none; z-index: 2; box-shadow: 0 0 10px var(--neon-green); }
        .progress-bar::after { content: ''; position: absolute; right: -7px; top: -5px; width: 16px; height: 16px; background: #fff; border-radius: 50%; box-shadow: 0 0 12px var(--neon-green); }
        .time-display { font-size: 0.85rem; color: var(--text-muted); font-variant-numeric: tabular-nums; font-weight: 700; min-width: 90px; text-align: right; }

        .back-btn { background: transparent; border: 2px solid var(--text-muted); color: var(--text-muted); padding: 12px 30px; border-radius: 50px; font-size: 1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .back-btn:hover { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 15px rgba(0,255,102,0.2); transform: translateX(-5px); }

        @media (max-width: 900px) {
            .hero-release { flex-direction: column; text-align: center; padding: 30px 20px; }
            .hero-cover-wrap { width: 100%; max-width: 250px; }
            .hero-badge { align-self: center; }
            .hero-info h2 { font-size: 2.2rem; }
        }
        @media (max-width: 600px) {
            header h1 { font-size: 2.5rem; }
            .promo-box { height: 60px; }
            .promo-box input { font-size: 1rem; }
            .burger-btn { top: 15px; left: 15px; width: 40px; height: 40px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="burger-btn" id="burgerBtn"><i class="fa-solid fa-bars"></i></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="color: var(--text-muted); font-size: 0.9rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
            МЕНЮ <i class="fa-solid fa-xmark" id="closeSidebar" style="font-size: 1.5rem; cursor: pointer; color: white; transition: 0.3s;"></i>
        </div>
        <a href="https://dxtrslizze.xyz/" class="sidebar-link"><i class="fa-solid fa-home"></i> Главная</a>
        <a href="https://dxtrslizze.xyz/muzcatalog/" class="sidebar-link"><i class="fa-solid fa-music"></i> Муз. каталог</a>
        <a href="https://dxtrslizze.xyz/about" class="sidebar-link"><i class="fa-solid fa-circle-info"></i> О нас</a>
    </div>

    <header>
        <h1>PROMOCODE</h1>
    </header>

    <main>
        <div class="promo-wrapper" id="promoWrapper">
            <div class="promo-box" id="promoBox">
                <input type="text" id="promoInput" placeholder="Введите код доступа" autocomplete="off" spellcheck="false">
                <button id="promoSubmit"><i class="fa-solid fa-terminal"></i></button>
            </div>
            <div class="error-msg" id="promoError">Данный промокод не существует</div>
            <div class="splash-ring" id="splashRing"></div>
        </div>

        <div class="snippet-wrapper" id="snippetWrapper">
            <div class="hero-release">
                <div class="hero-cover-wrap">
                    <img src="../logo_Dance_Girl.jpeg" alt="Dance Girl Cover" onerror="this.src='dslogo.png'">
                </div>
                <div class="hero-info">
                    <div class="hero-badge">Snippet</div>
                    <h2>Dance Girl</h2>
                    
                    <div class="audio-player">
                        <button class="play-pause-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
                        <audio id="snippetAudio" src="../snippet_Dance_Girl.mp3" preload="metadata"></audio>
                        <div class="progress-container" id="progressContainer">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                        <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                    </div>
                </div>
            </div>
            <button class="back-btn" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i> Назад</button>
        </div>
    </main>

    <script>
        // ==========================================
        // ======= НАСТРОЙКИ ПРОМОКОДА ==============
        // ==========================================
        const SECRET_PROMOCODE = "D&S_Dance";
        // ==========================================

        // === МАТРИЦА (КАНВАС) ===
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const matrixChars = "01".split(""); // Можно поменять на буквы или спецсимволы
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for(let x = 0; x < columns; x++) drops[x] = 1;
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 6, 2, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#00ff66';
            ctx.font = fontSize + 'px monospace';
            
            for(let i = 0; i < drops.length; i++) {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // === МЕНЮ БУРГЕР ===
        const burgerBtn = document.getElementById('burgerBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const closeSidebar = document.getElementById('closeSidebar');

        function toggleMenu() {
            sidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
        }
        burgerBtn.onclick = toggleMenu;
        closeSidebar.onclick = toggleMenu;
        sidebarOverlay.onclick = toggleMenu;

        // === ЛОГИКА ПРОМОКОДА И АНИМАЦИИ ===
        const promoInput = document.getElementById('promoInput');
        const promoSubmit = document.getElementById('promoSubmit');
        const promoError = document.getElementById('promoError');
        const promoBox = document.getElementById('promoBox');
        const promoWrapper = document.getElementById('promoWrapper');
        const splashRing = document.getElementById('splashRing');
        const snippetWrapper = document.getElementById('snippetWrapper');
        const snippetAudio = document.getElementById('snippetAudio');

        function checkPromo() {
            const val = promoInput.value.trim();
            if (val === "") return;

            if (val === SECRET_PROMOCODE) {
                // Верный код
                promoError.classList.remove('visible');
                
                // 1. Сжимаем поле
                promoBox.classList.add('collapsing');
                
                // 2. Ждем пока сожмется, затем всплеск
                setTimeout(() => {
                    promoBox.style.opacity = '0'; // Прячем сжатый кружок
                    splashRing.classList.add('animate'); // Пускаем волну
                    
                    // 3. Показываем секретный блок
                    setTimeout(() => {
                        promoWrapper.style.display = 'none'; // Убираем враппер чтобы не мешал
                        snippetWrapper.classList.add('visible');
                        // Небольшая задержка для плавного opacity
                        setTimeout(() => {
                            snippetWrapper.classList.add('active');
                        }, 50);
                    }, 300); // Появляется пока летит капля

                }, 600); // Время сжатия box (0.6s в CSS)
            } else {
                // Неверный код
                promoError.classList.add('visible');
                promoBox.style.transform = 'translateX(-10px)';
                setTimeout(() => promoBox.style.transform = 'translateX(10px)', 100);
                setTimeout(() => promoBox.style.transform = 'translateX(-10px)', 200);
                setTimeout(() => promoBox.style.transform = 'translateX(0)', 300);
            }
        }

        promoSubmit.onclick = checkPromo;
        promoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPromo();
        });
        promoInput.addEventListener('input', () => {
            promoError.classList.remove('visible'); // Скрываем ошибку при новом вводе
        });

        // Кнопка Назад
        function goBack() {
            // Останавливаем музыку если играет
            snippetAudio.pause();
            snippetAudio.currentTime = 0;
            document.querySelector('#playBtn i').className = 'fa-solid fa-play';

            // 1. Скрываем сниппет
            snippetWrapper.classList.remove('active');
            
            setTimeout(() => {
                snippetWrapper.classList.remove('visible');
                
                // 2. Готовим поле к возврату
                promoWrapper.style.display = 'flex';
                splashRing.classList.remove('animate');
                
                // Запускаем обратную анимацию поля
                setTimeout(() => {
                    promoBox.style.opacity = '1';
                    promoBox.classList.remove('collapsing');
                    promoInput.value = ''; // Очищаем ввод
                }, 50);

            }, 600);
        }

        // === АУДИОПЛЕЕР ===
        const playBtnIcon = document.querySelector('#playBtn i');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const timeDisplay = document.getElementById('timeDisplay');
        let isDragging = false;

        function togglePlay() {
            if (snippetAudio.paused) {
                snippetAudio.play();
                playBtnIcon.className = 'fa-solid fa-pause';
            } else {
                snippetAudio.pause();
                playBtnIcon.className = 'fa-solid fa-play';
            }
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "00:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min < 10 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        snippetAudio.addEventListener('loadedmetadata', () => {
            timeDisplay.textContent = `00:00 / ${formatTime(snippetAudio.duration)}`;
        });

        function updateProgress(clientX) {
            const rect = progressContainer.getBoundingClientRect();
            let offsetX = clientX - rect.left;
            const width = rect.width;
            if (offsetX < 0) offsetX = 0;
            if (offsetX > width) offsetX = width;
            const percentage = offsetX / width;
            
            progressBar.style.width = (percentage * 100) + '%';
            
            if (snippetAudio.duration) {
                const targetTime = percentage * snippetAudio.duration;
                timeDisplay.textContent = `${formatTime(targetTime)} / ${formatTime(snippetAudio.duration)}`;
                snippetAudio.currentTime = targetTime;
            }
        }

        progressContainer.addEventListener('mousedown', (e) => { isDragging = true; updateProgress(e.clientX); });
        window.addEventListener('mousemove', (e) => { if (isDragging) { updateProgress(e.clientX); } });
        window.addEventListener('mouseup', () => { isDragging = false; });
        progressContainer.addEventListener('touchstart', (e) => { isDragging = true; updateProgress(e.touches[0].clientX); }, { passive: false });
        window.addEventListener('touchmove', (e) => { if (isDragging) { updateProgress(e.touches[0].clientX); e.preventDefault(); } }, { passive: false });
        window.addEventListener('touchend', () => { isDragging = false; });

        snippetAudio.addEventListener('timeupdate', () => {
            if (snippetAudio.duration && !isDragging) {
                const progressPercent = (snippetAudio.currentTime / snippetAudio.duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
                timeDisplay.textContent = `${formatTime(snippetAudio.currentTime)} / ${formatTime(snippetAudio.duration)}`;
            }
        });

        snippetAudio.addEventListener('ended', () => {
            playBtnIcon.className = 'fa-solid fa-play';
            progressBar.style.width = '0%';
            snippetAudio.currentTime = 0;
            timeDisplay.textContent = `00:00 / ${formatTime(snippetAudio.duration)}`;
        });
    </script>
</body>
</html>
