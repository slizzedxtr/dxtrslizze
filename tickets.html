<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Схема ЛВС.vsdx - Visio</title>
    <style>
        /* Общие стили MS Office / Visio */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #E6E6E6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Синяя шапка Visio */
        .title-bar {
            background-color: #2B579A;
            color: white;
            height: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            padding-left: 10px;
        }

        .title-bar-left { display: flex; align-items: center; gap: 15px; }
        .window-controls { display: flex; }
        .win-btn { padding: 5px 15px; cursor: pointer; }
        .win-btn:hover { background-color: rgba(255,255,255,0.1); }
        .win-btn.close:hover { background-color: #E81123; }

        /* Лента (Ribbon) */
        .ribbon-container {
            background-color: #FFFFFF;
            border-bottom: 1px solid #D2D2D2;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #E1E1E1;
        }

        .tab {
            padding: 5px 15px;
            font-size: 13px;
            color: #444;
            cursor: pointer;
            margin-top: 5px;
        }

        .tab.active {
            color: #2B579A;
            border-bottom: 2px solid #2B579A;
            background-color: #F3F2F1;
        }

        .toolbar {
            display: flex;
            padding: 10px;
            gap: 15px;
            background-color: #F3F2F1;
            height: 70px;
            align-items: center;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid #D2D2D2;
            padding-right: 15px;
            gap: 5px;
            color: #444;
        }
        .tool-icon { font-size: 20px; }
        .tool-text { font-size: 11px; }

        /* Основной интерфейс Visio: Сайдбар + Холст */
        .main-workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            background-color: #E6E6E6;
        }

        /* Сайдбар слева (Фигуры / Билеты) */
        .sidebar {
            width: 250px;
            background-color: #F3F2F1;
            border-right: 1px solid #D2D2D2;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            background-color: #E1E1E1;
            padding: 8px 10px;
            font-size: 12px;
            font-weight: bold;
            color: #333;
            border-bottom: 1px solid #D2D2D2;
            display: flex;
            justify-content: space-between;
        }

        .ticket-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .ticket-item {
            background-color: #FFFFFF;
            border: 1px solid #C8C8C8;
            padding: 8px 12px;
            margin-bottom: 5px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ticket-item:hover {
            background-color: #E5F1FB;
            border-color: #0078D7;
        }

        .ticket-item.active {
            background-color: #CCE4F7;
            border-color: #005499;
            font-weight: bold;
        }

        /* Холст (Миллиметровка) */
        .canvas-area {
            flex: 1;
            overflow: auto;
            padding: 20px;
            position: relative;
        }

        .canvas {
            background-color: #FFFFFF;
            width: 100%;
            min-height: 100%;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            position: relative;
            /* Та самая сетка Visio */
            background-image: 
                linear-gradient(#E8E8E8 1px, transparent 1px),
                linear-gradient(90deg, #E8E8E8 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            align-content: flex-start;
        }

        /* Элементы на холсте (Файлы) */
        .canvas-item {
            position: relative;
            cursor: pointer;
            border: 1px dashed transparent;
            padding: 5px;
            transition: border 0.2s;
            max-width: 400px;
        }

        .canvas-item:hover {
            border: 1px dashed #2B579A;
        }

        /* Для картинок */
        .canvas-image {
            max-width: 100%;
            border: 1px solid #000;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            user-select: text;
        }

        /* Для документов (синие блоки как элементы схемы) */
        .canvas-doc {
            width: 120px;
            height: 80px;
            background-color: #FFFFFF;
            border: 2px solid #2B579A;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #333;
        }

        .doc-icon {
            font-size: 24px;
            color: #2B579A;
            margin-bottom: 5px;
        }

        .item-label {
            margin-top: 8px;
            font-size: 12px;
            color: #333;
            text-align: center;
            background: rgba(255,255,255,0.8);
            padding: 2px 5px;
            word-wrap: break-word;
            max-width: 100%;
        }

        /* Заглушка, когда билет не выбран */
        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #A6A6A6;
            font-size: 24px;
            text-align: center;
        }

        /* Статус бар */
        .status-bar {
            height: 22px;
            background-color: #2B579A;
            color: white;
            font-size: 11px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="title-bar">
        <div class="title-bar-left">
            <span>💾</span>
            <span>↩</span>
            <span>↪</span>
            <span>Схема ЛВС.vsdx - Visio</span>
        </div>
        <div class="window-controls">
            <div class="win-btn">─</div>
            <div class="win-btn">▢</div>
            <div class="win-btn close">✕</div>
        </div>
    </div>

    <div class="ribbon-container">
        <div class="tabs">
            <span class="tab">Файл</span>
            <span class="tab active">Главная</span>
            <span class="tab">Вставка</span>
            <span class="tab">Конструктор</span>
        </div>
        <div class="toolbar">
            <div class="tool-group">
                <span class="tool-icon">↖</span>
                <span class="tool-text">Указатель</span>
            </div>
            <div class="tool-group">
                <span class="tool-icon">A</span>
                <span class="tool-text">Текст</span>
            </div>
            <div class="tool-group">
                <span class="tool-icon">□</span>
                <span class="tool-text">Фигуры</span>
            </div>
            <div class="tool-group" style="border:none;" id="syncStatus">
                <span class="tool-icon" style="color: #F2C811;">⏳</span>
                <span class="tool-text">Синхронизация...</span>
            </div>
        </div>
    </div>

    <div class="main-workspace">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <span>Фигуры (Реестр)</span>
                <span>▼</span>
            </div>
            <div class="ticket-list" id="ticketList">
                </div>
        </div>

        <div class="canvas-area">
            <div class="canvas" id="canvas">
                <div class="empty-state" id="emptyState">
                    Перетащите фигуру на страницу чертежа<br>
                    <span style="font-size: 14px;">(Или выберите группу слева)</span>
                </div>
                </div>
        </div>
    </div>

    <div class="status-bar">
        <span id="pageCount">Страница 1 из 1 | Фигур: 0</span>
        <span>100% ◚ ◛</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // Инициализация Supabase
        const SUPABASE_URL = 'https://lcbcsyvcciobmqdbonps.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_iFmhjG3uVMu76HKSq-jj5g_MOAwpr6h';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allData = [];
        let groupedByTicket = {};

        async function fetchTickets() {
            try {
                // Забираем все записи из БД
                const { data, error } = await supabaseClient
                    .from('ticket_attachments')
                    .select('*')
                    .order('ticket_id', { ascending: true });

                if (error) throw error;

                allData = data;
                
                // Группируем файлы по номеру билета
                data.forEach(item => {
                    if (!groupedByTicket[item.ticket_id]) {
                        groupedByTicket[item.ticket_id] = [];
                    }
                    groupedByTicket[item.ticket_id].push(item);
                });

                renderTicketList();
                
                // Обновляем статус
                document.getElementById('syncStatus').innerHTML = `
                    <span class="tool-icon" style="color: #2BA045;">✓</span>
                    <span class="tool-text">Синхронизировано</span>
                `;

            } catch (err) {
                console.error('Ошибка загрузки данных:', err);
                document.getElementById('syncStatus').innerHTML = `
                    <span class="tool-icon" style="color: #E81123;">✕</span>
                    <span class="tool-text">Ошибка сети</span>
                `;
            }
        }

        // Рендер левого меню с билетами
        function renderTicketList() {
            const listEl = document.getElementById('ticketList');
            listEl.innerHTML = ''; // очистка

            const ticketIds = Object.keys(groupedByTicket).sort((a, b) => parseInt(a) - parseInt(b));

            ticketIds.forEach(id => {
                const item = document.createElement('div');
                item.className = 'ticket-item';
                item.innerHTML = `<span>📑</span> Группа №${id}`;
                
                item.onclick = () => {
                    // Убираем выделение со всех
                    document.querySelectorAll('.ticket-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active'); // Выделяем нажатый
                    renderCanvas(id); // Отрисовываем холст
                };

                listEl.appendChild(item);
            });
        }

        // Рендер файлов на миллиметровке
        function renderCanvas(ticketId) {
            const canvas = document.getElementById('canvas');
            const files = groupedByTicket[ticketId] || [];
            
            // Очищаем холст
            canvas.innerHTML = '';

            // Обновляем статус бар снизу
            document.getElementById('pageCount').textContent = `Страница 1 из 1 | Фигур (файлов): ${files.length}`;

            files.forEach(file => {
                const wrapper = document.createElement('div');
                wrapper.className = 'canvas-item';

                if (file.file_type.startsWith('image/')) {
                    // Если картинка — просто выводим её как элемент чертежа
                    wrapper.innerHTML = `
                        <img src="${file.file_url}" class="canvas-image" alt="${file.file_name}">
                        <div class="item-label">${file.file_name}</div>
                    `;
                } else {
                    // Если документ — делаем кликабельный блок с принудительным скачиванием
                    const link = document.createElement('a');
                    link.className = 'canvas-doc';
                    link.href = file.file_url;
                    link.download = file.file_name; // Атрибут для скачивания
                    link.target = '_blank';
                    link.innerHTML = `
                        <div class="doc-icon">📄</div>
                        <div style="font-size: 10px;">ФАЙЛ</div>
                    `;
                    
                    wrapper.appendChild(link);
                    
                    const label = document.createElement('div');
                    label.className = 'item-label';
                    label.textContent = file.file_name;
                    wrapper.appendChild(label);
                }

                canvas.appendChild(wrapper);
            });
        }

        // Запускаем стягивание базы при загрузке страницы
        window.onload = fetchTickets;

    </script>
</body>
</html>
