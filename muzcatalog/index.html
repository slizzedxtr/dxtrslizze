<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXTR | SlizZe - Музыкальный каталог</title>
    <meta name="description" content="Официальный каталог треков DXTR и SlizZe. Слушай и скачивай музыку в высоком качестве (MP3 и WAV).">
    <link rel="icon" type="image.png" href="../dslogo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-purple: #7000ff;
            --neon-cyan: #00c6ff;
            --neon-yellow: #ffcc00;
            --bg-dark: #050507;
            --glass-bg: rgba(20, 20, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* АНИМИРОВАННЫЙ ФОН + ХАЙТЕК СЕТКА */
        .bg-blobs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; overflow: hidden; background: #050507; }
        .blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.5; animation: float 20s infinite alternate ease-in-out; }
        .blob-1 { width: 500px; height: 500px; background: var(--neon-purple); top: -10%; left: -10%; }
        .blob-2 { width: 600px; height: 600px; background: var(--neon-pink); bottom: -20%; right: -10%; animation-delay: -5s; }
        .blob-3 { width: 400px; height: 400px; background: var(--neon-cyan); top: 30%; left: 40%; opacity: 0.3; animation-delay: -10s; }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;
            background: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }
        .fade-in { animation: fadeIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        /* ВЕРХНЯЯ НАВИГАЦИЯ */
        .top-nav { display: flex; justify-content: center; gap: 40px; padding: 25px 20px 0; position: relative; z-index: 20; }
        .nav-link { color: var(--text-muted); text-decoration: none; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; padding-bottom: 5px; border-bottom: 2px solid transparent; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #fff; border-bottom: 2px solid var(--neon-cyan); text-shadow: 0 0 15px rgba(0, 198, 255, 0.6); }

        /* ШАПКА */
        header { text-align: center; padding: 6vh 20px 4vh; position: relative; z-index: 10; }
        header h1 { font-size: clamp(3rem, 7vw, 4.5rem); font-weight: 900; text-transform: uppercase; letter-spacing: 8px; background: linear-gradient(90deg, #fff, var(--neon-cyan), var(--neon-purple), var(--neon-pink)); background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradient-shift 6s linear infinite; margin-bottom: 10px; filter: drop-shadow(0 0 20px rgba(0, 198, 255, 0.3)); }
        @keyframes gradient-shift { 0% { background-position: 0% center; } 100% { background-position: 300% center; } }
        header p { font-size: 1.1rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; font-weight: 500; letter-spacing: 1px; }

        /* КОНТЕЙНЕР КАТАЛОГА */
        main { flex: 1; width: 100%; max-width: 1000px; margin: 0 auto; padding: 0 20px 60px; z-index: 10; display: flex; flex-direction: column; gap: 20px; }

        /* ПАНЕЛЬ ПОИСКА И СЧЕТЧИКА */
        .controls-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
            background: linear-gradient(135deg, rgba(30,30,40,0.6), rgba(10,10,15,0.8));
            padding: 15px 25px; border-radius: 16px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .search-box { position: relative; flex: 1; max-width: 400px; display: flex; align-items: center; }
        .search-box i { position: absolute; left: 15px; color: var(--text-muted); font-size: 1.1rem; }
        .search-box input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 12px 15px 12px 45px; border-radius: 12px; font-family: 'Montserrat', sans-serif;
            font-size: 1rem; font-weight: 500; outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 198, 255, 0.3); background: rgba(0,0,0,0.6); }
        .track-counter { font-size: 1.1rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .track-counter .neon-text { color: var(--neon-yellow); text-shadow: 0 0 10px rgba(255, 204, 0, 0.5); font-size: 1.4rem; margin-left: 5px; }

        /* БОМБЕЗНАЯ КАРТОЧКА ТРЕКА */
        .catalog-item {
            background: linear-gradient(135deg, rgba(30,30,40,0.7) 0%, rgba(10,10,15,0.8) 100%);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px 25px;
            display: flex; align-items: center; gap: 20px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
        }
        .catalog-item::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg); transition: 0.5s;
        }
        .catalog-item:hover::before { left: 150%; }
        .catalog-item:hover { border-color: rgba(0, 198, 255, 0.5); box-shadow: 0 15px 40px rgba(0, 198, 255, 0.2); transform: translateY(-3px); }

        .catalog-item.playing {
            border-color: var(--neon-cyan); box-shadow: 0 0 30px rgba(0, 198, 255, 0.3), inset 0 0 20px rgba(0, 198, 255, 0.1);
            transform: scale(1.02); background: linear-gradient(135deg, rgba(40,40,60,0.8) 0%, rgba(15,15,25,0.9) 100%);
        }
        .catalog-item.playing .ci-number { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
        .catalog-item.playing .ci-title { color: var(--neon-cyan); }

        /* Левая часть */
        .ci-left { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .ci-number { color: var(--text-muted); font-weight: 900; font-size: 1.3rem; width: 30px; text-align: center; transition: 0.3s; font-style: italic; }
        .ci-cover-wrapper { position: relative; width: 85px; height: 85px; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15); }
        .ci-cover-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .catalog-item:hover .ci-cover-wrapper img, .catalog-item.playing .ci-cover-wrapper img { transform: scale(1.15); filter: brightness(0.4); }

        /* Кнопка Play */
        .ci-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 204, 0, 0.9); color: #000; border: none; width: 45px; height: 45px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; opacity: 0;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(5px);
        }
        .catalog-item:hover .ci-play-btn { opacity: 1; box-shadow: 0 0 20px rgba(255, 204, 0, 0.8); }
        .ci-play-btn:hover { background: #fff; transform: translate(-50%, -50%) scale(1.15); }
        .ci-play-btn.active { opacity: 1; background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }

        /* Центр */
        .ci-center { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; padding-right: 15px; }
        .ci-header { display: flex; align-items: center; justify-content: space-between; }
        .ci-title-block { display: flex; flex-direction: column; }
        .ci-title { font-size: 1.2rem; font-weight: 900; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: 0.3s; letter-spacing: 0.5px; }
        .ci-artist { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        .ci-tags { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
        .ci-tag { font-size: 0.65rem; font-weight: 800; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .tag-hq { background: rgba(0, 198, 255, 0.1); color: var(--neon-cyan); border: 1px solid rgba(0, 198, 255, 0.3); }
        .tag-lossless { background: rgba(255, 0, 127, 0.1); color: var(--neon-pink); border: 1px solid rgba(255, 0, 127, 0.3); }

        /* Эквалайзер */
        .visualizer { display: none; align-items: flex-end; gap: 3px; height: 20px; margin-left: auto; }
        .catalog-item.playing .visualizer { display: flex; }
        .vis-bar { width: 4px; background: var(--neon-cyan); border-radius: 2px; animation: bounce 0.5s infinite alternate ease-in-out; box-shadow: 0 0 8px var(--neon-cyan); }
        .vis-bar:nth-child(1) { animation-duration: 0.4s; } .vis-bar:nth-child(2) { animation-duration: 0.6s; animation-delay: 0.1s; }
        .vis-bar:nth-child(3) { animation-duration: 0.5s; animation-delay: 0.2s; } .vis-bar:nth-child(4) { animation-duration: 0.7s; animation-delay: 0.3s; }
        @keyframes bounce { 0% { height: 4px; } 100% { height: 20px; } }

        /* Плеер (Ползунок) */
        .ci-player-controls { display: flex; align-items: center; gap: 15px; width: 100%; margin-top: 5px; }
        .progress-container { width: 100%; height: 24px; display: flex; align-items: center; cursor: pointer; position: relative; }
        .progress-container::before { content: ''; position: absolute; left: 0; width: 100%; height: 6px; background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .progress-bar { height: 6px; width: 0%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); border-radius: 10px; position: relative; pointer-events: none; z-index: 2; box-shadow: 0 0 10px rgba(0,198,255,0.5); }
        .progress-bar::after { content: ''; position: absolute; right: -7px; top: -5px; width: 16px; height: 16px; background: #fff; border-radius: 50%; box-shadow: 0 0 12px rgba(0, 198, 255, 0.9); transition: transform 0.1s; }
        .progress-container:active .progress-bar::after { transform: scale(1.4); }
        .time-display { font-size: 0.85rem; color: var(--text-muted); font-variant-numeric: tabular-nums; font-weight: 700; min-width: 90px; text-align: right; white-space: nowrap; }

        /* Правая часть: Кнопки действий */
        .ci-right { flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; align-items: stretch; width: 150px; }
        .action-btn-sm { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 15px; border-radius: 12px; font-size: 0.85rem; font-weight: 800; cursor: pointer; transition: 0.3s; text-decoration: none; border: 1px solid transparent; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .dl-btn { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.15); }
        .dl-btn:hover { border-color: var(--neon-cyan); background: rgba(0,198,255,0.1); box-shadow: 0 0 15px rgba(0,198,255,0.4); transform: translateY(-2px); }
        
        .yt-btn { background: rgba(255, 0, 0, 0.05); border-color: rgba(255, 0, 0, 0.2); color: #ff4d4d; }
        .yt-btn:hover { background: rgba(255, 0, 0, 0.15); border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.4); color: #fff; transform: translateY(-2px); }

        .plt-btn { background: rgba(112, 0, 255, 0.08); border-color: rgba(112, 0, 255, 0.3); color: #c280ff; }
        .plt-btn:hover { background: rgba(112, 0, 255, 0.2); border-color: var(--neon-purple); box-shadow: 0 0 15px rgba(112,0,255,0.5); color: #fff; transform: translateY(-2px); }

        /* ФИКСИРОВАННАЯ КНОПКА ДОМОЙ (Плавающая) */
        .fixed-home-btn {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--neon-purple), #4a00e0);
            color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; text-decoration: none; z-index: 1000;
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.5), inset 0 0 10px rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.1); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float-btn 4s ease-in-out infinite;
        }
        .fixed-home-btn:hover { background: var(--neon-cyan); box-shadow: 0 0 30px rgba(0, 198, 255, 0.8); border-color: #fff; transform: scale(1.15); animation-play-state: paused; color: #000; }
        @keyframes float-btn { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        /* МОДАЛЬНЫЕ ОКНА */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: var(--bg-dark); border: 2px solid var(--neon-cyan); border-radius: 24px; padding: 40px; text-align: center; width: 90%; max-width: 400px; position: relative; box-shadow: 0 0 50px rgba(0,198,255,0.2); }
        .close-btn { position: absolute; top: 15px; right: 25px; color: var(--text-muted); font-size: 2.5rem; cursor: pointer; transition: 0.3s; line-height: 1; }
        .close-btn:hover { color: var(--neon-pink); transform: rotate(90deg); }
        .modal-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 30px; text-transform: uppercase; color: #fff; }
        
        .format-btn { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 800; color: white; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; transition: 0.3s; background: rgba(255,255,255,0.03); }
        .format-btn.mp3:hover { border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0, 198, 255, 0.4); background: rgba(0,198,255,0.1); transform: scale(1.05); }
        .format-btn.wav:hover { border-color: var(--neon-pink); box-shadow: 0 0 20px rgba(255, 0, 127, 0.4); background: rgba(255,0,127,0.1); transform: scale(1.05); }
        
        /* Кнопки площадок */
        .plat-btn { display: flex; align-items: center; gap: 15px; padding: 15px 20px; border-radius: 12px; text-decoration: none; font-weight: 800; color: white; margin-bottom: 12px; transition: 0.3s; border: 1px solid transparent; font-size: 1.1rem; }
        .plat-btn i { font-size: 1.4rem; }
        .btn-yam { background: rgba(255, 204, 0, 0.1); border-color: rgba(255, 204, 0, 0.3); } .btn-yam:hover { background: rgba(255, 204, 0, 0.9); color: #000; box-shadow: 0 0 20px rgba(255, 204, 0, 0.6); transform: scale(1.05); }
        .btn-spo { background: rgba(29, 185, 84, 0.1); border-color: rgba(29, 185, 84, 0.3); } .btn-spo:hover { background: #1DB954; box-shadow: 0 0 20px rgba(29, 185, 84, 0.6); transform: scale(1.05); }
        .btn-vk { background: rgba(0, 119, 255, 0.1); border-color: rgba(0, 119, 255, 0.3); } .btn-vk:hover { background: #0077FF; box-shadow: 0 0 20px rgba(0, 119, 255, 0.6); transform: scale(1.05); }

        /* Подвал */
        footer { padding: 40px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .controls-bar { flex-direction: column; gap: 15px; text-align: center; }
            .search-box { max-width: 100%; }
            .catalog-item { flex-wrap: wrap; padding: 20px; gap: 15px; border-radius: 20px; }
            .ci-left { width: 100%; justify-content: flex-start; gap: 15px; }
            .ci-number { display: none; } 
            .ci-cover-wrapper { width: 90px; height: 90px; }
            .ci-play-btn { opacity: 1; width: 45px; height: 45px; font-size: 1.2rem; }
            .ci-center { width: 100%; align-items: flex-start; text-align: left; padding-right: 0; }
            .ci-header { width: 100%; }
            .ci-player-controls { flex-direction: column; gap: 10px; align-items: stretch; }
            .time-display { width: 100%; text-align: center; margin-top: -5px; }
            .ci-right { width: 100%; margin-top: 5px; flex-direction: row; flex-wrap: wrap; }
            .action-btn-sm { flex: 1; min-width: calc(50% - 5px); padding: 12px 10px; }
            .top-nav { flex-direction: column; gap: 15px; align-items: center; }
            header h1 { font-size: 2.2rem; }
            .fixed-home-btn { width: 55px; height: 55px; bottom: 20px; right: 20px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    </div>

    <a href="../" class="fixed-home-btn" title="На главную">

    <nav class="top-nav fade-in">

            </a>
        </div>
    </div>

    <header class="fade-in">

    </header>

    <main>
        <div class="controls-bar fade-in" style="animation-delay: 0.1s;">
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="Найти трек (например, FastRap)...">

    <script>
        // БАЗА ТРЕКОВ + YOUTUBE ССЫЛКИ
        const tracks = [
            { title: "Music", cover: "../logo_Music.png", mp3: "../mp3_Music.mp3", wav: "../wav_Music.wav", yt: "https://www.youtube.com/watch?v=NZdm_FnmTQ8" },
            { title: "FastRap", cover: "../logo_FastRap.jpeg", mp3: "../mp3_FastRap.mp3", wav: "../wav_FastRap.wav", yt: "https://www.youtube.com/watch?v=rDByUUm7eaE" },
            { title: "Night City Lights", cover: "../logo_Night_City_Lights.png", mp3: "../mp3_Night_City_Lights.mp3", wav: "../wav_Night_City_Lights.wav", yt: "https://www.youtube.com/watch?v=M9TwVLCdEiM" },
            { title: "Mafia", cover: "../logo_Mafia.png", mp3: "../mp3_Mafia.mp3", wav: "../wav_Mafia.wav", yt: "https://www.youtube.com/watch?v=SCCUhxNEi8w" },
            { title: "Brawl Stars", cover: "../logo_Brawl_Stars.jpeg", mp3: "../mp3_Brawl_Stars.mp3", wav: "../wav_Brawl_Stars.wav", yt: "https://www.youtube.com/watch?v=_bT2_wmJ6tc" },
            { title: "Night Club", cover: "../logo_Night_Club.jpeg", mp3: "../mp3_Night_Club.mp3", wav: "../wav_Night_Club.wav", yt: "https://www.youtube.com/watch?v=zaDFqj5H7R4" },
            { title: "Minecraft", cover: "../logo_Minecraft.jpeg", mp3: "../mp3_Minecraft.mp3", wav: "../wav_Minecraft.wav", yt: "https://www.youtube.com/watch?v=NX0QOM2-OKE" },
            { title: "Friday", cover: "../logo_Friday.jpeg", mp3: "../mp3_Friday.mp3", wav: "../wav_Friday.wav", yt: "https://www.youtube.com/watch?v=RyRbNoU2nPc" },
            { title: "F90", cover: "../logo_F90.jpeg", mp3: "../mp3_F90.mp3", wav: "../wav_F90.wav", yt: "https://www.youtube.com/watch?v=1YC9JlxU-zg" },
            { title: "Dying Light", cover: "../logo_Dying_Light.jpeg", mp3: "../mp3_Dying_Light.mp3", wav: "../wav_Dying_Light.wav", yt: "https://www.youtube.com/watch?v=gyPCJrQGeKg" },
            { title: "Cefiro Reload", cover: "../logo_Cefiro_Reload.jpeg", mp3: "../mp3_Cefiro_Reload.mp3", wav: "../wav_Cefiro_Reload.wav", yt: "https://www.youtube.com/watch?v=TMn7k7XM4I0" },
            { title: "Casino", cover: "../logo_Casino.jpeg", mp3: "../mp3_Casino.mp3", wav: "../wav_Casino.wav", yt: "https://www.youtube.com/watch?v=qj1nzYAte0Y" },
            { title: "New Year", cover: "../logo_New_Year.jpeg", mp3: "../mp3_New_Year.mp3", wav: "../wav_New_Year.wav", yt: "https://www.youtube.com/watch?v=ylW3c41lAUA" },
            { title: "Выход из Сна", cover: "../logo_VIS.jpeg", mp3: "../mp3_VIS.mp3", wav: "../wav_VIS.wav", yt: "https://www.youtube.com/watch?v=k7QO9_nLI5A" },
            { title: "Carnaval", cover: "../logo_Carnaval.jpeg", mp3: "../mp3_Carnaval.mp3", wav: "../wav_Carnaval.wav", yt: "https://www.youtube.com/watch?v=XE-bKULqNVQ" },
            { title: "Life Simulator", cover: "../logo_Life_Simulator.jpeg", mp3: "../mp3_Life_Simulator.mp3", wav: "../wav_Life_Simulator.wav", yt: "https://www.youtube.com/watch?v=ksahwYBQgrs" },
            { title: "Amazing Online", cover: "../logo_Amazing_Online.jpeg", mp3: "../mp3_Amazing_Online.mp3", wav: "../wav_Amazing_Online.wav", yt: "https://www.youtube.com/watch?v=qFm89V9JjFU" }
        ];

        const trackListContainer = document.getElementById('track-list');
        const trackCountEl = document.getElementById('trackCount');
        const searchInput = document.getElementById('searchInput');

        let currentAudio = null;
        let currentPlayBtn = null;
        let currentCard = null;

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min < 10 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Генерация HTML
        function renderTracks() {
            trackListContainer.innerHTML = ''; 
            
            tracks.forEach((track, index) => {
                const num = index + 1 < 10 ? `0${index + 1}` : index + 1;
                
                const isNCL = track.title === "Night City Lights";
                const platformsBtnHTML = isNCL 
                    ? `<button class="action-btn-sm plt-btn" onclick="openPlatformsModal()"><i class="fa-solid fa-compact-disc"></i> Площадки</button>` 
                    : '';

                const trackHTML = `
                    <div class="catalog-item fade-in" id="card-${index}" style="animation-delay: ${index * 0.05}s">
                        <div class="ci-left">
                            <div class="ci-number">${num}</div>
                            <div class="ci-cover-wrapper">
                                <img src="${track.cover}" alt="${track.title}" onerror="this.src='../dslogo.png'">
                                <button class="ci-play-btn" id="btn-${index}" onclick="togglePlay(${index})">
                                    <i id="icon-${index}" class="fa-solid fa-play"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="ci-center">
                            <div class="ci-header">
                                <div class="ci-title-block">
                                    <div class="ci-title">${track.title}</div>
                                    <div class="ci-artist">DXTR | SlizZe</div>
                                    <div class="ci-tags">
                                        <span class="ci-tag tag-hq">HQ MP3</span>
                                        <span class="ci-tag tag-lossless">LOSSLESS</span>
                                    </div>
                                </div>
                                <div class="visualizer">
                                    <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
                                </div>
                            </div>
                            <div class="ci-player-controls">
                                <audio id="audio-${index}" src="${track.mp3}" preload="metadata"></audio>
                                <div class="progress-container" id="prog-cont-${index}">
                                    <div class="progress-bar" id="prog-bar-${index}"></div>
                                </div>
                                <div class="time-display" id="time-${index}">00:00 / 00:00</div>
                            </div>
                        </div>

                        <div class="ci-right">
                            <a href="${track.yt}" target="_blank" class="action-btn-sm yt-btn">
                                <i class="fa-brands fa-youtube"></i> YouTube
                            </a>
                            ${platformsBtnHTML}
                            <button class="action-btn-sm dl-btn" onclick="openDownloadModal('${track.title}', '${track.mp3}', '${track.wav}')">
                                <i class="fa-solid fa-download"></i> Скачать
                            </button>
                        </div>
                    </div>
                `;
                trackListContainer.insertAdjacentHTML('beforeend', trackHTML);
            });

            initPlayers();
            trackCountEl.textContent = tracks.length;
        }

        function togglePlay(index) {
            const audio = document.getElementById(`audio-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            const btn = document.getElementById(`btn-${index}`);
            const card = document.getElementById(`card-${index}`);

            // === ЛОГИКА СБРОСА ПРЕДЫДУЩЕГО ТРЕКА ===
            if (currentAudio && currentAudio !== audio) {
                currentAudio.pause();
                currentAudio.currentTime = 0; // Сбрасываем время на 0
                
                // Находим элементы старого трека и скидываем ползунок
                const oldIndex = currentAudio.id.split('-')[1];
                const oldProgBar = document.getElementById(`prog-bar-${oldIndex}`);
                const oldTimeDisp = document.getElementById(`time-${oldIndex}`);
                
                if (oldProgBar) oldProgBar.style.width = '0%';
                if (oldTimeDisp) oldTimeDisp.textContent = `00:00 / ${formatTime(currentAudio.duration)}`;

                if (currentPlayBtn) {
                    currentPlayBtn.className = 'fa-solid fa-play';
                    document.getElementById(`btn-${oldIndex}`).classList.remove('active');
                }
                if (currentCard) { currentCard.classList.remove('playing'); }
            }

            if (audio.paused) {
                audio.play();
                icon.className = 'fa-solid fa-pause';
                btn.classList.add('active');
                card.classList.add('playing'); 
                currentAudio = audio;
                currentPlayBtn = icon;
                currentCard = card;
            } else {
                audio.pause();
                icon.className = 'fa-solid fa-play';
                btn.classList.remove('active');
                card.classList.remove('playing'); 
                currentAudio = null;
                currentPlayBtn = null;
                currentCard = null;
            }
        }

        function initPlayers() {
            tracks.forEach((_, index) => {
                const audio = document.getElementById(`audio-${index}`);
                const progBar = document.getElementById(`prog-bar-${index}`);
                const progCont = document.getElementById(`prog-cont-${index}`);
                const timeDisp = document.getElementById(`time-${index}`);
                const icon = document.getElementById(`icon-${index}`);
                const btn = document.getElementById(`btn-${index}`);
                const card = document.getElementById(`card-${index}`);

                let isDragging = false;

                audio.addEventListener('loadedmetadata', () => {
                    timeDisp.textContent = `00:00 / ${formatTime(audio.duration)}`;
                });

                audio.addEventListener('timeupdate', () => {
                    if (audio.duration && !isDragging) {
                        const progressPercent = (audio.currentTime / audio.duration) * 100;
                        progBar.style.width = `${progressPercent}%`;
                        timeDisp.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
                    }
                });

                audio.addEventListener('ended', () => {
                    icon.className = 'fa-solid fa-play';
                    btn.classList.remove('active');
                    card.classList.remove('playing');
                    progBar.style.width = '0%';
                    audio.currentTime = 0;
                    timeDisp.textContent = `00:00 / ${formatTime(audio.duration)}`;
                });

                function updateProgress(clientX) {
                    const rect = progCont.getBoundingClientRect();
                    let offsetX = clientX - rect.left;
                    if (offsetX < 0) offsetX = 0;
                    if (offsetX > rect.width) offsetX = rect.width;
                    const percentage = offsetX / rect.width;
                    progBar.style.width = (percentage * 100) + '%';
                    if (audio.duration) {
                        const targetTime = percentage * audio.duration;
                        timeDisp.textContent = `${formatTime(targetTime)} / ${formatTime(audio.duration)}`;
                        audio.currentTime = targetTime;
                    }
                }

                progCont.addEventListener('mousedown', (e) => { isDragging = true; updateProgress(e.clientX); });
                window.addEventListener('mousemove', (e) => { if (isDragging) updateProgress(e.clientX); });
                window.addEventListener('mouseup', () => { isDragging = false; });
                progCont.addEventListener('touchstart', (e) => { isDragging = true; updateProgress(e.touches[0].clientX); }, { passive: false });
                window.addEventListener('touchmove', (e) => { if (isDragging) { updateProgress(e.touches[0].clientX); e.preventDefault(); } }, { passive: false });
                window.addEventListener('touchend', () => { isDragging = false; });
            });
        }

        // ПОИСК ТРЕКОВ
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            let visibleCount = 0;
            const items = document.querySelectorAll('.catalog-item');
            
            items.forEach((item) => {
                const title = item.querySelector('.ci-title').textContent.toLowerCase();
                if (title.includes(query)) {
                    item.style.display = 'flex';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });
            trackCountEl.textContent = visibleCount;
        });

        // МОДАЛЬНЫЕ ОКНА
        const dlModal = document.getElementById('downloadModal');
        const plModal = document.getElementById('platformsModal');
        const modalTitle = document.getElementById('modalTitle');
        const linkMp3 = document.getElementById('linkMp3');
        const linkWav = document.getElementById('linkWav');

        function openDownloadModal(trackName, mp3Url, wavUrl) {
            modalTitle.textContent = trackName;
            linkMp3.href = mp3Url; linkMp3.setAttribute('download', `mp3_${trackName}.mp3`);
            linkWav.href = wavUrl; linkWav.setAttribute('download', `wav_${trackName}.wav`);
            dlModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function openPlatformsModal() {
            plModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = function(e) {
            if (e.target === dlModal) closeModal('downloadModal');
            if (e.target === plModal) closeModal('platformsModal');
        }
        
        linkMp3.addEventListener('click', () => closeModal('downloadModal'));
        linkWav.addEventListener('click', () => closeModal('downloadModal'));

        // Инициализация при загрузке
        renderTracks();

    </script>
</body>
</html>
