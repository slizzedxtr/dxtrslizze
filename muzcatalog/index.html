<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXTR | SlizZe - Музыкальный каталог</title>
    <meta name="description" content="Официальный каталог треков DXTR и SlizZe. Скачивай музыку в высоком качестве (MP3 и WAV).">
    <link rel="icon" type="image.png" href="../dslogo.png">
    <link rel="apple-touch-icon" href="../dslogo.png">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dxtrslizze.xyz/muzcatalog/">
    <meta property="og:title" content="DXTR | SlizZe - Скачать треки">
    <meta property="og:description" content="Скачивай оригинальные треки в MP3 и WAV.">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-purple: #7000ff;
            --neon-cyan: #00c6ff;
            --neon-green: #00ff66;
            --bg-dark: #050507;
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Анимированный фон (Сферы) */
        .bg-blobs {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #050507;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 20s infinite alternate ease-in-out;
        }
        .blob-1 { width: 400px; height: 400px; background: var(--neon-purple); top: -10%; left: -10%; }
        .blob-2 { width: 500px; height: 500px; background: var(--neon-pink); bottom: -20%; right: -10%; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: var(--neon-cyan); top: 40%; left: 50%; transform: translateX(-50%); opacity: 0.2; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .fade-in {
            animation: fadeIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        /* Шапка */
        header {
            text-align: center;
            padding: 8vh 20px 4vh;
            position: relative;
            z-index: 10;
        }

        header h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 4s linear infinite;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(112, 0, 255, 0.3);
        }

        @keyframes gradient-shift {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Главный контент - Список треков */
        main {
            flex: 1;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 60px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .track-item {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .track-item:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 10px 30px rgba(0, 198, 255, 0.15);
            transform: translateY(-5px);
        }

        .track-info-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        .track-cover {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .track-title {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .dl-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: transparent;
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid var(--neon-purple);
            font-size: 0.95rem;
        }

        .dl-btn:hover {
            background: var(--neon-purple);
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.6);
            transform: scale(1.05);
        }

        /* Модалка скачивания */
        .modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--glass-bg);
            border: 1px solid var(--neon-pink);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 50px rgba(255, 0, 127, 0.3);
            position: relative;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute; top: 15px; right: 25px;
            color: var(--text-muted); font-size: 2.5rem; cursor: pointer; transition: 0.3s; line-height: 1;
        }
        .close-btn:hover { color: var(--neon-pink); transform: rotate(90deg); }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .format-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .format-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            color: white;
            transition: 0.3s;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .format-btn.mp3:hover {
            background: rgba(0, 198, 255, 0.2);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 198, 255, 0.4);
        }

        .format-btn.wav:hover {
            background: rgba(255, 0, 127, 0.2);
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
        }

        /* Подвал */
        footer {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            border-top: 1px solid rgba(255,255,255,0.05);
            position: relative;
            z-index: 10;
        }

        .footer-buttons {
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
        }

        .action-btn {
            display: flex; align-items: center; gap: 10px;
            padding: 15px 35px; border-radius: 50px; text-decoration: none;
            font-weight: 800; color: white; transition: 0.3s;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .action-btn:hover { transform: scale(1.05) translateY(-3px); }
        .back-btn { background: rgba(0, 198, 255, 0.1); border-color: var(--neon-cyan); }
        .back-btn:hover { background: var(--neon-cyan); box-shadow: 0 0 20px rgba(0,198,255,0.5); color: #000; }

        @media (max-width: 600px) {
            .track-item { flex-direction: column; text-align: center; gap: 20px; padding: 25px; }
            .track-info-wrapper { flex-direction: column; }
            .dl-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="modal" id="downloadModal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeModal()">×</div>
            <div class="modal-title" id="modalTitle">Night City Lights</div>
            <div class="format-buttons">
                <a href="#" class="format-btn mp3" id="linkMp3" download>
                    <i class="fa-solid fa-file-audio"></i> Скачать MP3 (320 kbps)
                </a>
                <a href="#" class="format-btn wav" id="linkWav" download>
                    <i class="fa-solid fa-compact-disc"></i> Скачать WAV (Lossless)
                </a>
            </div>
        </div>
    </div>

    <header class="fade-in">
        <h1>MUZ CATALOG</h1>
        <p>Архив треков DXTR | SlizZe. Выбери релиз и скачай в нужном формате.</p>
    </header>

    <main>
        <div class="track-item fade-in" style="animation-delay: 0.1s;">
            <div class="track-info-wrapper">
                <img src="https://img.youtube.com/vi/M9TwVLCdEiM/maxresdefault.jpg" alt="Night City Lights" class="track-cover">
                <div class="track-title">Night City Lights</div>
            </div>
            <button class="dl-btn" onclick="openModal('Night City Lights', '../audio/night_city_lights.mp3', '../audio/night_city_lights.wav')">
                <i class="fa-solid fa-download"></i> Скачать
            </button>
        </div>

        <div class="track-item fade-in" style="animation-delay: 0.2s;">
            <div class="track-info-wrapper">
                <img src="https://img.youtube.com/vi/_bT2_wmJ6tc/maxresdefault.jpg" alt="Brawl Stars" class="track-cover">
                <div class="track-title">Brawl Stars</div>
            </div>
            <button class="dl-btn" onclick="openModal('Brawl Stars', '../audio/brawl_stars.mp3', '../audio/brawl_stars.wav')">
                <i class="fa-solid fa-download"></i> Скачать
            </button>
        </div>

        <div class="track-item fade-in" style="animation-delay: 0.3s;">
            <div class="track-info-wrapper">
                <img src="https://img.youtube.com/vi/TMn7k7XM4I0/maxresdefault.jpg" alt="Cefiro Reload" class="track-cover">
                <div class="track-title">Cefiro Reload</div>
            </div>
            <button class="dl-btn" onclick="openModal('Cefiro Reload', '../audio/cefiro_reload.mp3', '../audio/cefiro_reload.wav')">
                <i class="fa-solid fa-download"></i> Скачать
            </button>
        </div>

        <div class="track-item fade-in" style="animation-delay: 0.4s;">
            <div class="track-info-wrapper">
                <img src="https://img.youtube.com/vi/RyRbNoU2nPc/maxresdefault.jpg" alt="Friday" class="track-cover">
                <div class="track-title">Friday</div>
            </div>
            <button class="dl-btn" onclick="openModal('Friday', '../audio/friday.mp3', '../audio/friday.wav')">
                <i class="fa-solid fa-download"></i> Скачать
            </button>
        </div>

        <div class="track-item fade-in" style="animation-delay: 0.5s;">
            <div class="track-info-wrapper">
                <img src="https://img.youtube.com/vi/1YC9JlxU-zg/hqdefault.jpg" alt="F90" class="track-cover">
                <div class="track-title">F90</div>
            </div>
            <button class="dl-btn" onclick="openModal('F90', '../audio/f90.mp3', '../audio/f90.wav')">
                <i class="fa-solid fa-download"></i> Скачать
            </button>
        </div>

        <div class="track-item fade-in" style="animation-delay: 0.6s;">
            <div class="track-info-wrapper">
                <img src="https://img.youtube.com/vi/k7QO9_nLI5A/hqdefault.jpg" alt="Выход из Сна" class="track-cover">
                <div class="track-title">Выход из Сна</div>
            </div>
            <button class="dl-btn" onclick="openModal('Выход из Сна', '../audio/vyhod_iz_sna.mp3', '../audio/vyhod_iz_sna.wav')">
                <i class="fa-solid fa-download"></i> Скачать
            </button>
        </div>
    </main>

    <footer class="fade-in" style="animation-delay: 0.7s;">
        <div class="footer-buttons">
            <a href="../" class="action-btn back-btn">
                <i class="fa-solid fa-arrow-left"></i> На главную
            </a>
        </div>
    </footer>

    <script>
        const modal = document.getElementById('downloadModal');
        const modalTitle = document.getElementById('modalTitle');
        const linkMp3 = document.getElementById('linkMp3');
        const linkWav = document.getElementById('linkWav');

        // Открытие модального окна и подстановка ссылок
        function openModal(trackName, mp3Url, wavUrl) {
            modalTitle.textContent = trackName;
            
            linkMp3.href = mp3Url;
            linkMp3.setAttribute('download', `${trackName}.mp3`);
            
            linkWav.href = wavUrl;
            linkWav.setAttribute('download', `${trackName}.wav`);
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Убираем скролл фона
        }

        // Закрытие модального окна
        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto'; // Возвращаем скролл
        }

        // Закрытие при клике по темному фону вне контента
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Закрытие модального окна после клика по кнопке скачивания
        linkMp3.addEventListener('click', closeModal);
        linkWav.addEventListener('click', closeModal);
    </script>
</body>
</html>
