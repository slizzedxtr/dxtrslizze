<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXTR | SlizZe - MUZ TERMINAL v2.0</title>
    <meta name="description" content="Официальный каталог треков DXTR и SlizZe. Синхронизируйся с ритмом улиц Night City.">
    <link rel="icon" type="image.png" href="../dslogo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-pink: #ff007f; --neon-purple: #7000ff; --neon-cyan: #00c6ff;
            --neon-yellow: #ffcc00; --neon-green: #00ff66; --neon-red: #ff0033;
            --bg-dark: #030305; --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff; --text-muted: #80808f;
            --font-main: 'Montserrat', sans-serif; --font-tech: 'Orbitron', sans-serif;
            --player-height: 110px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none !important; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: var(--font-main); min-height: 100vh; overflow-x: hidden; position: relative; padding-bottom: calc(var(--player-height) + 30px); }

        /* АНИМИРОВАННЫЙ ФОН */
        .bg-blobs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; overflow: hidden; background: #000; }
        .blob { position: absolute; border-radius: 50%; filter: blur(150px); opacity: 0.2; animation: float 25s infinite alternate ease-in-out; }
        .blob-1 { width: 600px; height: 600px; background: var(--neon-purple); top: -10%; left: -10%; }
        .blob-2 { width: 700px; height: 700px; background: var(--neon-pink); bottom: -20%; right: -10%; animation-delay: -7s; }

        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px); mask-image: radial-gradient(circle at center, black 30%, transparent 100%); }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(60px, 40px) scale(1.05); } }
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(15px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        /* ВЕРХНЯЯ НАВИГАЦИЯ */
        .top-nav { display: flex; justify(content: center; gap: 30px; padding: 25px 20px; position: relative; z-index: 20; }
        .nav-link { color: var(--text-muted); text-decoration: none; font-weight: 800; font-size: 1rem; text-transform: uppercase; letter-spacing: 3px; font-family: var(--font-tech); transition: 0.3s; position: relative; }
        .nav-link::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--neon-cyan); transition: 0.3s; box-shadow: 0 0 10px var(--neon-cyan); }
        .nav-link:hover, .nav-link.active { color: #fff; text-shadow: 0 0 15px var(--neon-cyan); }
        .nav-link.active::after { width: 100%; }

        /* БУРГЕР И САЙДБАР */
        .burger-btn { position: fixed; top: 20px; left: 20px; z-index: 10001; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); width: 45px; height: 45px; border-radius: 8px; display: flex; justify(content: center; align-items: center; color: white; font-size: 1.2rem; cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px); }
        .burger-btn:hover { border-color: var(--neon-purple); color: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple); }
        
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100vh; background: rgba(2,2,4,0.98); backdrop-filter: blur(20px); border-right: 1px solid var(--neon-purple); z-index: 10000; display: flex; flex-direction: column; padding: 70px 25px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar.active { left: 0; box-shadow: 20px 0 60px rgba(112,0,255,0.2); }
        .sidebar-link { color: white; text-decoration: none; font-size: 1rem; font-weight: 600; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; gap: 12px; transition: 0.3s; text-transform: uppercase; font-family: var(--font-tech); letter-spacing: 1px; }
        .sidebar-link i { color: var(--neon-purple); font-size: 1.2rem; transition: 0.3s; }
        .sidebar-link:hover { color: var(--neon-purple); padding-left: 8px; }
        
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 9999; display: none; opacity: 0; transition: 0.3s; backdrop-filter: blur(3px); }
        .sidebar-overlay.active { display: block; opacity: 1; }

        /* СЧЕТЧИК ОНЛАЙНА */
        .online-counter { position: fixed; top: 20px; right: 20px; background: rgba(0, 0, 0, 0.7); border: 1px solid var(--glass-border); padding: 8px 15px; border-radius: 4px; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(5px); z-index: 20; font-family: var(--font-tech); }
        .pulse-dot { width: 8px; height: 8px; background-color: var(--neon-green); border-radius: 50%; box-shadow: 0 0 10px var(--neon-green); animation: pulseGreen 1.5s infinite; }
        @keyframes pulseGreen { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.6); } 70% { box-shadow: 0 0 0 6px rgba(0, 255, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); } }
        .online-num { color: var(--neon-green); font-weight: 700; font-size: 0.9rem; }

        /* ШАПКА */
        header { text-align: center; padding: 5vh 20px; position: relative; z-index: 10; margin-top: 30px; }
        header h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; text-transform: uppercase; letter-spacing: 10px; font-family: var(--font-tech); background: linear-gradient(180deg, #fff 30%, var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(0, 198, 255, 0.5)); margin-bottom: 5px; }
        header p { font-size: 1rem; color: var(--text-muted); max-width: 500px; margin: 0 auto; font-weight: 400; letter-spacing: 1px; }

        /* КОНТЕЙНЕР КАТАЛОГА */
        main { flex: 1; width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 20px 40px; z-index: 10; display: flex; flex-direction: column; gap: 15px; }

        /* ПОИСК */
        .controls-bar { display: flex; justify(content: space-between; align-items: center; margin-bottom: 5px; background: rgba(10,10,15,0.8); padding: 12px 20px; border-radius: 6px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); }
        .search-box { position: relative; flex: 1; max-width: 350px; display: flex; align-items: center; }
        .search-box i { position: absolute; left: 15px; color: var(--text-muted); font-size: 1rem; }
        .search-box input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); color: #fff; padding: 10px 15px 10px 40px; border-radius: 4px; font-family: var(--font-main); font-size: 0.9rem; transition: 0.3s; font-weight: 400;}
        .search-box input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 198, 255, 0.2); }
        .track-counter { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-family: var(--font-tech); }
        .track-counter .neon-text { color: var(--neon-yellow); font-size: 1.1rem; margin-left: 5px; text-shadow: 0 0 5px var(--neon-yellow); }

        /* КАРТОЧКА ТРЕКА */
        .catalog-item { background: rgba(10,10,15,0.5); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 15px 20px; display: flex; align-items: center; gap: 15px; transition: 0.3s ease; position: relative; overflow: hidden; cursor: pointer; }
        .catalog-item::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(112,0,255,0.03), transparent); transform: translateX(-100%); transition: 0.5s; }
        .catalog-item:hover::after { transform: translateX(100%); }
        .catalog-item:hover { border-color: rgba(112, 0, 255, 0.3); background: rgba(10,10,15,0.8); transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .catalog-item.playing { border-color: var(--neon-cyan); background: rgba(10,10,15,0.9); box-shadow: 0 0 25px rgba(0, 198, 255, 0.15), inset 0 0 10px rgba(0, 198, 255, 0.05); }

        .ci-left { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .ci-number { color: var(--text-muted); font-weight: 800; font-size: 1.1rem; width: 25px; text-align: center; font-family: var(--font-tech); opacity: 0.5; }
        .ci-cover-wrapper { position: relative; width: 70px; height: 70px; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .ci-cover-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .catalog-item:hover .ci-cover-wrapper img { transform: scale(1.1); filter: brightness(0.5); }

        .ci-play-btn { position: absolute; inset: 0; background: rgba(0,0,0,0.6); color: #fff; border: none; display: flex; justify(content: center; align-items: center; font-size: 1.2rem; cursor: pointer; opacity: 0; transition: 0.3s; backdrop-filter: blur(2px); pointer-events: none; z-index: 1; }
        .catalog-item:hover .ci-play-btn { opacity: 1; }
        .catalog-item.playing .ci-play-btn { opacity: 1; color: var(--neon-cyan); background: rgba(0,0,0,0.3); }

        .ci-center { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
        .ci-title { font-size: 1.1rem; font-weight: 800; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px; transition: 0.3s; }
        .ci-artist { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .catalog-item.playing .ci-title { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }

        .catalog-item .progress-container { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; position: relative; margin-top: 5px; cursor: pointer; }
        .catalog-item .progress-bar { height: 100%; background: var(--text-muted); border-radius: 2px; width: 0%; transition: width 0.1s linear; position: relative; }
        .catalog-item.playing .progress-bar { background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); box-shadow: 0 0 10px var(--neon-cyan); }

        .ci-right { flex-shrink: 0; display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .action-btn-sm { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: var(--text-muted); width: 36px; height: 36px; border-radius: 6px; display: flex; justify(content: center; align-items: center; font-size: 0.9rem; cursor: pointer; transition: 0.3s; text-decoration: none; z-index: 2;}
        .action-btn-sm:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .yt-btn:hover { border-color: var(--neon-red); color: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }
        .dl-btn:hover { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }

        /* КНОПКА СКРОЛЛА ВВЕРХ */
        .fixed-up-btn { position: fixed; bottom: 30px; left: 30px; width: 50px; height: 50px; background: rgba(0,0,0,0.8); color: var(--neon-cyan); border-radius: 50%; display: flex; justify(content: center; align-items: center; font-size: 1.2rem; z-index: 1000; box-shadow: 0 0 15px rgba(0, 198, 255, 0.3); border: 1px solid var(--neon-cyan); transition: 0.3s; cursor: pointer; opacity: 0; pointer-events: none; transform: translateY(10px); }
        .fixed-up-btn.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .fixed-up-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 25px var(--neon-cyan); transform: scale(1.1); }

        /* ========================================= */
        /* --- ТОТАЛЬНЫЙ РЕДИЗАЙН ПЛЕЕРА v2.0 --- */
        /* ========================================= */
        
        .global-player {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%) translateY(150%);
            width: 90%; max-width: 900px; height: var(--player-height);
            background: rgba(5, 5, 8, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid; border-image: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan)) 1;
            z-index: 9000; display: flex; align-items: center; padding: 0 25px; gap: 20px;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(112,0,255,0.15);
            overflow: hidden;
        }
        .global-player::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg, rgba(255,255,255,0.01), rgba(255,255,255,0.01) 1px, transparent 1px, transparent 3px); pointer-events: none; }
        .global-player.active { transform: translateX(-50%) translateY(0); }
        
        /* Обложка с орбитой */
        .gp-cover-art { position: relative; width: 80px; height: 80px; flex-shrink: 0; display: flex; justify(content: center; align-items: center; }
        .gp-cover-art img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); z-index: 2; position: relative; }
        .gp-orbit { position: absolute; inset: 0; border: 1px solid rgba(0, 198, 255, 0.2); border-radius: 50%; animation: spin 8s linear infinite; pointer-events: none; }
        .gp-orbit::after { content: ''; position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; background: var(--neon-cyan); border-radius: 50%; box-shadow: 0 0 10px var(--neon-cyan); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Инфо и Анализатор */
        .gp-info-block { display: flex; flex-direction: column; width: 180px; gap: 5px; flex-shrink: 0; position: relative;}
        .gp-title { font-family: var(--font-tech); font-weight: 700; color: #fff; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .gp-artist { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Живой Эквалайзер в плеере */
        .gp-analyzer { display: flex; align-items: flex-end; gap: 2px; height: 25px; width: 100%; margin-top: 5px; opacity: 0.6; }
        .gp-anal-bar { flex: 1; background: var(--neon-purple); height: 2px; transition: height 0.05s ease, background 0.2s; border-radius: 1px; }

        /* Центральный Кристалл Управления */
        .gp-controls-core { display: flex; align-items: center; gap: 15px; position: relative; background: rgba(255,255,255,0.03); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--glass-border); box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .gp-btn { background: none; border: none; color: var(--text-muted); font-size: 1.1rem; cursor: pointer; transition: 0.3s; position: relative; z-index: 2;}
        .gp-btn:hover { color: #fff; transform: scale(1.1); text-shadow: 0 0 10px #fff; }
        
        #gpPlay { width: 55px; height: 55px; background: rgba(112,0,255,0.1); border: 2px solid var(--neon-purple); border-radius: 50%; color: var(--neon-purple); font-size: 1.2rem; box-shadow: 0 0 15px rgba(112,0,255,0.3), inset 0 0 10px rgba(112,0,255,0.2); }
        #gpPlay:hover { background: var(--neon-purple); color: #fff; box-shadow: 0 0 25px var(--neon-purple); }
        #gpPlay.playing { border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 198, 255, 0.3); }
        #gpPlay.playing:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 25px var(--neon-cyan); }

        /* Прогресс v2.0 */
        .gp-timeline-block { flex: 1; display: flex; align-items: center; gap: 15px; position: relative; }
        .gp-progress-wrap { flex: 1; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; position: relative; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); overflow: visible;}
        .gp-bar-bg { position: absolute; inset: 0; background: repeating-linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.03) 1px, transparent 2px, transparent 4px); border-radius: 5px;}
        .gp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); border-radius: 5px; width: 0%; position: relative; box-shadow: 0 0 15px var(--neon-cyan); will-change: width; }
        
        /* Ползунок (Thumb) v2.0 */
        .gp-vol-thumb, .gp-prog-thumb {
            position: absolute; top: 50%; right: -8px; transform: translateY(-50%);
            width: 16px; height: 16px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px var(--neon-cyan);
            opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 10;
        }
        .gp-progress-wrap:hover .gp-prog-thumb, .vol-slider-root:hover .gp-vol-thumb, .dragging .gp-prog-thumb, .dragging .gp-vol-thumb { opacity: 1; pointer-events: auto; }
        .gp-progress-wrap:active .gp-prog-thumb, .vol-slider-root:active .gp-vol-thumb { transform: translateY(-50%) scale(1.2); }

        .gp-time-stamp { font-family: var(--font-tech); font-size: 0.75rem; color: var(--neon-cyan); font-weight: 500; min-width: 40px; text-align: center; text-shadow: 0 0 5px var(--neon-cyan); }
        .gp-time-stamp.total { color: var(--text-muted); text-shadow: none; }

        /* Правый блок: Громкость и Свернуть */
        .gp-right-tech { display: flex; align-items: center; gap: 15px; flex-shrink: 0; margin-left: auto; }
        
        /* Улучшенная Громкость */
        .vol-control-root { display: flex; align-items: center; gap: 10px; position: relative; padding: 5px; border-radius: 30px; transition: 0.3s; }
        .vol-control-root:hover { background: rgba(255,255,255,0.03); }
        .vol-btn-node { background: none; border: none; color: var(--text-muted); font-size: 1rem; cursor: pointer; transition: 0.3s; width: 25px; text-align: center; }
        .vol-btn-node:hover { color: var(--neon-cyan); }
        .vol-btn-node.muted { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); }
        
        .vol-slider-root { width: 0; overflow: hidden; opacity: 0; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); height: 6px; background: rgba(0,0,0,0.5); border-radius: 3px; position: relative; cursor: pointer; }
        .vol-control-root:hover .vol-slider-root, .vol-slider-root.force-show { width: 100px; opacity: 1; margin-right: 5px; }
        .vol-slider-fill { height: 100%; background: var(--neon-cyan); border-radius: 3px; width: 100%; position: relative; box-shadow: 0 0 10px var(--neon-cyan); will-change: width; }
        
        .gp-minimize-tech { background: none; border: 1px solid var(--glass-border); color: var(--text-muted); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; transition: 0.3s; display: flex; justify(content: center; align-items: center; font-size: 0.9rem; }
        .gp-minimize-tech:hover { border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 15px rgba(255,0,127,0.4); transform: rotate(180deg); }

        /* ========================================= */
        /* --- РЕДИЗАЙН СВЕРНУТОГО ПЛЕЕРА (ORB v2.0) --- */
        /* ========================================= */
        
        .mini-player-reactor {
            position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px;
            z-index: 10005; cursor: pointer; display: none; justify(content: center; align-items: center;
            user-select: none; touch-action: none; filter: drop-shadow(0 0 15px rgba(0, 198, 255, 0.5));
        }
        .reactor-core { position: absolute; width: 20px; height: 20px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px #fff, 0 0 40px var(--neon-cyan); animation: reactorPulse 1.5s infinite; }
        .reactor-ring { position: absolute; border-radius: 50%; border-style: solid; border-color: transparent; mix-blend-mode: screen; }
        
        .ring-1 { inset: 0; border-width: 3px; border-top-color: var(--neon-cyan); border-bottom-color: var(--neon-cyan); animation: reactorSpin 3s linear infinite; }
        .ring-2 { inset: 10px; border-width: 2px; border-left-color: var(--neon-purple); border-right-color: var(--neon-purple); animation: reactorSpinReverse 2s linear infinite; opacity: 0.7; }
        .ring-3 { inset: 20px; border-width: 1px; border-top-color: var(--neon-pink); animation: reactorSpin 4s linear infinite; opacity: 0.5; }
        
        .mini-player-reactor:hover .reactor-ring { animation-duration: 0.5s !important; }

        @keyframes reactorSpin { 100% { transform: rotate(360deg); } }
        @keyframes reactorSpinReverse { 100% { transform: rotate(-360deg); } }
        @keyframes reactorPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }

        /* ОВЕРЛЕЙ ГРОМКОСТИ (HOTKEYS) */
        .vol-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: rgba(0,0,0,0.9); border: 2px solid var(--neon-cyan); padding: 30px; border-radius: 15px; z-index: 10000; display: flex; flex-direction: column; align-items: center; gap: 15px; opacity: 0; pointer-events: none; transition: 0.3s; box-shadow: 0 0 50px rgba(0,198,255,0.4); font-family: var(--font-tech); }
        .vol-overlay.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .vol-over-icon { font-size: 3rem; color: var(--neon-cyan); text-shadow: 0 0 20px var(--neon-cyan); }
        .vol-over-text { font-size: 2rem; font-weight: 700; color: #fff; }
        .vol-over-bar { width: 200px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; position: relative; }

    <script>
        // === БАЗА ТРЕКОВ ===
        const tracks = [
            { title: "Music", cover: "../logo_Music.png", mp3: "../mp3_Music.mp3", wav: "../wav_Music.wav", yt: "https://www.youtube.com/watch?v=NZdm_FnmTQ8" },

            { title: "Night City Lights", cover: "../logo_Night_City_Lights.png", mp3: "../mp3_Night_City_Lights.mp3", wav: "../wav_Night_City_Lights.wav", yt: "https://www.youtube.com/watch?v=M9TwVLCdEiM" },
            { title: "Mafia", cover: "../logo_Mafia.png", mp3: "../mp3_Mafia.mp3", wav: "../wav_Mafia.wav", yt: "https://www.youtube.com/watch?v=SCCUhxNEi8w" },
            { title: "Brawl Stars", cover: "../logo_Brawl_Stars.jpeg", mp3: "../mp3_Brawl_Stars.mp3", wav: "../wav_Brawl_Stars.wav", yt: "https://www.youtube.com/watch?v=_bT2_wmJ6tc" },
            { title: "Night Club", cover: "../logo_Night_Club.jpeg", mp3: "../mp3_Night_Club.mp3", wav: "../wav_Night_Club.wav", yt: "https://www.youtube.com/watch?v=zaDFqj5H7R4" },
            { title: "Minecraft", cover: "../logo_Minecraft.jpeg", mp3: "../mp3_Minecraft.mp3", wav: "../wav_Minecraft.wav", yt: "https://www.youtube.com/watch?v=NX0QOM2-OKE" },
            { title: "Friday", cover: "../logo_Friday.jpeg", mp3: "../mp3_Friday.mp3", wav: "../wav_Friday.wav", yt: "https://www.youtube.com/watch?v=RyRbNoU2nPc" },
            { title: "F90", cover: "../logo_F90.jpeg", mp3: "../mp3_F90.mp3", wav: "../wav_F90.wav", yt: "https://www.youtube.com/watch?v=1YC9JlxU-zg" },
            { title: "Dying Light", cover: "../logo_Dying_Light.jpeg", mp3: "../mp3_Dying_Light.mp3", wav: "../wav_Dying_Light.wav", yt: "https://www.youtube.com/watch?v=gyPCJrQGeKg" },
            { title: "Cefiro Reload", cover: "../logo_Cefiro_Reload.jpeg", mp3: "../mp3_Cefiro_Reload.mp3", wav: "../wav_Cefiro_Reload.wav", yt: "https://www.youtube.com/watch?v=TMn7k7XM4I0" },
            { title: "Casino", cover: "../logo_Casino.jpeg", mp3: "../mp3_Casino.mp3", wav: "../wav_Casino.wav", yt: "https://www.youtube.com/watch?v=qj1nzYAte0Y" },
            { title: "New Year", cover: "../logo_New_Year.jpeg", mp3: "../mp3_New_Year.mp3", wav: "../wav_New_Year.wav", yt: "https://www.youtube.com/watch?v=ylW3c41lAUA" },
            { title: "Выход из Сна", cover: "../logo_VIS.jpeg", mp3: "../mp3_VIS.mp3", wav: "../wav_VIS.wav", yt: "https://www.youtube.com/watch?v=k7QO9_nLI5A" },
            { title: "Carnaval", cover: "../logo_Carnaval.jpeg", mp3: "../mp3_Carnaval.mp3", wav: "../wav_Carnaval.wav", yt: "https://www.youtube.com/watch?v=XE-bKULqNVQ" },
            { title: "Life Simulator", cover: "../logo_Life_Simulator.jpeg", mp3: "../mp3_Life_Simulator.mp3", wav: "../wav_Life_Simulator.wav", yt: "https://www.youtube.com/watch?v=ksahwYBQgrs" },
            { title: "Amazing Online", cover: "../logo_Amazing_Online.jpeg", mp3: "../mp3_Amazing_Online.mp3", wav: "../wav_Amazing_Online.wav", yt: "https://www.youtube.com/watch?v=qFm89V9JjFU" }
        ];

        // === ИНИЦИАЛИЗАЦИЯ И ОБЩАЯ ЛОГИКА ===
        const globalAudio = document.getElementById('globalAudio');
        let currentTrackIndex = -1;
        let isMinimized = false;
        let hasPlayed = false;
        const isMobile = window.innerWidth <= 768;

        function formatTime(sec) {
            if (!sec || isNaN(sec)) return "00:00";
            let m = Math.floor(sec / 60), s = Math.floor(sec % 60);
            return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // Рендер списка треков
        const trackListContainer = document.getElementById('track-list');
        tracks.forEach((track, index) => {
            const num = index + 1 < 10 ? `0${index + 1}` : index + 1;
            const pltBtn = (track.title === "Night City Lights") ? `<button class="action-btn-sm plt-btn" onclick="event.stopPropagation(); openPlatformsModal()"><i class="fa-solid fa-compact-disc"></i></button>` : '';
            const trackHTML = `
                <div class="catalog-item fade-in" id="card-${index}" style="animation-delay: ${index * 0.03}s" onclick="playTrack(${index})">
                    <div class="ci-left">
                        <div class="ci-number">${num}</div>
                        <div class="ci-cover-wrapper">
                            <img src="${track.cover}" alt="${track.title}" onerror="this.src='../dslogo.png'">
                            <div class="ci-play-btn"><i class="fa-solid fa-play" id="cardIcon-${index}"></i></div>
                        </div>
                    </div>
                    <div class="ci-center">
                        <div class="ci-title">${track.title}</div>
                        <div class="ci-artist">DXTR | SlizZe</div>
                        <div class="progress-container" onclick="event.stopPropagation(); seek(event, this, ${index})">
                            <div class="progress-bar" id="cardBar-${index}"></div>
                        </div>
                    </div>
                    <div class="ci-right">
                        <a href="${track.yt}" target="_blank" class="action-btn-sm yt-btn" onclick="event.stopPropagation();"><i class="fa-brands fa-youtube"></i></a>
                        ${pltBtn}
                        <button class="action-btn-sm dl-btn" onclick="event.stopPropagation(); openDownloadModal('${track.title}', '${track.mp3}', '${track.wav}')"><i class="fa-solid fa-download"></i></button>
                    </div>
                </div>
            `;
            trackListContainer.insertAdjacentHTML('beforeend', trackHTML);
        });
        document.getElementById('trackCount').textContent = tracks.length;

        // === УПРАВЛЕНИЕ ВОСПРОИЗВЕДЕНИЕМ v2.0 ===
        const gp = document.getElementById('globalPlayer'), gpPlayIcon = document.getElementById('gpPlayIcon'), gpPlayBtn = document.getElementById('gpPlay');

        function playTrack(index) {
            hasPlayed = true;
            if (currentTrackIndex === index) {
                globalAudio.paused ? globalAudio.play() : globalAudio.pause();
            } else {
                if (currentTrackIndex !== -1) resetCardUI(currentTrackIndex);
                currentTrackIndex = index;
                globalAudio.src = tracks[index].mp3;
                document.getElementById('gpTitle').textContent = tracks[index].title;
                document.getElementById('gpCover').src = tracks[index].cover;
                globalAudio.play();
                if (!isMinimized) gp.classList.add('active');
                initVisualizer(); // Запуск эквалайзера
            }
            updateUI();
        }

        function resetCardUI(index) {
            const bar = document.getElementById(`cardBar-${index}`), icon = document.getElementById(`cardIcon-${index}`), card = document.getElementById(`card-${index}`);
            if(bar) bar.style.width = '0%';
            if(icon) icon.className = 'fa-solid fa-play';
            if(card) card.classList.remove('playing');
        }

        function updateUI() {
            const isPlaying = !globalAudio.paused;
            // Обновление кнопок в Global Player
            gpPlayIcon.className = isPlaying ? 'fa-solid fa-pause' : 'fa-solid fa-play';
            gpPlayBtn.classList.toggle('playing', isPlaying);
            
            // Обновление карточки
            tracks.forEach((_, i) => resetCardUI(i)); // Сброс всех
            if (currentTrackIndex !== -1) {
                const card = document.getElementById(`card-${currentTrackIndex}`);
                if(card) {
                    card.classList.add('playing');
                    document.getElementById(`cardIcon-${currentTrackIndex}`).className = isPlaying ? 'fa-solid fa-pause' : 'fa-solid fa-play';
                }
            }
        }

        gpPlayBtn.onclick = () => { if(currentTrackIndex !== -1) playTrack(currentTrackIndex); }
        document.getElementById('gpNext').onclick = () => { if(currentTrackIndex !== -1) playTrack((currentTrackIndex + 1) % tracks.length); }
        document.getElementById('gpPrev').onclick = () => { if(currentTrackIndex !== -1) playTrack((currentTrackIndex - 1 + tracks.length) % tracks.length); }
        globalAudio.addEventListener('play', updateUI);
        globalAudio.addEventListener('pause', updateUI);
        globalAudio.addEventListener('ended', () => document.getElementById('gpNext').click());

        // === ИСПРАВЛЕННЫЙ ТАЙМЛАЙН v2.0 (МОБИЛЬНЫЙ + ПК) ===
        const gpBarFill = document.getElementById('gpProgBar'), gpTime = document.getElementById('gpTime'), gpDuration = document.getElementById('gpDuration'), gpProgCont = document.getElementById('gpProgCont');
        
        let isDragging = false;

        globalAudio.addEventListener('loadedmetadata', () => gpDuration.textContent = formatTime(globalAudio.duration));
        
        globalAudio.addEventListener('timeupdate', () => {
            if (globalAudio.duration && !isDragging) {
                const p = (globalAudio.currentTime / globalAudio.duration) * 100;
                updateProgressBarUI(p);
            }
        });

        function updateProgressBarUI(p) {
            if(isMobile) {
                gpBarFill.style.height = `${p}%`; gpBarFill.style.width = '100%';
            } else {
                gpBarFill.style.width = `${p}%`; gpBarFill.style.height = '100%';
            }
            gpTime.textContent = formatTime(globalAudio.currentTime);
            const cardBar = document.getElementById(`cardBar-${currentTrackIndex}`);
            if(cardBar) cardBar.style.width = `${p}%`;
        }

        // Общая функция расчета скраббинга
        function handleScrub(e, container) {
            const rect = container.getBoundingClientRect();
            let p;
            if (isMobile && container === gpProgCont) {
                // Вертикальный скраббинг на мобильном для Global Player
                let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                let offsetY = rect.bottom - clientY;
                p = offsetY / rect.height;
            } else {
                // Горизонтальный скраббинг (ПК или Карточки)
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let offsetX = clientX - rect.left;
                p = offsetX / rect.width;
            }
            p = Math.max(0, Math.min(1, p));
            if(!isDragging) globalAudio.currentTime = p * globalAudio.duration;
            return p;
        }

        // Слушатели для Global Player Timeline
        function onDragStart(e) { isDragging = true; gp.classList.add('dragging'); handleScrub(e, gpProgCont); e.preventDefault(); }
        function onDragMove(e) { if (!isDragging) return; const p = handleScrub(e, gpProgCont); updateProgressBarUI(p * 100); e.preventDefault(); }
        function onDragEnd(e) { if (!isDragging) return; isDragging = false; gp.classList.remove('dragging'); const rect = gpProgCont.getBoundingClientRect(); let p;
            if(isMobile) { let cY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY; p = (rect.bottom - cY) / rect.height; }
            else { let cX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX; p = (cX - rect.left) / rect.width; }
            p = Math.max(0, Math.min(1, p)); globalAudio.currentTime = p * globalAudio.duration; e.preventDefault();
        }

        gpProgCont.addEventListener('mousedown', onDragStart);
        gpProgCont.addEventListener('touchstart', onDragStart, {passive: false});
        window.addEventListener('mousemove', onDragMove);
        window.addEventListener('touchmove', onDragMove, {passive: false});
        window.addEventListener('mouseup', onDragEnd);
        window.addEventListener('touchend', onDragEnd);

        // Клик по таймлайну в карточке (только горизонтальный)
        function seek(e, container, index) { if(currentTrackIndex !== index) return; handleScrub(e, container); }

        // === ЖИВОЙ ЭКВАЛАЙЗЕР v2.0 (Web Audio API) ===
        let audioCtx, analyser, dataArray, source;
        const analBars = document.querySelectorAll('.gp-anal-bar');

        function initVisualizer() {
            if (audioCtx) return; // Уже инициализирован
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(globalAudio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 32; // Малое кол-во баров
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                animateVisualizer();
            } catch (e) { console.log("Visualizer init failed", e); }
        }

        function animateVisualizer() {
            if(!analyser || globalAudio.paused) {
                analBars.forEach(bar => bar.style.height = '2px');
                if(!globalAudio.paused) requestAnimationFrame(animateVisualizer);
                return;
            }
            requestAnimationFrame(animateVisualizer);
            analyser.getByteFrequencyData(dataArray);
            analBars.forEach((bar, i) => {
                let h = (dataArray[i] / 255) * 25; // Max height 25px
                bar.style.height = `${Math.max(2, h)}px`;
                bar.style.background = `linear-gradient(to top, var(--neon-purple), hsl(${180 + h*4}, 100%, 50%))`;
            });
        }
        globalAudio.addEventListener('play', () => { if(audioCtx) { audioCtx.resume(); animateVisualizer(); } });

        // === ГРОМКОСТЬ И ГОРЯЧИЕ КЛАВИШИ v2.0 ===
        const volSliderRoot = document.getElementById('volSliderRoot'), volSliderFill = document.getElementById('volSliderFill'), volIcon = document.getElementById('volIcon'), volNode = document.getElementById('gpMute');
        const volOverlay = document.getElementById('volOverlay'), volOverPercent = document.getElementById('volOverPercent'), volOverFill = document.getElementById('volOverFill'), volOverIcon = document.getElementById('volOverIcon');
        
        let currentVolume = 1, lastVolume = 1, volOverTimeout, isDraggingVol = false;

        function updateVolumeUI(v, showOverlay = false) {
            const p = v * 100;
            volSliderFill.style.width = `${p}%`;
            // Иконка
            if(v === 0) { volIcon.className = 'fa-solid fa-volume-xmark muted'; volNode.classList.add('muted');}
            else if(v < 0.5) { volIcon.className = 'fa-solid fa-volume-low'; volNode.classList.remove('muted');}
            else { volIcon.className = 'fa-solid fa-volume-high'; volNode.classList.remove('muted');}

            if (showOverlay) {
                volOverPercent.textContent = `${Math.round(p)}%`;
                volOverFill.style.width = `${p}%`;
                volOverIcon.className = volIcon.className + ' vol-over-icon';
                volOverlay.classList.add('show');
                volSliderRoot.classList.add('force-show');
                clearTimeout(volOverTimeout);
                volOverTimeout = setTimeout(() => { volOverlay.classList.remove('show'); volSliderRoot.classList.remove('force-show'); }, 1500);
            }
        }

        function setVolume(v, showOver = false) {
            currentVolume = Math.max(0, Math.min(1, v));
            globalAudio.volume = currentVolume;
            if(currentVolume > 0) lastVolume = currentVolume;
            updateVolumeUI(currentVolume, showOver);
        }

        // Drag громкости на ПК
        function handleVolScrub(e) {
            const rect = volSliderRoot.getBoundingClientRect();
            let x = (e.clientX || e.touches[0].clientX) - rect.left;
            setVolume(x / rect.width);
        }
        volSliderRoot.addEventListener('mousedown', (e) => { isDraggingVol = true; handleVolScrub(e); });
        window.addEventListener('mousemove', (e) => { if(isDraggingVol) handleVolScrub(e); });
        window.addEventListener('mouseup', () => isDraggingVol = false);

        // Mute
        volNode.onclick = () => { currentVolume > 0 ? setVolume(0) : setVolume(lastVolume); }

        // Горячие клавиши
        document.addEventListener('keydown', (e) => {
            if (!hasPlayed || document.activeElement.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); gpPlayBtn.click(); }
            if (e.code === 'ArrowRight') { e.preventDefault(); document.getElementById('gpNext').click(); }
            if (e.code === 'ArrowLeft') { e.preventDefault(); document.getElementById('gpPrev').click(); }
            if (e.code === 'ArrowUp') { e.preventDefault(); setVolume(currentVolume + 0.1, true); }
            if (e.code === 'ArrowDown') { e.preventDefault(); setVolume(currentVolume - 0.1, true); }
        });

        // === СВОРАЧИВАНИЕ И ORB (REACTOR) v2.0 ===
        const miniOrb = document.getElementById('miniOrb');
        
        document.getElementById('gpMinimize').onclick = minimizePlayer;
        miniOrb.onclick = maximizePlayer;

        function minimizePlayer() {
            isMinimized = true; gp.classList.remove('active');
            setTimeout(() => { miniOrb.style.display = 'flex'; }, 400);
        }
        function maximizePlayer() {
            if(isDraggingOrb) return; // Не разворачивать если тащили
            isMinimized = false; miniOrb.style.display = 'none'; gp.classList.add('active');
        }

        // Drag-n-Drop для Orb (совместимо с мобильными)
        let isDraggingOrb = false, orbMoved = false, orbTouchX, orbTouchY, orbStartX, orbStartY;

        function orbDragStart(e) {
            isDraggingOrb = true; orbMoved = false;
            let c = e.touches ? e.touches[0] : e;
            orbTouchX = c.clientX; orbTouchY = c.clientY;
            orbStartX = miniOrb.offsetLeft; orbStartY = miniOrb.offsetTop;
            miniOrb.style.transition = 'none'; // Убираем анимации при перетаскивании
        }
        function orbDragMove(e) {
            if (!isDraggingOrb) return;
            let c = e.touches ? e.touches[0] : e;
            let dx = c.clientX - orbTouchX, dy = c.clientY - orbTouchY;
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) orbMoved = true;
            
            let x = orbStartX + dx, y = orbStartY + dy;
            // Ограничения экрана
            x = Math.max(10, Math.min(x, window.innerWidth - 80));
            y = Math.max(10, Math.min(y, window.innerHeight - 80));
            
            miniOrb.style.left = `${x}px`; miniOrb.style.top = `${y}px`;
            miniOrb.style.right = 'auto'; miniOrb.style.bottom = 'auto';
            if(e.cancelable) e.preventDefault();
        }
        function orbDragEnd() {
            if (!isDraggingOrb) return;
            isDraggingOrb = false;
            miniOrb.style.transition = ''; // Возвращаем CSS переходы
            // Если orbMoved остается false, сработает штатный onclick (maximize)
            if(orbMoved) {
                // Запрещаем клик после перетаскивания
                isDraggingOrb = true; setTimeout(()=>isDraggingOrb=false, 100);
            }
        }

        miniOrb.addEventListener('mousedown', orbDragStart);
        miniOrb.addEventListener('touchstart', orbDragStart, {passive: false});
        window.addEventListener('mousemove', orbDragMove);
        window.addEventListener('touchmove', orbDragMove, {passive: false});
        window.addEventListener('mouseup', orbDragEnd);
        window.addEventListener('touchend', orbDragEnd);


        // === ОСТАЛЬНОЙ UI (СКРОЛЛ, БУРГЕР, ПОИСК) ===
        const btnUp = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', () => window.scrollY > 300 ? btnUp.classList.add('visible') : btnUp.classList.remove('visible'));
        btnUp.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

        const bBtn = document.getElementById('burgerBtn'), sBar = document.getElementById('sidebar'), sOver = document.getElementById('sidebarOverlay'), cSBar = document.getElementById('closeSidebar');
        function toggleSBar() { sBar.classList.toggle('active'); sOver.classList.toggle('active'); }
        bBtn.onclick = toggleSBar; cSBar.onclick = toggleSBar; sOver.onclick = toggleSBar;

        searchInput.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase(); let count = 0;
            document.querySelectorAll('.catalog-item').forEach(item => {
                if(item.querySelector('.ci-title').textContent.toLowerCase().includes(q)) { item.style.display = 'flex'; count++; }
                else item.style.display = 'none';
            });
            document.getElementById('trackCount').textContent = count;
        });

        // Модалки
        const dM = document.getElementById('downloadModal'), pM = document.getElementById('platformsModal');
        function openDownloadModal(t, mp3, wav) { document.getElementById('modalTitle').textContent = t; document.getElementById('linkMp3').href = mp3; document.getElementById('linkWav').href = wav; dM.style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function openPlatformsModal() { pM.style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeModal(m) { document.getElementById(m).style.display = 'none'; document.body.style.overflow = 'auto'; }
        window.onclick = e => { if(e.target === dM) closeModal('downloadModal'); if(e.target === pM) closeModal('platformsModal'); }

        // Socket.io (Онлайн)
        const s = io("https://dxtrslizze.onrender.com/");
        s.on('online_update', c => document.getElementById('onlineCount').textContent = c);
    </script>
</body>
</html>
