<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXTR | SlizZe - Музыкальный каталог</title>
    <meta name="description" content="Официальный каталог треков DXTR и SlizZe. Слушай и скачивай музыку в высоком качестве (MP3 и WAV).">
    <link rel="icon" type="image.png" href="../dslogo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-purple: #7000ff;
            --neon-cyan: #00c6ff;
            --neon-yellow: #ffcc00;
            --bg-dark: #050507;
            --glass-bg: rgba(20, 20, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* Анимированный фон */
        .bg-blobs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: #050507; }
        .blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.4; animation: float 20s infinite alternate ease-in-out; }
        .blob-1 { width: 400px; height: 400px; background: var(--neon-purple); top: -10%; left: -10%; }
        .blob-2 { width: 500px; height: 500px; background: var(--neon-pink); bottom: -20%; right: -10%; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: var(--neon-cyan); top: 40%; left: 50%; transform: translateX(-50%); opacity: 0.2; animation-delay: -10s; }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }
        .fade-in { animation: fadeIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        /* ВЕРХНЯЯ НАВИГАЦИЯ */
        .top-nav { display: flex; justify-content: center; gap: 40px; padding: 25px 20px 0; position: relative; z-index: 20; }
        .nav-link { color: var(--text-muted); text-decoration: none; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; padding-bottom: 5px; border-bottom: 2px solid transparent; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #fff; border-bottom: 2px solid var(--neon-cyan); text-shadow: 0 0 15px rgba(0, 198, 255, 0.6); }

        /* Шапка */
        header { text-align: center; padding: 6vh 20px 4vh; position: relative; z-index: 10; }
        header h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; text-transform: uppercase; letter-spacing: 5px; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink)); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradient-shift 4s linear infinite; margin-bottom: 10px; }
        @keyframes gradient-shift { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        header p { font-size: 1.1rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; font-weight: 500; }

        /* КОНТЕЙНЕР КАТАЛОГА */
        main { flex: 1; width: 100%; max-width: 1000px; margin: 0 auto; padding: 0 20px 60px; z-index: 10; display: flex; flex-direction: column; gap: 20px; }

        /* КАРТОЧКА ТРЕКА */
        .catalog-item {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px 25px;
            display: flex; align-items: center; gap: 25px; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
        }
        .catalog-item:hover { border-color: rgba(0, 198, 255, 0.4); box-shadow: 0 10px 40px rgba(0, 198, 255, 0.15); transform: translateY(-3px); }

        /* Левая часть: Номер + Обложка */
        .ci-left { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
        .ci-number { color: var(--neon-yellow); font-weight: 900; font-size: 1.2rem; width: 30px; text-align: center; opacity: 0.8; }
        
        .ci-cover-wrapper { position: relative; width: 75px; height: 75px; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .ci-cover-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .catalog-item:hover .ci-cover-wrapper img { transform: scale(1.1); filter: brightness(0.6); }

        /* Желтая кнопка Play поверх обложки */
        .ci-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--neon-yellow); color: #000; border: none;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.1rem; cursor: pointer; opacity: 0; transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
        }
        .catalog-item:hover .ci-play-btn { opacity: 1; }
        .ci-play-btn:hover { background: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.8); transform: translate(-50%, -50%) scale(1.1); }
        .ci-play-btn.active { opacity: 1; background: var(--neon-pink); color: white; box-shadow: 0 0 15px var(--neon-pink); }

        /* Центр: Название + Плеер */
        .ci-center { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
        .ci-header { display: flex; flex-direction: column; }
        .ci-title { font-size: 1.25rem; font-weight: 800; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ci-artist { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }

        /* Визуальный Плеер */
        .ci-player-controls { display: flex; align-items: center; gap: 15px; width: 100%; margin-top: 5px; }
        
        .progress-container {
            flex: 1; height: 6px; background: rgba(255,255,255,0.05); /* Очень тонкая невидимая полоса */
            border-radius: 10px; cursor: pointer; position: relative;
        }
        .progress-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            border-radius: 10px; position: relative; pointer-events: none;
        }
        /* Круглая движущаяся точка */
        .progress-bar::after {
            content: ''; position: absolute; right: -7px; top: -5px; width: 16px; height: 16px;
            background: #fff; border-radius: 50%; box-shadow: 0 0 12px rgba(0, 198, 255, 0.9);
            transition: transform 0.1s;
        }
        .progress-container:active .progress-bar::after { transform: scale(1.3); }

        .time-display { font-size: 0.85rem; color: var(--text-muted); font-variant-numeric: tabular-nums; font-weight: 600; min-width: 85px; text-align: right; }

        /* Правая часть: Скачать */
        .ci-right { flex-shrink: 0; }
        .dl-btn {
            background: transparent; color: white; border: 1px solid var(--glass-border);
            padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .dl-btn:hover { border-color: var(--neon-pink); box-shadow: 0 0 20px rgba(255,0,127,0.3); background: rgba(255,0,127,0.1); color: var(--neon-pink); }

        /* Модалка скачивания */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: var(--glass-bg); border: 1px solid var(--neon-pink); border-radius: 24px; padding: 40px; text-align: center; width: 90%; max-width: 400px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 25px; color: var(--text-muted); font-size: 2.5rem; cursor: pointer; transition: 0.3s; line-height: 1; }
        .close-btn:hover { color: var(--neon-pink); transform: rotate(90deg); }
        .modal-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 30px; }
        .format-btn { display: flex; justify-content: center; gap: 10px; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 800; color: white; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; transition: 0.3s; }
        .format-btn.mp3:hover { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 198, 255, 0.4); }
        .format-btn.wav:hover { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }

        /* Подвал */
        footer { padding: 40px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .catalog-item { flex-wrap: wrap; padding: 20px; gap: 15px; }
            .ci-left { width: 100%; justify-content: center; gap: 15px; }
            .ci-number { display: none; } 
            .ci-cover-wrapper { width: 120px; height: 120px; }
            .ci-play-btn { opacity: 1; width: 50px; height: 50px; font-size: 1.3rem; }
            .ci-center { width: 100%; align-items: center; text-align: center; }
            .ci-player-controls { flex-direction: column; gap: 10px; }
            .time-display { width: 100%; text-align: center; }
            .ci-right { width: 100%; }
            .dl-btn { width: 100%; justify-content: center; padding: 15px; }
            .top-nav { flex-direction: column; gap: 15px; align-items: center; }
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
    </div>

    <nav class="top-nav fade-in">
        <a href="https://dxtrslizze.xyz/" class="nav-link">Главная</a>
        <a href="https://dxtrslizze.xyz/muzcatalog/" class="nav-link active">Муз. каталог</a>
    </nav>

    <div class="modal" id="downloadModal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeModal()">×</div>
            <div class="modal-title" id="modalTitle">Название трека</div>
            <a href="#" class="format-btn mp3" id="linkMp3" download><i class="fa-solid fa-file-audio"></i> MP3</a>
            <a href="#" class="format-btn wav" id="linkWav" download><i class="fa-solid fa-compact-disc"></i> WAV</a>
        </div>
    </div>

    <header class="fade-in">
        <h1>MUZ CATALOG</h1>
        <p>Слушай и скачивай понравившиеся треки в удобном формате</p>
    </header>

    <main id="track-list">
        </main>

    <footer>
        <p style="color: var(--text-muted); font-size: 0.9rem;">© 2026 DXTR | SlizZe</p>
    </footer>

    <script>
        // СПИСОК ВСЕХ ТРЕКОВ ИЗ ТВОЕГО КОДА
        const tracks = [
            { title: "Music", cover: "../logo_Music.png", mp3: "../mp3_Music.mp3", wav: "../wav_Music.wav" },
            { title: "FastRap", cover: "../logo_FastRap.jpeg", mp3: "../mp3_FastRap.mp3", wav: "../wav_FastRap.wav" },
            { title: "Night City Lights", cover: "../logo_Night_City_Lights.png", mp3: "../mp3_Night_City_Lights.mp3", wav: "../wav_Night_City_Lights.wav" },
            { title: "Mafia", cover: "../logo_Mafia.png", mp3: "../mp3_Mafia.mp3", wav: "../wav_Mafia.wav" },
            { title: "Brawl Stars", cover: "../logo_Brawl_Stars.jpeg", mp3: "../mp3_Brawl_Stars.mp3", wav: "../wav_Brawl_Stars.wav" },
            { title: "Night Club", cover: "../logo_Night_Club.jpeg", mp3: "../mp3_Night_Club.mp3", wav: "../wav_Night_Club.wav" },
            { title: "Minecraft", cover: "../logo_Minecraft.jpeg", mp3: "../mp3_Minecraft.mp3", wav: "../wav_Minecraft.wav" },
            { title: "Friday", cover: "../logo_Friday.jpeg", mp3: "../mp3_Friday.mp3", wav: "../wav_Friday.wav" },
            { title: "F90", cover: "../logo_F90.jpeg", mp3: "../mp3_F90.mp3", wav: "../wav_F90.wav" },
            { title: "Dying Light", cover: "../logo_Dying_Light.jpeg", mp3: "../mp3_Dying_Light.mp3", wav: "../wav_Dying_Light.wav" },
            { title: "Cefiro Reload", cover: "../logo_Cefiro_Reload.jpeg", mp3: "../mp3_Cefiro_Reload.mp3", wav: "../wav_Cefiro_Reload.wav" },
            { title: "Casino", cover: "../logo_Casino.jpeg", mp3: "../mp3_Casino.mp3", wav: "../wav_Casino.wav" },
            { title: "New Year", cover: "../logo_New_Year.jpeg", mp3: "../mp3_New_Year.mp3", wav: "../wav_New_Year.wav" },
            { title: "Выход из Сна", cover: "../logo_VIS.jpeg", mp3: "../mp3_VIS.mp3", wav: "../wav_VIS.wav" },
            { title: "Carnaval", cover: "../logo_Carnaval.jpeg", mp3: "../mp3_Carnaval.mp3", wav: "../wav_Carnaval.wav" },
            { title: "Life Simulator", cover: "../logo_Life_Simulator.jpeg", mp3: "../mp3_Life_Simulator.mp3", wav: "../wav_Life_Simulator.wav" },
            { title: "Amazing Online", cover: "../logo_Amazing_Online.jpeg", mp3: "../mp3_Amazing_Online.mp3", wav: "../wav_Amazing_Online.wav" }
        ];

        const trackListContainer = document.getElementById('track-list');
        let currentAudio = null;
        let currentPlayBtn = null;

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min < 10 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Генерация HTML
        tracks.forEach((track, index) => {
            const num = index + 1 < 10 ? `0${index + 1}` : index + 1;
            
            const trackHTML = `
                <div class="catalog-item fade-in" style="animation-delay: ${index * 0.05}s">
                    <div class="ci-left">
                        <div class="ci-number">${num}</div>
                        <div class="ci-cover-wrapper">
                            <img src="${track.cover}" alt="${track.title}" onerror="this.src='../dslogo.png'">
                            <button class="ci-play-btn" id="btn-${index}" onclick="togglePlay(${index})">
                                <i id="icon-${index}" class="fa-solid fa-play"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="ci-center">
                        <div class="ci-header">
                            <div class="ci-title">${track.title}</div>
                            <div class="ci-artist">DXTR | SlizZe</div>
                        </div>
                        <div class="ci-player-controls">
                            <audio id="audio-${index}" src="${track.mp3}" preload="metadata"></audio>
                            <div class="progress-container" id="prog-cont-${index}">
                                <div class="progress-bar" id="prog-bar-${index}"></div>
                            </div>
                            <div class="time-display" id="time-${index}">00:00 / 00:00</div>
                        </div>
                    </div>

                    <div class="ci-right">
                        <button class="dl-btn" onclick="openModal('${track.title}', '${track.mp3}', '${track.wav}')">
                            <i class="fa-solid fa-download"></i> <span class="dl-text">Скачать</span>
                        </button>
                    </div>
                </div>
            `;
            trackListContainer.insertAdjacentHTML('beforeend', trackHTML);
        });

        function togglePlay(index) {
            const audio = document.getElementById(`audio-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            const btn = document.getElementById(`btn-${index}`);

            if (currentAudio && currentAudio !== audio) {
                currentAudio.pause();
                if (currentPlayBtn) {
                    currentPlayBtn.className = 'fa-solid fa-play';
                    document.getElementById(`btn-${currentAudio.id.split('-')[1]}`).classList.remove('active');
                }
            }

            if (audio.paused) {
                audio.play();
                icon.className = 'fa-solid fa-pause';
                btn.classList.add('active');
                currentAudio = audio;
                currentPlayBtn = icon;
            } else {
                audio.pause();
                icon.className = 'fa-solid fa-play';
                btn.classList.remove('active');
                currentAudio = null;
                currentPlayBtn = null;
            }
        }

        // Логика перемотки и времени
        tracks.forEach((_, index) => {
            const audio = document.getElementById(`audio-${index}`);
            const progBar = document.getElementById(`prog-bar-${index}`);
            const progCont = document.getElementById(`prog-cont-${index}`);
            const timeDisp = document.getElementById(`time-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            const btn = document.getElementById(`btn-${index}`);

            let isDragging = false;

            // Как только подгрузятся данные трека - выводим время
            audio.addEventListener('loadedmetadata', () => {
                timeDisp.textContent = `00:00 / ${formatTime(audio.duration)}`;
            });

            audio.addEventListener('timeupdate', () => {
                if (audio.duration && !isDragging) {
                    const progressPercent = (audio.currentTime / audio.duration) * 100;
                    progBar.style.width = `${progressPercent}%`;
                    timeDisp.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
                }
            });

            audio.addEventListener('ended', () => {
                icon.className = 'fa-solid fa-play';
                btn.classList.remove('active');
                progBar.style.width = '0%';
                audio.currentTime = 0;
                timeDisp.textContent = `00:00 / ${formatTime(audio.duration)}`;
            });

            function updateProgress(clientX) {
                const rect = progCont.getBoundingClientRect();
                let offsetX = clientX - rect.left;
                if (offsetX < 0) offsetX = 0;
                if (offsetX > rect.width) offsetX = rect.width;
                
                const percentage = offsetX / rect.width;
                progBar.style.width = (percentage * 100) + '%';
                
                if (audio.duration) {
                    const targetTime = percentage * audio.duration;
                    timeDisp.textContent = `${formatTime(targetTime)} / ${formatTime(audio.duration)}`;
                    audio.currentTime = targetTime;
                }
            }

            progCont.addEventListener('mousedown', (e) => { isDragging = true; updateProgress(e.clientX); });
            window.addEventListener('mousemove', (e) => { if (isDragging) updateProgress(e.clientX); });
            window.addEventListener('mouseup', () => { isDragging = false; });

            progCont.addEventListener('touchstart', (e) => { isDragging = true; updateProgress(e.touches[0].clientX); }, { passive: false });
            window.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    updateProgress(e.touches[0].clientX);
                    e.preventDefault(); 
                }
            }, { passive: false });
            window.addEventListener('touchend', () => { isDragging = false; });
        });

        // ЛОГИКА МОДАЛЬНОГО ОКНА СКАЧИВАНИЯ
        const modal = document.getElementById('downloadModal');
        const modalTitle = document.getElementById('modalTitle');
        const linkMp3 = document.getElementById('linkMp3');
        const linkWav = document.getElementById('linkWav');

        function openModal(trackName, mp3Url, wavUrl) {
            modalTitle.textContent = trackName;
            linkMp3.href = mp3Url; linkMp3.setAttribute('download', `mp3_${trackName}.mp3`);
            linkWav.href = wavUrl; linkWav.setAttribute('download', `wav_${trackName}.wav`);
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        linkMp3.addEventListener('click', closeModal);
        linkWav.addEventListener('click', closeModal);

    </script>
</body>
</html>
